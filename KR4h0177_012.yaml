body:
  text: 張衡歌天地煙熅百卉含花鳴鶴交頸雎鳩相和處子懷春精魂回移如何淑明忘我實多後漢書張衡傳文選十五皇皇者鳳通玄知時萃于山趾與帝邀期吉事有祥惟漢之祺類聚三十九驚雄逝兮孤雌翔歸風兮思故鄉類聚四十三初學記十五歎大火流兮草蟲鳴繁霜降兮草木零秋為期兮時已征思美人兮愁屏營類聚十八廣文選十四古樂苑三十二詩紀三同聲歌邂逅承際會得充君後房情好新交接恐栗若探湯不才勉自竭賤妾職所當綢繆主中饋奉禮助蒸嘗思為苑蒻席在下蔽匡床願為羅衾幬在上衛風霜灑掃清枕席鞮芬以狄香重戶結金扃高下華燈光衣解巾粉御列圖陳枕張素女為我師儀態盈萬方衆夫所希見天老教軒皇樂莫斯夜樂沒齒焉可忘玉臺新詠一樂府詩集七十六廣文選十三詩紀三歌浩浩陽春發楊柳何依依百鳥自南歸翱翔萃我枝御覽二十又書鈔百五十四引猗一韻怨詩秋蘭詠嘉美人也嘉而不獲用故作是詩也猗猗秋蘭植彼中阿有馥其芳有黃其葩雖曰幽深厥美彌嘉之子之遠我勞如何御覽九百八十三困學紀聞十八廣文選九詩紀三我聞其聲載坐載起文選二十三贈士孫文始詩注范晞文對床夜語同心離居絶我中腸文選二十三贈士孫文始詩注詩願言不獲終然永思文選二十四贈秀才入軍詩注四愁詩張衡不樂久處機密陽嘉中出為河間相時國王驕奢不遵法度又多豪右并兼之家衡下車治威嚴能內察屬縣姦猾行巧劫皆密知名下吏收捕盡服擒諸豪俠遊客悉惶懼逃出境郡中大治爭訟息獄無繫囚時天下漸弊鬱鬱不得志為四愁詩效屈原以美人為君子以珍寶為仁義以水深雪氛為小人思以道術為報貽於時君而懼讒邪不得以通其辭曰文選二十九又文選二十一詠史詩注引一句一思曰我所思兮在太山欲往從之梁父艱側身東望涕霑翰美人贈我金錯刀何以報之英瓊瑤路遠莫致倚逍遙何為懷憂心煩勞文選二十九玉臺新詠九類聚三十五詩紀三又御覽三百四十六八百九並引刀瑤二韻二思曰我所思兮在桂林欲往從之湘水深側身南望涕霑襟美人贈我金琅玕何以報之雙玉盤路遠莫致倚惆悵何為懷憂心煩傷文選二十九玉臺新詠九詩紀三又類聚三十五引林深襟玕盤五韻御覽四百七十八引盤一韻七百五十八引槃一韻三思曰我所思兮在漢陽欲往從之隴阪長側身西望涕霑裳美人贈我貂襜褕何以報之明月珠路遠莫致倚踟蹰何為懷憂心煩紆文選二十九玉臺新詠九類聚三十五詩紀三又御覽七百八引㲣一韻四思曰我所思兮在雁門欲往從之雪氛氛側身北望涕霑巾美人贈我錦繡段何以報之青玉案路遠莫致倚增歎何為懷憂心煩惋文選二十九玉臺新詠九詩紀三又書鈔百三十三引被案二韻類聚三十五引門紛巾段案五韻與劉伯宗絶交詩北山有鴟不潔其翼飛不正向寢不定息飢則木攬飽則泥伏叨餮貪汙臭腐是食填腸滿嗉嗜欲無極長鳴呼鳳謂鳳無德鳳之所趣與子異域永從此訣各自努力後漢書朱穆傳注引穆集詩紀三招商歌涼風起兮日照渠青荷晝偃葉夜舒惟日不足樂有餘清絲流管歌玉鳧千年萬歲嘉難踰拾遺記六古文苑八太平廣記二百三十六詩紀三詩二首大道夷且長窘路狹且促修翼無卑棲遠趾不步局舒吾陵霄羽奮此千里足超邁絶塵驅倏忽誰能逐賢愚豈常類稟性在清濁富貴有人籍貧賤無人録通塞苟由己志士不相卜陳平敖里社韓信釣河曲終居天下宰食此萬鍾祿德音流千載功名重山嶽後漢書酈炎傳風雅翼遺詩一廣文選九詩紀三又文選二十四於承明作與弟士龍詩注引舒吾凌霄羽一句靈芝生河洲動搖因洪波蘭榮一何晚嚴霜瘁其柯哀哉二芳草不植太山阿文質道所貴遭時用有嘉絳灌臨衡宰謂誼崇浮華賢才抑不用遠投荊南沙抱玉乘龍驥不逢樂與和安得孔仲尼為世陳四科後漢書酈炎傳風雅翼遺詩一廣文選九詩紀三又類聚八十一御覽五十六九百八十三並引波柯阿三韻類聚作蘭詩答客詩邈矣甘羅超等絶倫伊彼楊烏命世稱賢嗟豫蠢弱殊才偉年仰慚二子俯愧過言類聚三十一御覽三百八十五五百十二詩紀三客示桓麟詩甘羅十二楊烏九齡昔有二子今則桓生參差等蹤異世齊名御覽五百十二詩紀三又類聚三十一御覽三百八十五並引齡生二韻美嚴王思詩乘彼西漢潭潭其淵君子愷悌作民二親沒世遺愛式鏡後人華陽國志巴志歌詩周公為司馬白魚入王舟書鈔五十一述志詩嫫母升玉堂初學記十述婚詩群祥既集二族交歡敬茲新姻六禮不愆羔鴈總備玉帛戔戔君子將事威儀孔間猗兮容兮穆矣其言初學記十四章本古文苑八廣文選十五詩紀四紛彼婚姻禍福之由衛女興齊褒姒減周戰戰競競懼德不仇神啓其吉果獲令攸我之愛矣荷天之休同上贈婦詩曖曖白日引曜西傾啾啾雞雀群飛赴楹皎皎明月煌煌列星嚴霜悽愴飛雪覆庭寂寂獨居寥寥空室飄飄帷帳熒熒華燭爾不是居惟帳何施爾不是照華燭何為玉臺新詠九詩紀四人生譬朝露居世夕屯蹇憂艱常早至歡會常苦晚念當奉時役去爾日遙遠遣車迎子還空往復空返省書情悽愴臨食不能飯獨坐空房中誰與相勸勉長夜不能眠伏枕獨展轉憂來如循環匪席不可卷玉臺新詠一西溪叢話下廣文選十詩紀四又文選三十擬今日良宴會詩注引晚一韻作答婦詩吳棫韻補三引返卷二韻皇靈無私親為善荷天祿傷我與爾身少小罹煢獨既得結大義歡樂苦不足念當遠離別思念敘款曲河廣無舟梁道近隔丘陸臨路懷惆悵中駕正躑躅浮雲起高山悲風激深谷良馬不回鞍輕車不轉轂針藥可屢進愁思難為數貞士篤終始恩義可不屬玉臺新詠一西溪叢話下廣文選十詩紀四又文選二十五謝靈運酬從弟惠連詩注引一句肅肅僕夫征鏘鏘揚和鈴清晨當引邁束帶待雞鳴顧看空室中髣佛想姿形一別懷萬恨起坐為不寧何用敘我心遺思致款誠寶叉好耀首明鏡可鑒形芳香去垢穢素琴有清聲詩人感木瓜乃欲咎瑤瓊愧彼贈我厚慚此往物輕雖知未足報貴用敘我情玉臺新詠一西溪叢話下文選五十五劉孝標廣絶交論注詩紀四答婦詩哀伐易感傷文選二十三七哀詩注詩過辭二親墓振策陟長衢文選二十六赴洛道中詩注巖石鬱嵯峨文選二十六河陽縣詩注答秦嘉詩妾身兮不令嬰疾兮來歸沉滯兮家門歷時兮不差曠廢兮侍覲情敬兮有違君今兮奉命遠適兮京師悠悠兮離別無因兮敘懷瞻望兮踴躍佇立兮徘徊思君兮感結夢想兮容暉君發兮引邁去我兮日乖恨無兮羽翼高飛兮相追長吟兮永歎淚下兮沾衣玉臺新詠一西溪叢話下廣文選十詩紀四李翕析里橋郙閣頌新詩兮水兌之間高山崔嵬兮水流蕩蕩地既塉確兮與寇為鄰以析分或失緒業兮至于困貧危危纍卵兮聖朝閔憐髦艾究兮幼救傾兮全育遺劬勞日稷兮惟惠勤勤黃邵朱龔兮蓋不充贏兮百姓歡欣僉曰太平兮文翁復存隸釋四金石遺文録王念孫讀書雜志秦客詩河清不可俟人命不可延順風激靡草富貴者稱賢文籍雖滿腹不如一囊錢伊優北堂上抗髒倚門邊後漢書趙一傳詩紀三又初學記二十七引前錢二韻類聚七十引錢一韻作客秦詩又白帖二四草堂詩箋二十九吾宗詩注並引錢一韻魯生歌勢家多所宜咳吐自成珠被褐懷金玉蘭蕙化為芻賢者雖獨悟所困在群愚且各守爾分勿復空馳驅哀哉復哀哉此是命矣夫後漢書趙一傳詩紀三又御覽三百八十七七百六十七九百八十三並引珠芻二韻
