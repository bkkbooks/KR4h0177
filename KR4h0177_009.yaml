body:
  text: 歌辭平城歌平城之下亦誠苦七日不食不能彀弩漢書胸奴傳後漢書南胸奴傳論注引前漢書樂府詩集八十三御覽三百四十八引史記詩紀八又懶真子四引不能控弩四字畫一歌蕭何為法講若畫一曹參代之守而勿失載其清靖民以寧一史記曹相國世家漢書曹參傳後漢書王充等傳論注類聚十九文選西都賦注御覽四百六十五樂府詩集八十四文選補遺三十五全唐文八百二十一程晏蕭何求繼論詩紀八又後漢書班固傳注及白帖二十一並引一失二韻民為淮南厲王歌一尺布尚可縫一斗粟尚可舂兄弟二人不相容史記淮南厲王傳漢書淮南厲王傳淮南鴻烈解敘世說新語方正篇注祕府略八百六十四類聚八十五白帖二六御覽八百二十八百四十樂府詩集八十四作淮南一王歌舊唐書蕭至忠傳文選補遺三十五及詩紀八作淮南民歌天下為衛子夫歌生男無喜生女無怒獨不見衛子夫霸天下史記外戚世家褚先生跋類聚十九五十一御覽百九十九四百六十五樂府詩集八十四詩紀八又御覽四百七十引無霸天下三字鄭白渠歌田於何所池陽谷口鄭國在前白渠起後舉鍤如雲決渠為雨水流竈下魚跳入釜涇水一石其泥數斗且溉且糞長我禾黍衣食京師億萬之口漢紀十五樂府詩集八十三續古文苑四詩紀八又漢書溝洫志風俗通山澤篇御覽六十二四百六十五文選補遺三十五並引口後雨斗黍口六韻又後漢書班固傳注文選二西京賦注初學記六並云出史記引口後雨斗黍口六韻又書鈔三十九類聚六十五御覽八百二十一並引口後雨斗黍五韻又白帖二白帖二十二並引口後雨斗四韻又書鈔百五十六引口後雲黍四韻潁川兒歌潁水清灌氏寧潁水濁灌氏族史記灌夫傳漢書灌夫傳白帖七御覽六十三寰宇記七詩紀八作潁川歌牢石歌牢邪石邪五鹿客邪印何纍纍綬若若邪漢書佞幸傳御覽四百六十五樂府詩集八十四文選補遺三十五作印綬歌詩紀八上郡吏民為馮氏兄弟歌大馮君小馮君兄弟繼踵相因循聰明賢知惠吏民政如魯衛德化鈞周公康叔猶二君漢書馮野王傳書鈔七十四類聚十九御覽二百六十三百九十六四百六十五樂府詩集八十五作上郡歌文選補遺三十五作馮君歌詩紀八作上郡歌又白帖二十一引君循均三韻長安為尹賞歌安所求子死桓東少年場生時諒不謹枯骨後何葬漢書尹賞傳匡謬正俗五詩紀八作尹賞歌長安百姓為王氏五侯歌五侯初起曲陽最怒壞決高都連竟外杜土山漸臺西白虎漢書元皇后傳水經渭水注文選十西征賦注御覽六十二四百六十五樂府詩集八十五詩紀八作五侯歌閭里為樓護歌五侯治喪樓君卿漢書樓護傳詩紀八作樓護歌劉聖公賓客醉歌朝亨兩都尉游徼後來用調羹味後漢書劉玄傳注御覽八百四十六胸奴歌亡我祁連山使我六畜不蕃息失我焉支山使我婦女無顏色御覽五十七百十九寰宇記百五十二樂府詩集八十四雲麓漫鈔一爾雅翼三詩紀八長沙人石虎謠石虎頭截倉廩不闕寰宇記一百十四元帝時童謠井水溢滅竈烟灌玉堂流金門漢書五行志初學記二十五御覽百八十九八百七十一樂府詩集八十八詩紀八長安謠伊徙鴈鹿徙菟去牢與陳實無賈漢書佞幸傳石顯傳御覽四百六十五樂府詩集八十七詩紀八成帝時童謠燕燕尾涏涏張公子時相見木門倉琅根燕飛來啄皇孫皇孫死燕啄矢漢書五行志漢書外戚傳開元占經百十三樂府詩集八十八作成帝時燕燕童謠文選補遺三十五作西漢童謠錦繡萬花谷三十九詩紀八又玉臺新詠九引殿見根孫四韻成帝時歌謠邪徑敗良田讒口亂善人桂樹華不實黃爵巢其顛故為人所羡今為人所憐漢書五行志開元占經百十三作成帝時童謠樂府詩集八十八文選補遺三十五作西漢童謠事類賦雀賦作古詩風雅翼補遺下作成帝時黃雀謠詩紀八又玉臺新詠九引人顛二韻御覽九百二十二作古詩引顛一韻汝南鴻隙陂童謠壞陂誰翟子威飯我豆食羹芋葵反乎覆陂當復誰云者兩黃鵠漢書翟方進傳白帖二御覽七十二樂府詩集八十八作王莽時汝南童謠文選補遺三十五詩紀八作鴻隙陂童謠又後漢書許楊傳引威魁韻三韻水經淮水注引威復二韻類聚八十七引威葵二韻御覽九百七十五引威魁二韻王莽末天水童謠出吳門望緹群見一蹇人言欲上天令天可上地上安得民續漢書五行志後漢書隗囂傳注文選補遺三十五作天水童謠詩紀八更始時南陽童謠諧不諧在赤眉得不得在河北續漢書五行志後漢書光武紀注樂府詩集八十八文選補遺三十五作南陽童謠詩紀八曹邱生引楚人諺得黃金百斤不如得季布一諾史記及漢書季布傳白帖二御覽四百三十四百六十三四百九十五八百九詩紀九作楚人諺漢人引鄙語不知為吏視已成事韓詩外傳五大戴記保傅篇漢書賈誼傳賈子新書保傅篇御覽四百九十六韓安國引語雖有親父安知不為虎雖有親兄安知不為狼史記韓安國傳漢書韓安國傳桓寬引語廚有腐肉國有飢民廄有肥馬路有餒人鹽鐵論園池篇桓寬引鄙語賢者容不辱鹽鐵論備胡篇淮南子引諺鳥窮則噣獸窮則𧢻人窮則詐淮南子齊俗訓鄒陽引諺白頭如新傾蓋如故史記及漢書鄒陽傳文選三十九司馬相如引諺家絫千金坐不垂堂史記司馬相如傳漢書司馬相如傳御覽四百九十五貢禹引俗語何以孝弟為財多而光榮何以禮義為史書而土宦何以謹慎為勇猛而臨官漢書貢禹傳司馬遷引諺桃李不言下自成蹊史記李將軍傳漢書李廣傳御覽四百九十五九百六十八千金之子不死於市史記貨殖傳御覽四百十五力田不如逢年善仕不如遇合史記佞幸傳司馬遷引鄙語尺有所短寸有所長史記白起王翦傳贊褚先生引諺美女入室惡女之仇史記外戚世家御覽百四十四三百八十相馬失之瘦相士失之窮史記滑稽列傳路溫舒引俗語畫地為獄議不入刻木為吏期不對漢書路溫舒傳書鈔七十七詩紀九作諺劉向引諺誡無垢思無辱說苑敬慎篇薛宣引鄙語苛政不親煩苦傷恩漢書薛宣傳劉輔引里語腐木不可以為柱卑人不可以為主漢書劉輔傳御覽一百八十十二百二十三四百九十五王嘉引里諺千人所指無病而死漢書王嘉傳全唐文二百七十七柳澤上睿宗書泛勝之引諺子欲富黃金覆齊民要術二泛勝之引古語土長冒撅陳根可拔耕者急發禮記月令注馬廖引長安語城中好高髻四方一尺城中好廣眉四方且半額城中好大袖四方全匹帛後漢書馬援傳馬廖傳玉臺新詠一作漢時童謠歌類聚四十三御覽四百九十五樂府詩集八十七文選補遺三十五作長安謠詩紀八又御覽三百六十四引額一韻八百十八引帛一韻漢人為黃公語虎莫凶有黃公古謠諺七十猛獸回黃公來同上時人為應曜語南山囚皓不如淮陽一老廣韻十六蒸關東為寧成號寧見乳虎無值寧成之怒史記酷吏傳義縱傳漢書義縱傳書鈔四十一長安為韓嫣語苦飢寒逐彈丸西京雜記四白帖十四御覽四百九十六七百五十五八百十一詩紀九作逐彈丸諸儒為朱雲語五鹿嶽嶽朱雲折其角漢書朱雲傳類聚五十五白帖二十六御覽四百六十三四百九十五六百十五詩紀九作五鹿長安為王吉語東家有樹王陽婦去東家棗完去婦復還漢書王吉傳類聚八十七御覽四百九十五五百二十一九百六十五詩紀九作東家棗世稱王貢語王陽在位貢公彈冠漢書王吉傳後漢書王丹傳注白帖十二長安為蕭朱王貢語蕭朱結綬王貢彈冠漢書蕭育傳風俗通窮通篇類聚二十一初學記十八白帖十御覽四百十四百九十五吏民為趙張三王語前有趙張後有三王漢書趙尹韓張兩王傳贊又王吉傳書鈔三十九類聚六白帖二十一文選十潘安仁西征賦注御覽四百九十五詩紀作三王鄒魯諺遺子黃金滿籯不如一經漢書韋賢傳類聚八十三白帖二十六御覽四百九十五五百十八六百十三七百六十四八百九詩紀九諸儒為匡衡語無說詩匡鼎來匡說詩解人頤漢書匡鼎傳西京雜記二詩紀八作匡衡歌京師為諸葛豐語間何闊逢諸葛漢書諸葛豐傳書鈔三十六三十七白帖十三御覽二百五十四百二十七四百九十五詩紀九作諸葛豐諸儒為張禹語不欲為論念張文漢書張禹傳西京雜記二御覽四百九十五詩紀九作張文長安為谷永樓護號谷子雲筆札樓君卿喉舌漢書樓護傳書鈔百三百四類聚三十三五十八御覽四百六十三四百九十五五百九十五六百六詩紀九作谷樓時人為甄豐語夜半客甄長伯後漢書彭寵傳長安為張竦語欲求封過張柏松力戰鬭不如巧為奏漢書王莽傳時人為王莽語莽頭禿幘施屋續漢書輿服志獨斷下御覽四百九十六六百八十七七百四十詩紀九作幘如屋東方為王匡廉丹語寧逢赤眉不逢太師太師尚可更始殺我漢書王莽傳時人為蔣詡諺楚國二龔不如杜陵蔣翁御覽五百十詩紀九作杜陵蔣翁京師為楊雄語惟寂寞自投閣爰清靜作符命漢書揚雄傳御覽四百九十五又白帖三十文選三十齊中讀書詩注御覽一百八十四並引閣一韻詩紀九作投閣時人為揚雄桓談語玩揚子雲之篇樂於居千乘之官挾桓君之書富於積猗頓之財廣輿記二潛確類書八十更始時長安中語竈下養中郎將爛羊胃騎都尉爛羊頭關內侯後漢書劉玄傳類聚四十五白帖十二御覽九十二百三四百九十五九百二又文選補遺三十五作長安謠詩紀九作竈下養時人為戴遵語關東大豪戴子高後漢書戴良傳三輔為張氏何氏語何氏算張氏鉤何氏肥張氏瘦御覽三百七十八太平廣記三百九十一時人為張氏諺相里張多賢良積善應子孫昌御覽四百九十六桓談引諺論巧習伏習象神巧者不過習者之門意林三桓談引關東鄙語人間長安樂出門西向笑知肉味美對屠門而大嚼書鈔百四十五類聚七十二初學記二十六文選四十二與吳季重書注白帖五御覽四百九十六八百二十八八百六十三
