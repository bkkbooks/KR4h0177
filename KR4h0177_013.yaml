body:
  text: 後漢少帝劉辨悲歌天道易兮我何艱棄萬乘兮退守蕃逆臣見迫兮命不延逝將去汝兮適幽玄後漢書何后紀附王美人傳御覽九十二百五十唐姬起舞歌附皇天崩兮后土頽身為帝王兮命夭摧死生路異兮從此乖奈我煢獨兮心中哀後漢書何后紀附王美人傳御覽九十二百五十又文選二十八挽歌詩注引一句飲馬長城窟行青青河邊草綿綿思遠道遠道不可思宿昔夢見之夢見在我傍忽覺在他鄉他鄉各異縣展轉不可見枯桑知天風海水知天寒入門各自媚誰肯相為言客從遠方來遺我雙鯉魚呼兒烹鯉魚中有尺素書長跪讀素書書中竟何如上有加餐食下有長相憶文選二十七作古辭玉臺新詠一類聚四十一作樂府古詩樂府詩集三十八作古辭蔡中郎集外集詩紀三又白帖十作古詩引魚書如思四韻黃氏集千家注杜工部詩史補遺八引一句草堂詩箋十四夢李詩注作樂府詩引鄉憶二韻御覽九百三十六作古歌辭引魚書二韻事類賦魚注作古詩引魚書如思四韻歌練余心兮浸太清滌穢濁兮存正靈和液暢兮神氣寧情志泊兮心亭亭嗜欲息兮無由生踔宇宙而遺俗兮眇翩翩而獨征後漢書蔡雍傳廣文選十四詩紀三答對元式詩伊余有行爰戾茲邦先進博學同類率從濟濟群彥如雲如龍君子博文貽我德音辭之集矣穆如清風類聚三十一廣文選十蔡中郎集外集詩紀三答卜元嗣詩斌斌碩人貽我以文辱此休辭非余所希敢不酬答賦誦以歸類聚三十一詩紀三翠鳥詩庭陬有若榴緑葉含丹榮翠鳥時來集振翼修形容回顧生碧色動搖揚縹青幸脫虞人機得親君子庭馴心托君素雌雄保百齡蔡中郎集外集廣文選十五詩紀三又類聚九十二引榮形青三韻初平詩暮宿河南悵望天陰雨雪滂滂文選二十新亭渚別范零陵詩注又文選二十六酬王晉安詩注引上一句又文選三十一雜體詩注文選三十八為范尚書讓吏部尚書第一表注各引上句並作蔡雍詩序酸棗令劉熊碑詩清和穆鑠實惟乾川惟嶽降靈篤我我君服骨睿聖允鍾厥醇誕生歧嶷言協典墳懿德震耀孝行通神動履規繩文彰彪繽成是正服以道德民隸釋五嚴可均輯蔡中郎集十五有父子然後有君臣理財正辭束帛戔戔夢刻像鶴鳴一震天臨保漢實生勳明試賦授夷夏已親嘉錫來撫潛化如神其神伊何靈不傷人同上猗歟明哲秉道之樞養之福匪德之隅淵乎其長渙乎成功政暇民豫新我通用行則達以誘我邦賴茲劉父用説其蒙澤零年豐黔首歌頌同上歌國有逸民姓趙氏名嘉有志無時命也奈何書鈔百六後漢書趙岐傳白帖七書鈔百十引謝承後漢書御覽五百一引後漢書又御覽五百五十八七百三十九並引三輔決録又文選二十三悼亡詩注引何一韻離合作邵姓名字詩漁父屈節水潛匿方與峕時進止出行施張呂公磯釣闔口渭旁九域有聖無土不王好是正直女回于匡海外有截隼逝鷹揚六翮將奮羽儀未彰蛇龍之蟄俾也可忘玫璇隱曜美玉韜光無名無譽放言深藏按轡安行誰謂路長類聚此下注魯國孔融文舉六字類聚五十六古文苑四石林詩話中詩紀三臨終詩言多令事敗器漏苦不密河潰蟻孔端山壞由猿穴涓涓江漢流天窗通冥室讒邪害公正浮雲翳白日靡辭無忠誠華繁竟不實人有兩三心安能合為一三人成市虎浸漬解膠漆生存多所慮長寢萬事畢古文苑四詩紀三書鈔百五十八引密穴二韻六言詩三首漢家中葉道微董卓作亂乘衰僭上虐下專威萬官惶布莫違百姓慘慘心悲古文苑四詩紀三郭李分爭為非遷都長安思歸瞻望關東可哀夢想曹公歸來同上從洛到許巍巍曹公憂國無私減去廚膳甘肥群僚率從祁祁雖得俸祿常飢念我苦寒心悲同上詩坐上客恆滿樽中飲不空後魏書七十一夏侯道遷傳御覽四百九十三詩紀三羽林郎詩昔有霍家姝姓馮名子都依倚將軍勢調笑酒家胡胡姬年十五春日獨當壚長裾連理帶廣袖合歡襦頭上藍田玉耳後大秦珠兩鬟何窈窕一世良所無一鬟五百萬兩鬟千萬餘不意金吾子娉婷過我廬銀鞍何煜爚翠蓋空踟蹰就我求清酒絲繩提玉壼就我求珍肴金盤鱠鯉魚貽我青銅鏡結我紅羅裾不惜紅羅裂何論輕賤軀男兒愛後婦女子重前夫人生有新故貴賤不相踰多謝金吾子私愛徒區區玉臺新詠一樂府詩集六十三廣文選十二詩紀四又書鈔一百四十二引廬魚二韻文選十六別賦注引蹰一韻錦繡萬花谷三十五引都胡廬三韻後村詩話一引都胡壚襦珠無廬蹰裾夫渝區十二韻董嬌饒詩洛陽城東路桃李生路傍花花自相對葉葉自相當春風南北起花葉正低昂不知誰家子提籠行採桑纖手折其枝花落何飄揚詩謝彼姝子何為見損傷高秋八九月白露變為霜終年會飄墮安得久馨香秋時自零落春月復芬芳何如盛年去歡愛永相忘吾欲竟此曲此曲愁人腸歸來酌美酒挾瑟上高堂玉臺新詠一類聚八十八樂府詩集七十三廣文選十三詩紀四又初學記二十八引傍當昂三韻御覽九百六十七引傍當昂三韻合璧事類別集五十一引傍桑揚霜香忘腸堂八韻悲憤詩漢季失權柄董卓亂天常志欲圖篡弒先害諸賢良逼迫遷舊邦擁主以自強海內興義師欲共討不祥卓衆來東下金甲耀日光平土人脆弱來兵皆胡羌獵野圍城邑所向悉破亡斬截無孑遺尸骸相牚拒馬邊縣男頭馬後載婦女長驅西入關逈路險且阻還顧邈冥冥肝脾為爛腐所略有萬計不得令屯聚或有骨肉俱欲言不敢語失意幾微間輒言斃降虜要當以亭刃我曹不活汝豈復惜性命不堪其詈罵或便加捶杖毒痛參并下旦則號泣行夜則悲吟坐欲死不能得欲生無一可彼蒼者何辜乃遭此厄禍邊荒與華異人俗少義理處所多霜雪胡風春夏起翩翩吹我衣肅肅入我耳感時念父母哀歎無窮已有客從外來聞之常歡喜迎問其消息輒復非鄉里邂逅徼時願骨肉來迎己己得自解免當復棄兒子天屬綴人心念別無會期存亡永乖隔不忍與之辭兒前抱我頸問母欲何之人言母當去豈復有還時阿母常仁惻念何更不慈我尚未成人奈何不顧思見此崩五內恍惚生狂癡號泣手撫摩當發復回疑兼有同時輩相送造離別慕我獨得歸哀叫聲摧裂馬為立踟蹰車為不轉轍觀者皆歔欷行路亦嗚咽去去割情戀遄征日遐邁悠悠三千里何時復交會念我出腹子胸臆為摧敗既至家人盡又復無中外城郭為山林庭宇生荊艾白骨不知誰從橫莫覆蓋出門無人聲豺狼號且吠煢煢對孤景怛吒糜肝肺登高遠眺望魂神忽飛逝奄若壽命盡旁人相寬大為復強視息雖生何聊賴託命於新人竭心自勗厲流離成鄙賤常恐復捐廢人生幾何時懷憂終年歲後漢書蔡琰傳廣文選九詩紀四又文選三十石門新營所住詩注引肺一韻御覽八百引兩句韻補四引外艾二韻嗟薄祜兮遭世患宗族殄兮門戶單身執略兮入西關歷險阻兮之羌蠻山谷眇兮路漫漫眷東顧兮但悲歎冥當寢兮不能安飢當食兮不能餐常流涕兮眥不乾薄志節兮忥死難雖苟活兮無形顏惟彼方兮遠陽精陰氣凝兮雪夏零沙漠壅兮塵冥冥有草木兮春不榮人似獸兮食臭腥言兜離兮狀窈停歲聿暮兮時邁征夜悠長兮禁門扃不能寢兮起屏營登胡殿兮臨廣庭玄雲合兮翳月星北風厲兮肅泠泠胡茄動兮邊馬鳴孤雁歸兮聲嚶嚶樂人興兮彈琴箏音相和兮悲且清心吐思兮胸憤盈欲舒氣兮恐彼驚含哀咽兮涕沾頸家既迎兮當歸寧臨長路兮捐所生兒呼母兮啼失聲我掩耳兮不忍聽追持我兮走煢煢頓復起兮毀顏形還顧之兮破人情心怛絶兮死復生後漢書蔡琰傳詩紀四又書鈔百十一類聚四十四引鳴嚶二韻俱云出蔡琰別傳文選二十六赴洛詩注引一句御覽四百八十八引寧聲聽三韻謂出蔡琰別傳詩長笛聲奏苦草堂詩箋十五秋笛詩注附胡笳十八拍我生之初尚無為我生之後漢祚衰天不仁兮降亂離地不仁兮使我逢此時干戈日尋兮道路危民卒流亡兮共哀悲煙塵蔽野兮胡虜盛志意乖兮節義虧對殊俗兮非我宜遭惡辱兮當告誰笳一會兮琴一拍心憤怨兮無人知戎羯逼我兮為室家將我行兮向天涯雲山萬里兮歸路遐疾風千里兮揚塵沙人多暴猛兮如虺蛇控弦被甲兮為驕奢兩拍張絃兮絃欲絶志摧心折兮自悲嗟越漢國兮入胡城亡家失身兮不如無生氈裘為裳兮骨肉震驚羯羶為味兮枉遏我情鞞鼓喧兮從夜達明胡風浩浩兮暗塞營傷今感昔兮三拍成銜悲畜恨兮何時平無日無夜兮不思我鄉土稟氣含生兮莫過我最苦天災國亂兮人無主唯我薄命兮沒戎虜殊俗心異兮身難處嗜欲火同兮誰可與語尋思涉歷兮多囏阻四拍成兮益悽楚雁南征兮寄邊聲雁北歸兮為得漢音雁飛高兮邈難尋空斷腸兮思愔愔攢眉向月兮撫雅琴五拍泠泠兮意彌深冰霜凜凜兮身苦寒飢對肉酪兮不能餐夜聞隴水兮聲嗚咽朝見長城兮路沓漫追思往日兮行李難六拍悲兮欲罷彈日暮風悲邊聲四起不知愁心兮説向誰是原野蕭條兮烽戍萬里俗賤老弱兮少壯為美逐有水草兮安家葺壘牛羊滿野兮聚如蜂蟻草盡水竭兮羊馬皆徙七拍流恨兮惡居於此為天有眼兮何不見我獨漂流為神有靈兮何事處我天南海北頭我不負天兮何配我殊匹我不負神兮何殛我越荒州製茲八拍兮擬俳優何知曲成兮心轉愁天無涯兮地無邊我心愁兮亦復然生倏忽兮如白駒之過隙然不得歡樂兮當我之盛年怨兮欲問天天蒼蒼兮上無緣舉頭仰望兮空雲煙九拍懷情兮誰與傳城頭烽火不曾滅疆場征戰何時歇殺氣朝朝衝塞門胡風夜夜吹邊月故鄉隔兮音塵絶哭無聲兮氣將咽一生辛苦兮緣離別十拍悲深兮淚成血我非貪生而惡死不能捐身兮心有以生仍冀得兮歸桑梓死當埋骨兮長已矣日居月諸兮在戎壘胡人寵我兮有二子鞠之育之兮不羞恥愍之念之兮生長邊鄙十有一拍兮因茲起哀響纏綿兮徹心髓東風應律兮暖氣多知是漢家天子兮布陽和羌胡蹈舞兮共謳歌兩國交歡兮罷兵戈忽遇漢使兮稱近詔遣千金兮贖妾身喜得生還兮逢聖君嗟別稚子兮會無因十有二拍兮哀樂均去住兩情兮難具陳不謂殘生兮卻得旋歸撫抱胡兒兮泣下沾衣漢使迎我兮四牡騑騑號失聲兮誰得知與我生死兮逢此時愁為子兮日無光輝焉得羽翼兮將汝歸一步一遠兮足難移魂消影絶兮恩愛遺十有三拍兮絃急調悲肝腸攪刺兮人莫我知身歸國兮兒莫之隨心懸懸兮長如飢四時萬物兮有盛衰唯我愁苦兮不暫移山高地闊兮見汝無期更深夜闌兮夢汝來斯夢中執手兮一喜一悲覺後痛吾心兮無休歇時十有四拍兮涕淚交垂河水東流兮心是思十五拍兮節調促氣填胸兮誰識曲處穹廬兮偶殊俗願得歸兮天從欲再還漢國兮歡心足心有懷兮愁轉深日月無私兮曾不照臨子母分離兮意難任同天隔越兮如商參生死不相知兮何處尋十六拍兮思茫茫我與兒兮各一方日東月西兮徒相望不得相隨兮空斷腸對萱草兮憂不忘彈鳴琴兮情何傷今別子兮歸故鄉舊怨平兮新怨長泣血仰頭兮訴蒼蒼胡為生兮獨罹此殃十七拍兮心鼻酸關山阻修兮行路難去時懷土兮心無緒來時別兒思漫漫塞上黃蒿兮枝枯葉乾沙場白骨兮刀痕箭瘢風霜凜凜兮春夏寒人馬飢豗兮筋力單豈知重得兮入長安歎息欲絶兮淚闌干胡笳本自出胡中緣琴翻出音律同十八拍兮曲雖終響有餘兮思無窮是知絲竹微妙兮均造化之功哀樂各隨人心兮有變則通胡與漢兮異域殊風天與地隔兮子西母東苦我怨氣兮浩於長空六合雖廣兮受之應不容詩紀四見志詩二首飛鳥遺迹蟬蛻亡殼騰蛇棄鱗神龍喪角至人能變達士拔俗乘雲無轡騁風無足垂露成幃張霄成幄沆瀣當餐九陽代燭恆星豔珠朝霞潤玉六合之內恣心所欲人事可遺何為局促後漢書仲長統傳廣文選八詩紀三又吳棫韻補五引殼角俗三韻作見志詩大道雖夷見幾者寡任意無非適物無可古來繞繞委曲如瑣百慮何為至要在我寄愁天上埋憂地下叛散五經滅棄風雅百家雜碎請用從火抗志山西遊心海左元氣為舟微風為柁敖翔太清縱意容冶後漢書仲長統傳廣文選八詩紀三又文選二十六酬王晉安詩注文選三十一雜體詩注各引在一韻吳棫韻補三引大左二韻詩春雲為馬秋風為駟按之不遲勞之不疾初學記一
