body:
  text: 琴操將歸操狄之水兮風揚波船楫顛倒更相加歸來歸來胡為斯琴操上朱文公校昌黎昌先生集注又水經河水注五引波加二韻御覽五百七十八引大周正樂有序無辭陬操周道衰微禮樂陵遲文武既墜吾將焉歸周遊天下靡邦可依鳳鳥不識珍寶梟鵖眷然顧之慘然心悲巾車命駕將適唐都黃河洋洋攸攸之魚臨津不濟還轅息鄹傷豫道窮哀彼無辜翱翔于衛復我舊廬從我所好其樂只且孔叢子記問篇又樂府詩集五十八引後四句作將歸操詩紀前集四作息鄹操猗蘭操習習谷風以陰以雨之子于歸遠送于野何彼蒼天不得其所逍遙九州無有定處世人暗蔽不知賢者年紀邁逝一身將老琴操上類聚八十一御覽九百八十三樂府詩集五十八朱文公校昌黎集注又御覽五百七十八引大周正樂有序無辭詩紀前集四龜山操子欲望魯兮龜山蔽之手無斧柯奈龜山何琴操上朱文公校昌黎先生集龜山操注御覽五百七十八引大周正樂有序無辭詩紀前集四越裳操於戲嗟嗟非旦之力乃文王之德琴操上樂府詩集五十七朱文公校昌黎先生集注御覽五百七十八引大周正樂有序無辭詩紀前集四拘幽操殷道溷溷浸濁煩兮朱紫相合不別分兮迷亂聲色信讒言兮炎炎之虐使我愆兮幽閉牢穽由其言兮無辜桎梏誰所宣兮遘我四人憂勤勤兮得此珍玩且解大患兮倉皇迄命遺後昆兮作此象變兆在昌兮欽承祖命天不喪兮遂臨下土在聖明兮討暴除亂誅逆王兮琴操上御覽五百七十一引古今樂録續古文苑四詩紀前集四又類聚十二御覽八十四樂府五十七俱引煩分言愆言勤六韻朱文公校昌黎集注引琴録煩分言愆言勤六韻岐山操逯案此歌乃宋以後人所擬郭茂倩尚未之見今故從略履霜操履朝霜兮採晨寒考不明其心分聽讒言孤恩別離兮摧肺肝何辜皇天兮遭斯愆痛歿不同兮恩有偏誰說顧分知我冤琴操上世說新語言語篇注文選十八長笛賦注初學記二白帖六御覽十四五百十一引並有序無辭樂府詩集五十七朱文公校昌黎集注引古樂府解題詩紀前集四雉朝飛操雉朝飛鳴相和雌雄群遊於山阿我獨何命兮未有家時將暮兮可奈何嗟嗟暮兮可奈何琴操上樂府詩集五十七朱文公校昌黎集雉朝飛操注引古今注詩紀前集四又類聚九十御覽九百十七引和河二韻別鶴操將乖比翼兮隔天端山川悠遠兮路漫漫攬衣不寐兮食忘餐敦煌石室唐寫修文殿御覽殘卷書鈔百九類聚九十六白帖六二十九御覽九百十六有序無辭朱文公校昌黎集別鸙操注崔豹古今注樂府詩集五十八引古今注詩紀前集四列女引忠諫行兮正不邪衆妾夸兮繼嗣多琴操上貞女引菁菁茂木隱獨榮兮變化垂枝含秀英兮修身養行建令名兮厥道不移善惡并兮屈躬就濁世徹青兮懷忠見疑何貪生兮琴操上後漢書盧植傳注樂府詩集五十八作處女吟又詩紀前集四辟歷引疾雨盈河辟歷下臻洪水浩浩滔厥天鏗𧻴隆愧隱隱闐闐國將亡兮喪厥年琴操上書鈔百五十二御覽十三有序無辭事類賦雷賦注詩紀前集四箕山操登彼箕山兮瞻望天下山川麗崎萬物還普日月運照靡不記睹游放其間何所卻慮歎彼唐堯獨自愁苦勞心九州憂勤后土謂余欽明傳禪易祖我樂如何蓋不盼顧河水流兮緣高山甘瓜施兮棄綿蠻高林肅兮相錯連居此之處傲堯君琴操下御覽五七一引古今樂録文王受命翼翼翱翔彼鷥皇兮銜書來遊以命昌兮瞻天案圖殷將亡兮蒼蒼昊天始有萌兮神連精合謀於房兮興我之業望羊來兮琴操上樂府詩集五十七及詩紀前集四作文王操又類聚十二御覽八十四所引無末句思親操陟彼歷山兮崔嵬有鳥翔兮高飛瞻彼鳩兮徘徊河水洋洋兮清泠深谷鳥鳴兮嚶嚶設罝張兮思我父母力耕日與月兮往如馳父母遠兮吾將安歸琴操下類聚九十二御覽九百二十一並引琴操有序無辭又樂府詩集五十七引古今樂録詩紀前集四儀鳳歌鳳皇翔兮於紫庭余何德兮以感靈賴先人兮澤臻于胥樂兮民以寧鳳皇來兮百獸晨類聚九十九白帖二十九初學記三十御覽九百十五尚書摘洛戒宋書二十七符瑞志竹書紀年下沈約注樂府五十七引古今樂録御覽五百七十引大周正樂有序無辭詩紀前集四龍蛇歌有龍矯矯遭天譴怒捲逃鱗甲來遁於下志願不得與蛇同伍龍蛇俱行周遍山野龍遭飢餓蛇割腓股龍得升天安厥房戶蛇獨抑摧沈滯泥土仰天怨望惆悵悲苦非樂龍伍怪不盼顧琴操下玉燭寶典二引琴操詩紀前集二龍蛇歌附有龍矯矯將失其所有蛇從之周流天下龍既入深淵得其安所蛇脂盡乾獨不得甘雨新序節士篇樂府詩集五十七詩紀前集二有龍矯矯而失其所有蛇從之而啖其口龍既升雲蛇獨泥處淮南說山訓許慎注有龍矯矯遭天譴怒三蛇從之一蛇割股二蛇入國厚蒙爵土餘有一蛇棄於草莽樂府詩集五十七詩紀前集二芑梁妻歌樂莫樂兮新相知悲莫悲兮生別離哀感皇天兮城為隳琴操上水經沭水注御覽百九十二詩紀前集四信立退怨歌悠悠沂水經荊山兮精氣鬱泱谷巖巖兮中有神寶灼明明兮穴山采玉難為功兮於何獻之楚先王兮遇王暗昧信讒言兮斷截兩足離余身兮俯仰嗟歎心摧傷兮紫之亂朱粉墨同兮空山歔欷涕龍鍾兮天鑒孔明竟以彰兮沂水滂沌流於汶兮進寶得刑足離分兮去封立信守休藝兮斷者不續豈不冤兮琴操下類聚八十三樂府詩集四十一詩紀前集四又後漢書孔融傳注引分藝冤三韻初學記二十七引山巖明功四韻文選二十五重贈盧諶詩注引山功二韻渚宮舊事一所引缺身一韻歸耕操歔欷歸耕來兮安所耕歷山盤兮以晏父母我心慱兮琴操下風雅逸篇五詩紀前集四又文選十五思玄賦注引起首二句引聲歌天地之道近在胸臆呼吸精神以養九德渴不求飲飢不索食避世守道志潔如玉卿相之位難可直當巖巖之石幽而清涼枕塊寢處樂在其央寒涼固回可以久長琴操下詩紀前集二又文選三十八薦譙元彥表注引玉一韻御覽五百七十一引古今樂録霍將軍歌四夷既獲諸夏康兮國家安寧樂無央兮載戢干戈矢藏兮麒麟來臻鳳皇翔兮與天相保永無疆兮親親百年各延長兮琴操下樂府詩集六十范晞文對床夜語一廣文選十四俱作琴歌詩紀二怨曠思惟歌秋木萋萋其葉萎黃有鳥爰止集于苞桑養育毛羽形容生光既得升雲獲幸帷房離宮絶曠身體摧藏志念抑沉不得頡頏雖得餧食心有徊徨我獨伊何改往變常翩翩之燕遠集西羌高山峨峨河水泱泱父兮母兮道里悠長嗚呼哀哉憂心惻傷琴操下類聚三十樂府詩集五十九作昭君怨廣文選九詩紀二作怨詩又書鈔百六引黃桑得三韻文選二十八扶風歌注引藏一韻御覽四百八十三引黃常羌泱長傷六韻五百七十一引黃桑房藏頏常羌泱傷九韻獲麟歌唐虞世兮麟鳳遊今非其時來何求麟兮麟兮我心憂琴操補遺類聚十繹史八十六孔叢子記問篇論語摘衰聖御覽八百八十九引孔叢子詩紀前集一失題俟罪斯國志願得兮文選六十引弔屈原賦注伍子胥歌曰庶此太康皆為力兮文選二十六張子房詩注飯牛歌南山矸白石䃹生不逢堯與舜禪短布單衣裁至骭長夜漫漫何時旦琴操補遺六類聚九十四詩紀前集一附南山矸白石爛生不逢堯與舜禪短布單衣適至骭從昏飯牛薄夜半長夜漫漫何時旦史記鄒陽傳應劭注書鈔百六又文選十八嘯賦注並引應劭注詩紀前集一又御覽八百九十八引史記引禪骭旦三韻滄浪之水白石粲中有鯉魚長尺半弊布單衣裁至骭清朝飯牛至夜半黃犢上坂且休息吾將捨汝相齊國書鈔百六引三齊略記類聚四十三詩紀前集一又書鈔百二十八引三齊略記録骭韻一句御覽六百九十一九百三十六引半骭二韻出東門兮厲石班上有松柏青且闌粗布衣兮縕縷時不遇兮堯舜主牛兮努力食細草大臣在爾側吾當與爾適楚國淮南道應訓許慎注文選十八嘯賦注引淮南子詩紀前集一南石粲白石爛短褐單衣長至骭生不逢堯與舜禪終日飼牛至夜半長夜漫漫何時旦御覽五百七十二引淮南子失題鵷彼鳴鶼在巖山之吟風雅逸篇五引類要琴操補遺書鈔一百六神人暢清廟穆兮承豫宗百僚肅兮于寢堂醊禱進福求年豐有響在坐敕豫為寤在玄中欽哉昊天德不隆承命任禹寫中宮樂府詩集五十七風雅逸篇一引琴操詩紀前集四南風操反彼三山兮商嶽嵯峨天降五老兮迎我來歌有黃龍兮自出于河負書圖兮委蛇羅沙案圖觀讖兮閔天嗟嗟擊石拊韶兮淪幽洞微鳥獸蹌蹌兮鳳凰來儀凱風自南兮喟其增悲樂府詩集五十七作南風歌風雅逸篇一詩紀前集四箕子操嗟嗟紂為無道殺比干嗟重復嗟獨奈何漆身為厲被髮以佯狂今奈宗廟何天乎天哉欲負石自投河嗟復嗟奈社稷何樂府詩集五十七詩紀前集四剋商操上告皇天兮可以行乎樂府詩集五十七詩紀前集四水仙操翳洞渭兮流澌濩舟楫逝兮仙不還移形素兮蓬萊山歍欽傷宮仙石還詩紀前集四伯姬引嘉名潔兮行彌章托節鼓兮令躬喪歍欽何辜遇斯殃嗟嗟奈何罹斯殃詩紀集四思歸引涓涓泉水流及于淇兮有懷于衛靡日不思執節不移兮行不隳砛軻何辜兮離厥菑嗟乎何辜兮離厥菑詩紀前集四又風雅逸篇二引淇思隨茨四韻琴引酒坐俱勿往聽吾琴之所言舒長褎似舞兮乃褕袂何曼奏章而却逢兮願瞻心之所歡借連娟之寒態兮假酒巵酌五般泣喻而妖兮納其聲聲麗顏長㯓兮嘆曰騎美人旖旎紛嬆枻霜羅衣兮羽旄夜褒圭玉珠參差妙麗兮被雲髾登高臺兮望青挨常羊啖還何厭兮歸來詩紀前集四岐山操狄戎侵兮土地遷移邦邑適於岐山蒸民不憂兮誰者知嗟嗟奈何兮豫命遭斯琴操上詩紀前集四綏山謠得綏山一桃雖不得仙亦足亦豪列仙傳上搜神記一類聚九十四御覽九百二九百六十七詩紀外集一長安中謠見乞兒與美酒以免破屋之咎列仙傳下搜神記一御覽八百二十七詩紀外集一里語年未半枝不汗別國洞冥記二御覽九百五十三赤雀辭安公安公冶與天通七月七日迎汝以赤龍列仙傳下搜神記一類聚七十八詩紀外集一崔少府女贈盧充詩煌煌靈芝質光麗何猗猗華豔當時顯嘉異表神奇含英未及秀中夏罹霜萎榮曜長幽滅世路永無施不悟陰陽運哲人忽來儀會淺離別速皆由靈與祗何以贈余親金鋺可養兒愛恩從此別斷絶傷肝脾搜神記十六世說新語方正篇注引孔氏志怪法苑珠林七十五引續神仙記詩紀外集四
