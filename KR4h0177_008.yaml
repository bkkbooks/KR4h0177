body:
  text: 韋孟諷諫詩肅肅我祖國自豕韋黼衣朱紱四牡龍旗彤弓斯征撫寧遐荒總齊群邦以翼大商迭彼大彭勳績惟光至于有周歷世會同王赧聽譖實絶我邦我邦既絶厥政斯逸賞罰之行非繇王室庶尹群后靡扶靡衛五服崩離宗周以隊我祖斯微遷于彭城在豫小子勤誒厥生厄此嫚秦耒耜以耕悠悠嫚秦上天不寧乃眷南顧授漢于京於赫有漢四方是征靡適不懷萬國逌平乃命厥弟建侯於楚俾我小臣惟傅是輔競競元王恭儉淨一惠此黎民納彼輔弼饗國漸世垂烈于後乃及夷王克奉厥緒咨命不永惟王統祀左右陪臣此惟皇士如何我王不思守保不惟履冰以繼祖考邦事是廢逸游是娛犬馬繇繇是放是驅務彼鳥獸忽此稼苗蒸民以匱我王以偷所弘非德所親非俊唯囿是恢唯諛是信睮睮諂夫咢咢黃髮如何我王曾不是察既藐下臣追欲從逸嫚彼皓祖輕茲削黜嗟嗟我王漢之睦親曾不夙夜以休令聞穆穆天子臨爾下土明明群司執憲靡顧正遐繇近殆其怙茲嗟嗟我王曷不此思非思非鑒嗣其罔則彌彌其失岌岌其國致冰匪霜致隊靡嫚瞻惟我王昔靡不練興國救顛孰違悔過追思黃髮秦繆以霸歲月其徂年其逮耇於昔君子庶顯于後我王如何曾不斯覽黃髮不近胡不時監漢書韋賢傳文選十九詩紀二又類聚二十四引韋旗荒商光同邦寧京楚輔一弼緒祀保考娛驅俊信親聞二十三韻初學記十八作諷楚元王四言詩引娛驅俊信親聞六韻御覽六百九十引韋旗二韻韻補一引同邦二韻二引苗偷二韻在鄒詩微微小子既耇且陋豈不牽位穢我王朝王朝肅清惟俊之庭顧瞻余躬懼穢此征我之退征請于天子天子我恤矜我髮齒赫赫天子明哲且仁縣車之義以洎小臣嗟我小子豈不懷土庶我王寤越遷于魯既去禰祖惟懷惟顧祈祈我徒戴負盈路爰戾于鄒鬋茅作堂我徒我環築室于牆我既遷逝心存我舊夢我瀆上立于王朝其夢如何夢爭王室其爭如何夢王我弼寤其外邦歎其喟然念我祖考泣涕其漣微微老夫咨既遷絶洋洋仲尼視我遺烈濟濟鄒魯禮義唯恭誦習弦歌于異他邦我雖鄙耇心其好而我徒侃爾樂亦在而漢書韋賢傳廣文選九詩紀二又文選十六閒居賦注作安革猛詩引祁祁我徒一句黃鵠歌黃鵠飛兮下建章羽肅肅兮行蹌蹌金為衣兮菊為裳唼喋荷荇出入兼葭自願菲薄愧爾嘉祥西京雜記一御覽五百九十二古文苑四樂府詩集八十四廣文選十四詩紀一又初學記三十引章蹌祥三韻白帖二十九引章裳二韻御覽九百十六引章蹌裳祥四韻說文繫傳足部𨄚下作漢宣帝歌引章𨄚二韻爾雅翼三作漢武帝歌引裳一韻歌歸空城兮狗不吠雞不鳴橫術何廣廣兮固知國中之無人漢書燕刺王旦傳御覽一百五十五百七十樂府詩集八十五作燕王歌詩紀一華容夫人歌髮紛紛兮置渠骨籍籍兮亡居母求死子兮妻求死夫裴回兩渠間兮君子獨安居漢書燕刺王傳御覽一百五十五百七十樂府詩集八十五詩紀一歌徑萬里兮度沙漠為君將兮奮胸奴路窮絶兮矢刃摧士衆滅兮名已隤老母已死雖欲報恩將安歸漢書蘇武傳書鈔一百七漢書霍去病傳注文選六十祭顏光祿文注御覽四百八十八詩紀二又韻補一引幕奴二韻歌二首背尊章嫖以忽謀屈奇起自絶行周流自生患諒非望今誰怨漢書廣川惠王越傳樂府詩集八十四詩紀一愁莫愁居無聊心重結意不舒內茀鬱憂哀積上不見天生何益日崔隤時不再願棄軀死無悔同上歌欲久生兮無終長不樂兮安窮奉天期兮不得須臾千里馬兮駐待路黃泉下兮幽深人生要死何為苦心何用為樂心所喜出入無悰為樂亟蒿里召兮郭門閲死不得取代庸身自逝漢書廣陵厲王胥傳御覽一百五十五百七十樂府詩集八十五詩紀一吾家嫁我兮天一方遠託異國兮烏孫王廬為室兮旃為牆以肉為食兮酪為漿居常土思兮心內傷願為黃鵠兮還故鄉漢書西域傳玉臺新詠九書鈔一百六類聚四十三御覽五百七十樂府詩集八十四廣文選十四事類賦歌賦注草堂詩箋十二留花門詩注詩紀二又書鈔百三十四引方王牆三韻文選二十七王明君辭注引方王牆三韻四十一答蘇武書注引漿一韻御覽七百八引王壇二韻又七百九十五引通典録方王牆漿四韻歌詩田彼南山蕪穢不治種一頃豆落而為萁人生行樂耳須富貴何時漢書楊敞傳白帖二十三御覽八百二十一風雅翼補遺下詩紀二自劾詩赫矣我祖侯于豕韋賜命建伯有殷以綏厥績既昭車服有常朝宗商邑四牡翔翔德之令顯慶流于裔宗周至漢群后歷世肅肅楚傅輔翼元夷厥駟有庸惟慎惟祗嗣王孔佚越遷于鄒五世壙僚至我節侯惟我節侯顯德遐聞左右昭宣五品以訓既耇致位惟懿惟奐厥賜祁祁百金洎館國彼扶陽在京之東惟帝是留政謀是從繹繹六轡是列是理威儀濟濟朝享天子天子穆穆是宗是師四方遐爾觀國之輝茅土之繼在我俊兄惟我俊兄是讓是形於休厥德於赫有聲致我小子越留於京惟我小子不肅會同媠彼車服黜此附庸赫赫顯爵自我隊之微微附庸自我招之誰能忍愧寄之我顏誰將遐征從之夷蠻於赫三事匪俊匪作於蔑小子終焉其度誰謂華高企其齊而誰謂德難厲其庶而嗟我小子于二其尤隊彼令聲申此擇辭四方群后我監我視威儀車服唯肅是履漢書韋賢傳附玄成傳廣文選八詩紀二戒子孫詩於肅君子既令厥德儀服此恭棣棣其則咨余小子既德靡逮曾是車服荒嫚以隊明明天子俊德烈烈不遂我遺恤我九列我既茲恤惟夙惟夜畏忌是申供事靡憜天子我監登我三事顧我傷隊爵復我舊我既此登望我舊階先后茲度漣漣孔懷司直御事我熙我盛群公百僚我嘉我慶于異卿士非同我心三事惟囏莫我肯矜赫赫三事力雖此畢非我所度退其罔日昔我之隊畏不此居今我度茲戚戚其懼嗟我後人命其靡常靖享爾位瞻仰靡荒慎爾會同戒爾車服無媠爾儀以保爾域爾無我視不慎不整我之此復惟祿之幸於戲後人惟肅惟栗無忝顯祖以蕃漢室漢書韋賢傳附玄成傳廣文選卷八詩紀二七言博學多識與凡殊文選二西京賦注時將昏暮白日午文選十三雪賦注朅來歸耕永自疏文選十五思玄賦注二十一秋胡詩注二十九雜詩注結構野草起屋廬文選三十七出師表注作劉歆七言詩宴處從容觀詩書文選二十三贈士孫文始詩注引作劉向七略山鳥群鳴我心懷文選二十四贈秀才入軍詩注絶命辭玄雲泱鬱將安歸兮鷹隼橫厲鸞徘徊兮矰若浮焱動則機兮叢棘𢯆𢯆曷可棲兮發忠忘身自絶罔兮冤頸折翼庸得往兮涕泣流兮萑蘭心結愲兮傷肝虹霓曜兮日微孽杳冥兮未開痛入天兮嗚呼冤際絶兮誰語仰天光兮自列招上帝兮我察秋風為我吟浮雲為我陰嗟若是兮欲何留撫神龍兮攬其須游曠迥兮反亡期雄失據兮世我思漢書息夫躬傳文選補遺三十四詩紀二又白帖二十九引徊機棲往四韻文選三十七始出尚書省詩注引微一韻御覽三百七十六引蘭肝二韻怨詩新裂齊紈素鮮潔如霜雪裁為合歡扇團團似明月出入君懷袖動搖微風發常恐秋節至涼飆奪炎熱棄捐篋笥中恩情中道絶文選二十七玉臺新詠一類聚四十一又六十九引作扇詩白帖四引作詠扇詩樂府詩集四十二合璧事類外集六十不著撰人文章正宗二十九詩紀二又杜公瞻編珠一引雪月二韻文鏡祕府論西卷引雪月二韻及雪一韻初學記一月部引雪月二韻又風部引雪月發三韻初學記二雪部引雪月二韻又霜部引雪一韻又白帖一月部引雪月二韻雪部引雪一韻作詠扇詩霜部引雪一韻作扇詩又白帖二引雪一韻又文選三十和王主簿怨情詩注引雪月二韻又三十一雜體詩注引雪月二韻歲華紀麗三引熱絶二韻作紈扇詩御覽七百二引雪月發韻作扇詩又八百十四引雪月二韻黃氏集千家注杜工部詩史補遺五薄遊詩注引月韻一句事類賦扇賦引雪月發三韻作扇詩
