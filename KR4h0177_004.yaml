body:
  text: 詩詩上天弗恤夏命其卒呂氏春秋慎大篇石鼓詩一我車既攻我馬既同我車既好我馬既𩣸君子爰獵爰獵爰遊麀鹿速速君子之求彎彎𠧪弓弓茲以時我驅其畤其來趩趩𧾨𧾨炱炱即御即時麀鹿趚趚其來大垐我驅其樸其來𧾥𧾥射其𧱚屬石鼓詩二汧繄泛泛烝彼淖淵鰋鯉處之君子漁之漫漫有鯊其遊𧽾𧽾白魚皪皪其葅底鮮黃白其鯿有鮒有白其翊孔庶臠之洋洋𧽢𧽢其魚惟何惟鱮惟鯉何以𣙲之惟楊及柳石鼓詩三田車孔安鋚勒駻駻六師既簡左驂旛旛右驂騝騝我以隮于原我戎止陸宮車其寫秀弓時射麋豕孔庶麀鹿雉兔其原有迪其戎奔奔大車出洛亞獸白澤我執而勿射多庶䟏䟏君子迺樂石鼓詩四帥彼鑾車忽速填如秀弓孔碩彤矢鏃鏃四馬其寫六轡沃若徒駢孔庶廓騎宣博酋車載行如徒如章原隰陰陽趍趍六馬射之簇簇有貙如虎獸鹿如兕怡爾多賢迧禽奉雉我兔允異石鼓詩五我來自東零雨奔流逆湧盈盈渫隰君子既涉我馬流汧汧繄洎淒丞士駕言西歸舫舟自廓徒駢趠趠惟舟以行或陰或陽極深以戶出于水一方烝徒遑止其奔我以阻其乃事石鼓詩六宣猷作原作周道遄我辭攸除帥陂阪甲荓為世里希微𢔹𢔹乃罟漆栗柞棫其拔椶庸庸鳴條亞箬其華何為所遊𢥀𢥀水盩導旨樹幽晤石鼓詩七徒我嘽嘽然而師旅填然會同又繹以左戎障弓矢孔庶滔滔是熾射夫寫矢具奪舉㧘其徒肝來或群或友悉率左右燕樂天子來嗣王始振振復古我來攸止石鼓詩八彼走䮺䮺馬麃晳晳華雉位多庶微我師氏憲憲文武可其一之石鼓詩九我水既淨我道既平我行既止嘉樹則里天子永寧日惟丙申旭旭杲杲我其旁導乘馬既迧康駕彼四黃左驂䮯䮯右驂𩥹𩥹棨戟以奕汝不執德旛翰黎黎𣄠斿施施公謂大來余及如茲邑曷不余及石鼓詩十吳人憐亟朝夕警惕載西載北勿掩勿伐若而出奇進獻用特歸格蓻祖告于大祝禘嘗受享致其方寓逢中囿孔庶麀鹿原隰既坦疆理蕃蕃大田不蒐君子何求有謀有始周爰止于是古文苑一風雅逸篇三羅振玉石鼓文箋詩紀前集八佹詩天地易位四時易鄉列星隕墜旦暮晦盲幽闇登昭日月下藏公正無私反見縱橫志愛公利重樓疏堂無私罪人憼革二兵道德純備讒口將將仁人絀約敖暴擅強天下幽險恐失世英龜龍為蝘蜓鴟梟為鳳凰比干見刳孔子拘匡昭昭乎其知之明也郁郁乎其遇時之不祥也拂乎其欲禮義之大行也闇乎天下之晦盲也皓天不復憂無疆也千秋必反古之常也弟子勉學天不忘也聖人共手時幾將矣念彼遠方何其塞矣仁人絀約暴人衍矣忠臣危殆讒人般矣琁玉瑤珠不知佩也雜布與錦不知異也閭娵子奢莫之媒也嫫母力父是之喜也以盲為明以聾為聰以危為安以吉為凶嗚呼上天曷維其同荀子賦篇詩紀前集八又玉燭寶典十二作荀子荊楚歌賦引憘一韻類聚二十四作荀況賦危詩引鄉冥藏橫堂將強殃皇匡明祥行盲佩異媒喜聰凶同二十一韻文選四十五楊雄解嘲注作荀卿雲賦引皇一韻又五十一至褒四子講德論注引媒喜二韻楚辭七諫洪氏補注引佩一韻書後賦詩寶珍隋珠不知佩兮褘衣與絲不知異兮閭姝子奢莫之媒兮嫫母求之又甚喜之兮以瞽為明以聾為聰以是為非以吉為凶嗚呼上天曷惟其同戰國策楚策四韓詩外傳四詩紀前集八
