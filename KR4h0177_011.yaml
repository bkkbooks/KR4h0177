body:
  text: 馬援武溪深滔滔五溪一何深鳥飛不度獸不敢臨嗟哉五溪多毒淫古今注中樂府詩集七十四歐陽集古録上詩紀三射烏辭烏烏啞啞引弓射洞左腋陛下壽萬年臣為二千石初學記三十引風俗通太平寰宇記九詩紀四遠夷樂德歌大漢是治與天石意吏譯平端不從我來聞風向化所見奇異多賜繒布甘美酒食昌樂肉飛屈申悉備蠻夷貧薄無所報嗣願主長壽子孫昌熾遠夷慕德歌蠻夷所處日入之部慕義向化歸日出主聖德深恩與人富厚冬多霜雪夏多和雨寒溫時適部人多有涉危歷險不遠萬里去俗歸德心歸慈母遠夷懷德歌荒服之外土地墝埆食肉衣皮不見鹽穀吏譯傳風大漢安樂攜負歸仁觸冒險狹高山岐峻緣崖磻石木薄發家百宿到洛父子同賜懷抱匹帛傳告種人長願臣僕後漢書西南夷傳廣文選十四詩紀四又初學記十五引第二章京師上巳篇窈窕淑女美勝艷妃戴翡翠珥明珠書鈔百三十五五噫歌陟彼北芒兮噫顧覽帝京兮噫宮室崔嵬兮噫民之劬勞兮噫遼遼未央兮噫後漢書梁鴻傳書鈔一百六文選四十三與嵇茂齊書注御覽百五十八五百七十二寰宇記三文選補遺三十五廣文選十四又事類賦歌賦注詩紀三適吳詩逝舊邦兮遐征將遙集兮東南心惙怛兮傷悴忘菲菲兮升降欲乘策兮縱邁疾吾俗兮作讒競舉枉兮措直咸先佞兮唌唌固靡慚兮獨建冀異州兮尚賢聊道遙兮遨嬉纘仲尼兮周流儻云覩兮我悅遂舍車兮即浮過季札兮延陵求魯連兮海隅雖不察兮光貌幸神靈兮與休惟季春兮華阜麥含英兮方秀哀茂時兮逾邁愍芳香兮日臭悼吾心兮不獲長委結兮焉究口囂囂兮余訕嗟恇恇兮誰留後漢書梁鴻傳詩紀三又類聚三引秀一韻吳棫韻補二引隅休二韻思友詩鳴嚶嚶兮友之期念高子兮僕懷思相念恢兮爰集茲後漢書梁鴻傳詩紀三武德舞歌詩於穆世廟肅雍顯清俊乂翼翼秉文之成越序上帝駿奔來寧建立三雍封禪泰山章明圖讖放唐之文休矣惟德罔射協同本支百世永保蕨功續漢書祭祀志九注樂府五十二廣文選八詩紀三明堂詩於昭明堂明堂孔陽聖皇宗祀穆穆煌煌上帝宴饗五位時序誰其配之世祖光武普天率土各以其職猗歟緝熙允懷多福後漢書班固傳文選一御覽五百三十三風雅翼補遺下詩紀三辟雍詩乃流辟雍辟雍湯湯聖皇蒞止造舟為梁皤皤國老乃父乃兄抑抑威儀孝友光明於赫太上示我漢行洪化惟神永觀厥成後漢書班固傳文選一御覽五百三十四風雅翼補遺下詩紀三靈臺詩乃經靈臺靈臺既崇帝勤時登爰考休徵三光宣精五行布序習習祥風祁祁甘雨百穀蓁蓁庶草蕃廡屢惟豐年於皇樂胥後漢書班固傳文選一御覽五百三十四風雅翼補遺下詩紀三寶鼎詩嶽修貢兮川效珍吐金景兮歊浮雲寶鼎見兮色紛縕煥其炳兮被龍文登祖廟兮享聖神昭靈德兮彌億年後漢書班固傳文選一詩紀三白雉詩啓靈篇兮披瑞圖獲白雉兮效素烏嘉祥阜兮集皇都發皓羽兮奮翹英容潔朗兮於純精彰皇德兮侔周成永延長兮膺天慶後漢書班固傳文選一詩紀三靈芝歌因露寢兮産靈芝象三德兮瑞應圖延壽命兮光此都配上帝兮象太微參日月兮揚光輝初學記十五御覽五百七十樂府詩集一事類賦歌賦廣文選十一詩紀三喜禾歌后土化育兮四時行修靈液養兮元氣覆冬同雲兮春霡霂膏澤洽兮殖嘉穀御覽一詠史三王德彌薄惟後用肉刑太蒼令有罪就遞長安城自恨身無子困急獨煢煢小女痛父言死者不可生上書詣闕下思古歌雞鳴憂心摧折裂晨風揚激聲聖漢孝文帝惻然感至情百男何憒憒不如一緹縈史記倉公傳正義文選三十六策秀才文注廣文選八詩紀三詩長安何紛紛詔葬霍將軍刺繡被百領縣官給衣衾御覽八百十五寶劍值千金指之干樹枝書鈔百二十二御覽三百四十四延陵輕寶劍御覽三百四十四歌皇皇太上湛恩篤兮庶見我王咸思覿兮仁愛紛紜德優渥兮滂霈群生澤淋漉兮惠我無疆承天祉兮流衍萬昆長無已兮文館詞林三百四十六安封侯詩戎馬鳴兮金鼓震壯士激兮忘身命被兕甲兮跨良馬揮長戟兮彀強弩類聚五十九廣文選十詩紀三又御覽三百三十九引馬弩二韻七言詩鸞鳥高翔時來儀應治歸德合望規啄食楝實飲華池御覽九百十六百三家集崔亭伯集又皎皎練絲退濁污文選二十五答傅咸注三言詩屏九皋詠典文披五素耽三墳書鈔九十七迪志詩咨爾庶士逮時斯勗日月逾邁豈云旋復哀我經營膂力靡及在茲弱冠靡所樹立於赫我祖顯于殷國二迹阿衡克光其則武丁興商伊宗皇士爰作股肱萬邦是紀奕世載德迄我顯考保膺淑懿纘修其道漢之中葉俊乂式序秩彼殷宗光此勳緒伊余小子穢陋靡逮懼我世烈自茲以墜誰能革濁清我濯溉誰能昭暗啓我童昧先人有訓我訊我誥訓我嘉務誨我博學爰率朋友尋此舊則契闊夙迄庶不懈忒秩秩大猷紀綱庶式匪勤匪昭匪一匪測農夫不怠越有黍稷誰能云作考之居息二事敗葉多疾我力如彼遵衢則罔所極二志靡成聿勞我心如彼兼聽則溷於音於戲君子無恆自逸徂年如流鮮茲暇日行邁屢稅胡能有迄密勿朝夕聿同始卒後漢書傅毅傳廣文選八詩紀三又類聚二十二引勗復國則逮墜逸日八韻文選四十一論盛孝章書注引日一韻歌陟景山兮採芳苓哀不慘傷樂不流聲彈羽躍水叩角奮榮沈微玄穆感物寤靈類聚五十七贊賈逵詩摛藻揚暉如山如雲世有令聞以迄于君書鈔一百詩縹碧以為瓦白帖三劉駼騊詩九曲歌年歲晚暮時已斜安得壯士翻日車書鈔百四十九類聚一杜公瞻編珠御覽四事類賦日賦草堂詩箋十一洗馬詩注詩紀三肥骨消滅隨塵去文選二十八挽歌注武功歌鳴金鼓馬模起士激怒書鈔百二十一清埃飛連日月文選二十一謝宣遠張子房詩注恩普洽威令行文選五十九齊故安陸昭王碑注身非金石名俱滅焉文選三十七求自試表注費鳳別碑詩君諱鳳字伯蕭梁相之元子九江太守之長兄也世德襲爵銀艾相亞恢遐祖之鴻軌拓前代之休蹤邈逸越而難繼非群愚之所頌仁義本於心慈孝著於性不失典術行不越矩度清潔曒爾埿而不滓恤憂矜厄施而不記由近及遠靡不覆載故能闡令名而雲騰揚盛聲而風布踐郡右職三貢獻計辟州式部忠以衛上漢安二年吳郡太守東海郭君以君有逶蛇之節自公之操年卅一舉孝廉拜郎中除東國新平長神化風靡惠以流下靜而為治匪煩匪擾乾乾日稷矜此黔首功成事就色斯高舉宰司委職位思賢以自輔玄懿守謙虛白駒以逐阻丹陽有越寇沒命君討理之試守故鄣長蓋危亂有不讓又畏此之罪罟而牧爰止其師旅鴥若飛鷹鵕若夫虓虎強者綏以德弱者以仁撫簡在上帝心功訓而特紀轓興宰堂邑基月而致道視遂據亐卿尹中表之恩情兄弟與甥舅蔦與女蘿性樂松之茂好聞君顯令名舉宗為歡喜不悟奄忽終藏形而匿影耕夫釋耒耜桑婦投鉤莒道阻而且長望遠淚如雨策馬循大路搴裳而涉洧悠悠歌黍離思黃鳥集于楚惴惴之臨穴送君於厚土嗟嗟悲且傷每食不飽夫人篤舊好不以存亡改文平感渭陽悽愴益以甚諸姑咸璧踊爰及君伯姊孝孫字元宰生不識考妣追惟厥祖恩蓬首斬縗杖世所不能為流稱於鄉黨見吾若君存剝裂而不已一別會無期相去三千里絶翰永慷慨泣下不可止隸釋九續古文苑四
