body:
  text: 雜辭蠟辭土反其宅水歸其壑昆蟲勿作草木歸其宅禮記郊特牲文心雕龍祝盟篇詩紀前集六祠田辭荷此長耜耕彼南畝四海俱有文心雕龍祝盟篇詩紀前集六禱雨辭政不節與使民疾與何以不雨至斯極也宮室崇與婦謁盛與何以不雨至斯極也苞苴行與讒夫興與何以不雨至斯極也荀子大略篇詩紀前集六成王冠辭令月吉日王始加元服去王幼志服袞職欽若昊天六合是式率爾祖考永永無極家語冠頌解詩紀前集六作成王冠頌同前使王近於民遠於佞近於義嗇於時惠於財親賢使能大戴禮公符篇博物志五詩紀前集六士冠辭令月吉日始加元服棄爾幼志順爾成德壽考惟祺介爾景福儀禮士冠禮詩紀前集六吉月令辰乃申爾服敬爾威儀淑慎爾德眉壽萬年永受胡福同上以歲之正以月之令咸加爾服兄弟具在以成厥德黃耇無疆受天之慶同上甘醴惟厚嘉薦令芳拜受祭之以定爾祥承天之休壽考不忘同上旨酒既清嘉薦亶時始加元服兄弟具來孝友時格永乃保之同上旨酒既湑喜薦伊脯乃申爾服禮儀有序祭此嘉爵承天之祜同上旨酒令芳籩豆有楚咸加爾服布升折俎承天之慶受福無疆同上禮儀既備令月吉日昭告爾字爰字孔嘉髦士攸宜宜之于假永受保之同上嘏辭皇尸命工祝承致多福無疆于女孝孫來女孝孫使女受祿于天宜稼于田眉壽萬年勿替引之儀禮祭禮詩紀前集六祭辭皇皇上天照臨下土集地之靈降甘風雨庶物群生各得其所靡今靡古維豫一人某敬拜皇天之祜大戴禮公符篇詩紀前集六又博物志五作請雨引土雨所三韻薄薄之土承天之神興甘風雨庶卉百物莫不茂者既安且寧維豫一人某敬拜下土之靈同上維某年某月上日明光于上下勤施于四方旁作穆穆惟豫一年某敬拜迎于郊以正月朔日迎日於東郊同上祭侯辭惟若寧侯毋或若女不寧侯不屬於王所故抗而射女強飲強食詒爾曾孫諸侯百福周禮考工記詩紀前集六同上嗟爾不寧侯為爾不朝於王所故亢而射女強食爾食曾孫侯氏百福大戴禮投壼篇詩紀前集六禳田辭甌窶滿篝污邪滿車五穀蕃熟穰穰滿家史記滑稽列傳詩紀前集六作田者祝二首又荀子儒效篇注引說苑録前二句投壼辭有酒如淮有肉如坻寡君中此為諸侯師左傳昭公十二年傳詩紀前集七有酒如澠有肉如陵寡君中此與君代興同上渾良夫譟登此昆吾之虛綿綿生之瓜余為渾良夫叫天無辜左傳哀公十七年傳御覽八百八十三詩紀前集七狐援辭先出也衣絺紵後出也滿囹圄吾今見民之洋洋然東走而不知所處呂氏春秋貴直篇風雅逸篇二詩紀前集七有人自南方來鮒入而蜆居使人之朝為草國為墟殷有比干吳有子胥齊有狐援己不用若言又斫之東閭每斫者以吾參夫二子者乎呂氏春秋貴直篇詩紀前集七為士卒倡無可往矣宗廟亡矣魂魄喪矣歸何黨矣戰國策齊策六說苑指武篇風雅逸篇七作相士卒又詩紀前集七作士卒昌成相雜辭請成相世之殃愚暗愚暗墮賢良人主無賢如瞽無相何倀倀請布基慎聖人愚而自專事不治主忌苟勝群臣莫諫必逢災論臣過反其施尊主安國尚賢義拒諫飾非愚而上同國必禍曷謂罷國多私比周還主黨與施遠賢近讒忠臣蔽塞主勢移曷謂賢明君臣上能尊主愛下民主誠聽之天下為一四海賓主之孽讒人達賢能遁逃國乃蹶愚以重愚暗以重暗成為桀世之災妬賢能飛廉知政任惡來卑其志意大其園囿高其臺武王怒師牧野紂卒易鄉啓乃下武王善之封之於宋立其祖世之衰讒人歸比干見刳箕子纍武王誅之呂尚招麾殷民懷世之禍惡賢士子胥見殺百里徙穆公得之強配五伯六卿施世之愚惡大儒逆斥不通孔子拘展禽三絀春申道綴基畢輸請牧基賢者思堯在萬世如見之讒人罔極險陂傾側此之疑基必施辨賢罷文武之道同伏戲由之者治不由者亂何疑為凡成相辨法方至治之極復後王慎墨季惠百家之說誠不祥治復一修之吉君子執之心如結衆人二之讒夫棄之形是詰水至平端不傾心術如此象聖人而有勢直而用抴必參天世無王窮賢良暴人芻豢仁人糟糠禮樂滅息聖人隱伏墨術行治之經禮與刑君子以修百姓寧明德慎罰國家既治四海平治之志後勢富君子誠之好以待處之敦固有深藏之能遠思思乃精志之榮好而一之神以誠精神相反一而不二為聖人治之道美不老君子由之佼以好下以教誨子弟上以事祖考成相竭辭不蹶君子道之順以達宗其賢良辨其殃孽右一章請成相道聖王堯舜尚賢身辭讓許由善卷重義輕利行顯明堯讓賢以為民泛利兼愛德施均辨治上下貴賤有等明君臣堯授能舜遇時尚賢推德天下治雖有賢聖適不遇世孰知之堯不德舜不辭妻以二女任以事大人哉舜南面而立萬物備舜授禹以天下尚德推賢不失序外不避仇內不阿親賢者豫禹勞心力堯有德干戈不用三苗服舉舜甽畝任之天下身休息得后稷五穀殖夔為樂正鳥獸服契為司徒民知孝弟尊有德禹有功抑下鴻辟除民害逐共工北決九河通十二渚疏三江禹傅土平天下躬親為民行勞苦得益皋陶橫革直成為輔契玄王生昭明居於砥石遷于商十有四世乃有天乙是成湯天乙湯論舉當身讓卞隨舉牟光道古賢聖基必張願陳辭世亂惡善不此治隱諱疾賢良由姦詐鮮無災患難哉阪為先聖知不用愚者謀前車已覆後未知更何覺時不覺悟不知苦迷惑失指易上下忠不上達蒙掩耳目塞門戶門戶塞大迷惑悖亂昏莫不終極是非反易比周期上惡正直正直惡心無度邪枉辟回失道途已無郵人我獨自美豈無故不知戒後必有恨後遂過不肯悔讒夫多進反覆言語生詐態人之態不如備爭寵疾賢利惡忌妬功毀賢下斂黨與上蔽匿上壅蔽失輔勢任用讒夫不能制郭公長父之難厲王流於彘周幽厲所以敗不聽規諫忠是害嗟我何人獨不遇時當亂世欲對衷言不從恐為子胥身離凶進諫不聽剄而獨鹿棄之江觀往事以自戒治亂是非亦可識託於成相以喻意右一章請成相言治方君論有五約以明君謹守之下皆平正國乃昌臣下職莫游食務本節用財無極事業聽上莫得相使一民力守其職足衣食厚薄有等明爵服利往卬上莫得擅與孰私得君法明論有常表儀既設民知方進退有律莫得貴賤孰私王君法儀禁不為莫不說教名不移修之者榮離之者辱孰它師刑稱陳守其銀下不得用輕私門罪禍有律莫得輕重威不分請牧祺用有基主好論議必善謀五聽循領莫不理續主執持聽之經明其請參伍明謹施賞刑顯者必得隱者復顯民反誠言有節稽其實信誕以分賞罰必下不欺上皆以情言明若日上通利隱遠至觀法不法見不視耳目既顯吏敬法令莫敢恣君教出行有律吏謹將之無鈹滑下不私請各以所宜舍巧拙臣謹修君制變公察善思論不亂以治天下後世法之成律貫荀子下詩紀前集七
