body:
  text: 古詩詠譙君黃詩肅肅清節士執德實固貞違惡以授命沒世遺令聲華陽國志巴志傷三貞詩間關黃鳥爰集於樹窈窕淑女是繡是黼惟彼納黼其心匪石嗟爾臨川邈不可獲華陽國志巴志風巴郡太守詩明明上天下土是親帝選元后求定安民孰可不念禍福由人願君奉詔惟德日新華陽國志巴志刺巴郡郡守詩狗吠何喧喧有吏來在門披衣出門應府記欲得錢語窮乞請期吏怒反見尤旋步顧家中家中無可為思往從鄰貸鄰人已言匱錢錢何難得令我獨憔悴華陽國志巴志鳴沙石室古籍叢殘類書殘卷刺史門盧鵲條鳴沙石室古籍業殘略出金籯縣令子男之篇第二十四庭鵲喧條思治詩混混濁沼魚習習激清流溫溫亂國民業業仰前修華陽國志巴志張公神碑歌綦水湯湯揚清波東流折于河朝歌縣以潔靜無穢瑕公守相駕蜚魚往來悠忽遂熹娛佑此兆民寧厥居出自綦松柏鬱茂蘭公神往來乘浮雲種德收福惠斯民家饒戶富無貧疆界家靜和睦朝歌蕩陰及犁陽三女所處各殊方三門鼎列推其鄉時攜甥幼歸候公夫人容饗觴穆風屑兮起壇旁樂吏民兮永夫央鹿呦呦兮庭文樂樂兮飲清泉兮見伏兮不駭驚惟公德兮之所寧上陵廟兮助三牲天時和兮甘露泠日番兮無虧傾蜚兮朱鳥棲榮兮鳴喈喈䳒鵠勦兮乳徘徊給御卵兮獻于西惟公德兮之所懷池水兮釣臺粲四角樓兮臨深澗魚岌岌兮踊躍見振鱗尾兮游旰旰時釣取兮給烹獻惟公德兮之所衍栗蕭草兮藂鋪陳新美萌兮香苾芬蕙草生兮滿園田競苔茗兮給萬錢惟公德兮之所門堂鬱兮文耀光公神赫兮坐東方明暴視兮儼卬卬夫人女兮列在旁陳君處北兮從官車騎駱驛兮交錯重乘輗軺兮駕蜚龍驂白鹿兮從仙僮游北嶽兮與天通玄碑既立雙闕建兮大路畔兮亭長閽扞難兮列種槐梓方茂爛兮天下遠近不見兮公神日著聲洞遍兮乾川傳億萬兮隸釋三又歐陽氏集古録下引蜚熹居三韻李翊夫人碑歎陰陽分兮鐘律滋星月列兮有四時神宓設兮萬姓熹壽十二兮九九期五三末兮衰在姬秋發兮春華殆周公九兮成稱災靡黃髮兮蓋夭胎有皇兮氣所裁赴鴻淵兮逝不來鳳延頸兮泣交頤悲兮涕隕零寐耿耿兮摧傷情彼蒼天兮訴神靈𢝆切剝兮年不榮蘭茝亡兮喪芝英誰不忉兮作偯聲疇號兮鳴鶯鶯杞之至兮感動城陟四極兮升天庭曰司命兮致不平飛蜂𧓵兮害仁良魂魄孤兮獨煢煢陳礿祠兮返所生幽不見兮存厥荊嗟日遐兮適窅窅隸釋十二郭輔碑歌實惟先生虢仲之裔盛德遺祀休矣亦世孝友貞信仁恕好惠宜己自求不欲榮勢綽綽令人獲道之至篤生七子鍾天之祉堂堂四俊碩大婉敏娥娥三妃行追大姒葉葉昆嗣福祿茂止克昌厥後身去烈在鐫石作歌昭示萬祀隸釋十二風雨詩日不顯目兮黑雲多月不見視兮風非沙從恣蒙水誠江河州流灌注兮轉揚波辟柱槇到忘相加天門狹小路彭池無因以上如之何興詩教海兮誠難過漢晉西陲木簡彙編二編漢人風雨詩簡古詩十九首行行重行行與君生別離相去萬餘里各在天一涯道路阻且長會面安可知胡馬依北風越鳥巢南枝相去日已遠衣帶日已緩浮雲蔽白日遊子不顧返思君令人老歲月忽已晚棄捐勿復道努力加餐飯文選二十九玉臺新詠一作枚乘雜詩類聚二十九文章正宗二十九事文類聚別集二十五合璧事類四十六詩紀十又鳴沙石室古籍叢殘類書殘卷送別門引離崖期枝遠緩六韻文選十三鸚鵡賦注引枝一韻又白帖一文選十八嘯賦注草堂詩箋十八各引一句又御覽四百八十九引離涯期枝遠緩飯七韻青青河畔草鬱鬱園中柳盈盈樓上女皎皎當窗牖娥娥紅粉粧纖纖出素手昔為倡家女今為蕩子婦蕩子行不歸空床難獨守文選二十九玉臺新詠一作枚乘詩類聚三十二初學記十九事文類聚後十四作古樂府合璧事類三十八作古樂府詩紀十又書鈔百十二引婦一韻白帖六引守一韻青青陵上柏磊磊澗中石人生天地間忽如遠行客斗酒相娛樂聊厚不為薄驅車策駑馬游戲宛與洛洛中何鬱鬱冠帶自相索長衢羅夾巷王侯多第宅兩宮遙相望雙闕百餘尺極宴娛心意戚戚何所迫文選二十九詩紀十又書鈔百四十八作古樂府引客一韻又斗酒相娛樂一句今日良宴會歡樂難具陳彈箏奮逸響新聲妙入神令德唱高言識曲聽其真齊心同所願含意俱未伸人生寄一世奄忽若飆塵何不策高足先據要路津無為守貧賤轗軻長苦辛文選二十九詩紀十又書鈔百十作曹植引神一韻又類聚三十九引陳神申塵津辛六韻西北有高樓上與浮雲齊交疏結綺窗阿閣三重階上有絃歌聲音響一何悲誰能為此曲無乃杞梁妻清商隨風發中曲正徘徊一彈再三歎慷慨有餘哀不惜歌者苦但傷知音稀願為雙鴻鵠奮翅起高飛文選二十九玉臺一作枚乘詩文章正宗二十九詩紀十又文選十八琴賦注引希一韻二十送應氏詩注引飛一韻又御覽百八十八引階一韻涉江采芙蓉蘭澤多芳草采之欲遺誰所思在遠道還顧望舊鄉長路漫浩浩同心而離居憂傷以終老文選二十九玉臺新詠一作枚乘詩類聚二十九文章正宗二十九詩紀十又御覽九百九十九引草道二韻明月皎夜光促織鳴東壁玉衡指孟冬衆星何歷歷白露霑野草時節忽復易秋蟬鳴樹間玄鳥逝安適昔我同門友高舉振六翮不念攜手好棄我如遺跡南箕北有斗牽牛不負軛良無盤石固虛名復何益文選二十九文鏡祕府論西卷詩紀十冉冉孤生竹結根泰山阿與君為新婚兔絲附女蘿兔絲生有時夫婦會有宜千里遠結婚悠悠隔山陂思君令人老軒車來何遲傷彼蕙蘭花含英揚光輝過時而不采將隨秋草萎君亮執高節賤妾亦何為文選二十九玉臺新詠一樂府詩集七十四事文類聚後十三合璧事類六十廣文選十二詩紀十又文選二十六古意贈王中書詩注引一句白帖六引蘿一韻庭中有奇樹緑葉發華滋攀條折其榮將以遺所思馨香盈懷袖路遠莫致之此物何足貴但感別經時文選二十九玉臺新詠一作枚乘詩類聚二十九文章正宗二十九事文類聚別集二十五合璧事類續集四十六詩紀十迢迢牽牛星皎皎河漢女纖纖擢素手札札弄機杼終日不成章泣涕零如雨河漢清且淺相去復幾許盈盈一水間脈脈不得語文選二十九玉臺新詠一作枚乘詩玉燭寶典七月孟秋弟七類聚四初學記四御覽三十一文章正宗二十九事文類聚前集十詩紀十又書鈔百五十御覽八並引許雨二韻類聚六十五引女杼二韻白帖二引一句白帖二十二引杼雨二韻回車駕言邁悠悠涉長道四顧何茫茫東風搖百草所遇無故物焉得不速老盛衰各有時立身苦不早人生非金石豈能長壽考奄忽隨物化榮名以為寶文選二十九文章正宗二十九詩紀十又類聚二十七引道草老三韻御覽百九十五引道一韻又九百九十四引道草二韻東城高且長逶迤自相屬回風動地起秋草萋已緑四時更變化歲暮一何速晨風懷苦心蟋蟀傷局促蕩滌放情志何為自結束燕趙多佳人美者顏如玉被服羅裳衣當戶理清曲音響一何悲絃急知柱促馳情整巾帶沉吟聊躑躅思為雙飛燕銜泥巢君屋文選二十九玉臺新詠一作枚乘詩詩紀十又文選二十四贈秀才入軍詩注引一句又二十九雜詩注引促一韻御覽三百八十一引玉曲促屋四韻草堂詩箋四麗人行注作古樂府引一句驅車上東門遙望郭北墓白楊何蕭蕭松柏夾廣路下有陳死人杳杳即長暮潛寐黃泉下千載永不寤浩浩陰陽移年命如朝露人生忽如寄壽無金石固萬歲更相送賢聖莫能度服食求神仙多為藥所誤不如飲美酒被服紈與素文選二十九樂府詩集六十一作驅車上東門行合璧事類六十七作古樂府廣文選十二作驅詩上東門行詩紀十又僧法琳辨正論引誤素作三韻類聚四十一作古驅車上東門行引墓路暮寤露誤素七韻去者日以疏來者日以親出郭門直視但見丘與墳古墓犁為田松柏摧為薪白楊多悲風蕭蕭愁殺人思還故里閭欲歸道無因文選二十九類聚四十作古墟暮詩合璧事類六十七作古樂府詩紀十生年不滿百常懷千歲憂晝短苦夜長何不秉燭遊為樂當及時何能待來茲愚者愛惜費但為後世嗤仙人王子喬難可與等期文選二十九詩紀十又文選三十五七命注引憂一韻白帖四引游一韻御覽八百七十引憂遊二韻凜凜歲云暮螻蛄夕鳴悲涼風率已厲遊子寒無衣錦衾遺洛浦同袍與我違獨宿纍長夜夢想見容輝良人惟古歡枉駕惠前綏願得常巧笑攜手同車歸既來不須臾又不處重闈亮無晨風翼焉能凌風飛眄睞以適意引領遙相睎徙倚懷感傷垂涕沾雙扉文選二十九玉臺新詠一詩紀十孟冬寒氣至北風何慘栗愁多知夜長仰觀衆星列三五明月滿四五蟾兔缺客從遠方來遺我一書札上言長相思下言久離別置書懷袖中三歲字不滅一心抱區區懼君不識察文選二十九玉臺新詠一文章正宗二十九合璧事類續集四十八作古樂府詩紀十又書鈔百五十引缺一韻白帖十引札滅二韻文選三十五七命注引一句御覽四百八十九引劄別滅三韻又五百九十五引札滅二韻又六百六引札別二韻客從遠方來遺我一端綺相去萬餘里故人心尚爾文彩雙鴛鴦裁為合歡被著以長相思緣以結不解以膠投漆中誰能別離此文選二十九玉臺新詠一合璧事類外集三十九作古樂府詩紀十又白帖二引扇一韻又四引綺被二韻又御覽四百七十八引綺爾二韻綺被二韻明月何皎皎照我羅床緯憂愁不能寐攬衣起徘徊客行雖云樂不如早旋歸出戶獨倣徨愁思當告誰引領還入房淚下沾裳衣文選二十九玉臺新詠一作枚乘詩詩紀十又類聚二十九引帷徊歸三韻文選二十七燕歌行注引帷一韻御覽八百十六引帷一韻古詩五首上山採蘼蕪下山逢故夫長跪問故夫新人復何如新人雖言好未若故人姝顏色類相似手爪不相如新人從門入故人從閣去新人工織縑故人工織素織縑日一匹織素五丈餘將縑來比素新人不如故玉臺新詠一類聚三十二合璧事類二十八作古樂府詩紀十又類聚八十五白帖二御覽八百十四合璧事類外集六十四並引素餘故三韻鳴沙石室古籍叢殘類書殘卷御覽五百二十一並引夫如二韻又白帖三十二引素餘二韻御覽九百八十三引夫一韻草堂詩箋七白絲行注引素故二韻四坐且莫喧願聽歌一言請說銅爐器崔嵬象南山上枝似松柏下根據銅盤雕文各異類離婁自相聯誰能為此器公輸與魯班朱火然其中青煙揚其間從風入君懷四坐莫不歡香風難久居空令蕙草殘玉臺新詠一類聚七十初學記二十五引作古詩詠香爐詩合璧事類外集四十一作古樂府萬花谷後七廣文選十五詩紀十又御覽七百三引言山盤連間歎殘七韻韻補二引連班二韻及盤連二韻悲與親友別氣結不能言贈子以自愛道遠會見難人生無幾時顛沛在其間念子棄我去新心有所歡結志青雲上何時復來還玉臺新詠一廣文選十五詩紀十穆穆清風至吹我羅衣裾青袍似春草長條隨風舒朝登津梁山褰裳望所思安得抱柱信皎日以為期玉臺新詠一廣文選十五詩紀十又類聚八十一御覽九百九十四事類賦草賦注草堂詩箋二十一渡江詩注並引裾舒二韻蘭若生春陽涉冬猶盛滋願言追昔愛情款感四時美人在雲端天路隔無期夜光照玄陰長歎念所思誰謂我無憂積念發狂癡玉臺新詠一作枚乘詩廣文選十五詩紀十又草堂詩箋三十一雨晴詩注作枚乘詩引期一韻古詩三首橘柚垂華實乃在深山側聞君好我甘竊獨自雕飾委身玉盤中歷年冀見食芳菲不相投青黃忽改色人儻欲我知因君為羽翼古詩類苑七十七詩紀十又類聚八十六文選三十一雜體詩注御覽九百六十六九百七十三事類賦橘賦注並引側飾二韻又文選三十一雜體詩注引翼一韻十五從軍征八十始得歸道逢鄉里人家中有阿誰遙望是君家松柏冢纍纍兔從狗竇入雉從梁上飛中庭生旅穀井上生旅葵烹穀持作飯采葵持作羹羹飯一時熟不知貽阿誰出門東向望淚落沾我衣樂府詩集二十五紫騮馬歌辭古詩類苑七十七詩紀十新樹蘭蕙葩雜用杜蘅草終朝采其華日暮不盈抱采之欲遺誰所思在遠道馨香易銷歇繁華會枯槁悵望欲何言臨風送懷抱古詩類苑七十七詩紀十又類聚八十一御覽九百九十四並引草抱道三韻古詩步出城東門遙望江南路前日風雪中故人從此去我欲渡河水河水深無梁願為隻黃鵠高飛還故鄉古詩類苑八十四詩紀十李陵録別詩二十一首良時不再至離別在須臾屏營衢路側執手野踟蹰仰視浮雲馳奄忽互相踰風波一失所各在天一隅長當從此別且復立斯須欲因晨風發送子以賤驅文選二十九作與蘇武類聚二十九事文類聚別集二十五合璧事類續集四十六並作贈蘇武別初學記十八作贈蘇武文章正宗二十九作與蘇武詩紀二作與蘇武又御覽四百八十九作贈蘇武引逾涯二韻攜手上河梁遊子暮何之徘徊蹊路側悢悢不能辭行人難久留各言長相思安知非日月弦望自有時努力崇明德皓首以為期文選二十九作與蘇武類聚二十九初學記十八御覽四百八十九事文類聚別集二十五合璧事類續集四十六並作贈蘇武文章正宗二十九作與蘇武詩紀二作與蘇武又鳴沙石室古籍業殘類書殘卷作李陵詩引之一韻嘉會難再遇三載為千秋臨河濯長纓念子悵悠悠遠望悲風至對酒不能酬行人懷往路何以慰我愁獨有盈觴酒與子結綢繆文選二十九作與蘇武類聚二十九作贈蘇武別文章正宗二十九作與蘇武詩紀二作與蘇武又文選二十送應氏詩注引一句初學記十八作贈蘇武引秋修二韻骨肉緣枝葉結交亦相因四海皆兄弟誰為行路人況我連枝樹與子同一身昔為鴛與鴦今為參與辰昔者常相近邈若胡與秦惟念當乖離恩情日以新鹿鳴思野草可以喻嘉賓我有一尊酒欲以贈遠人願子留斟酌慰此平生親文選二十九作蘇武詩類聚二十九作蘇武詩詩紀二作蘇武詩又初學記十八作李陵贈蘇武詩引辰秦二韻又御覽四百八十九作李陵贈蘇武詩引商一韻結髮為夫妻恩愛雨不疑歡吳在今夕燕婉及良時征夫懷往路起視夜何其參辰皆已沒去去從此辭行役在戰場相見未有期握手一長歎淚為生別滋努力愛春華莫忘歡樂時生當復來歸死當長相思文選二十九玉臺新詠一並作蘇武詩文章正宗二十九作蘇武別詩詩紀二作蘇武詩又類聚二十九事文類聚別集二十五合璧事類續集四十六俱作蘇武別李陵詩引其辭期滋時思六韻黃鵠一遠別千里顧徘徊胡馬失其群思心常依依何況雙飛龍羽翼臨當乖幸有絃歌曲可以喻中懷請為遊子吟泠泠一何悲絲竹厲清聲慷慨有餘哀長歌正激烈中心愴以摧欲展清商曲念子不得歸俯仰內傷心淚下不可揮願為雙黃鵠送子俱遠飛文選二十九類聚二十九詩紀二並作蘇武詩又初學記十八作蘇武贈李陵詩引徊依二韻詩人玉屑二作蘇武詩引懷悲哀摧歸五韻燭燭晨明月馥馥我蘭芳芬馨良夜發隨風聞我堂征夫懷遠路遊子戀故鄉寒冬十二月晨起踐嚴霜仰觀江漢流仰視浮雲翔良友遠別離各在天一方山海隔中州相去悠且長嘉會難再遇歡樂殊未央願君崇令德隨時愛景光文選二十九作蘇武詩詩紀二作蘇武詩又初學記三作古詩引霜一韻有鳥西南飛熠熠似蒼鷹朝發天北隅暮聞日南陵欲寄一言去託之箋綵繒因風附輕翼以遺心蘊蒸鳥辭路悠長羽翼不能勝意欲從鳥逝駑馬不可乘古文苑四廣文選十詩紀十又御覽八百十四作李陵與蘇武詩引鷹陵繒三韻爍爍三星列拳拳月初生寒涼應節至蟋蟀夜悲鳴晨風動喬木枝葉日夜零遊子暮思歸塞耳不能聽遠望正蕭條百里無人聲豺狼鳴後園虎豹步前庭遠處天一隅苦困獨零丁親人隨風散歷歷如流星三萍離不結思心獨屏營願得萱草枝以解飢渴情古文苑四廣文選十詩紀十又藝文類聚二十九作李陵贈蘇武詩引生鳴零聽聲丁星情八韻文選三十七陳情表注作李陵贈蘇武詩引丁一韻寂寂君子坐奕奕合衆芳溫聲何穆穆因風動馨香清言振東序良時著西庠乃令絲竹音列席無高唱悲意何慷慨清歌正激揚長哀發華屋四坐莫不傷古文苑四廣文選十詩紀十晨風鳴北林熠耀東南飛願言所相思日暮不垂帷明月照高樓想見餘光輝玄鳥夜過庭髣佛能復飛褰裳路踟蹰倣徨不能歸浮雲日千里安知我心悲思得瓊樹枝以解長渴飢古文苑四類聚二十九作漢李陵贈蘇武別廣文選十詩紀十又書鈔百五十作李陵詩引輝一韻文選二十四為顧彥先贈婦注作李陵贈蘇武引渴一韻御覽百八十四作李陵詩引輝一韻陟彼南山隅送子淇水陽爾行西南遊我獨東北翔轅馬顧悲鳴五步一倣徨雙鳧相背飛相遠日已長遠望雲中路想見來圭璋萬里遙相思何益心獨傷隨時愛景曜願言莫相忘古文苑四類聚二十九作李陵贈蘇武別廣文選十詩紀十鍾子歌南音仲尼歎歸與戎馬悲邊鳴遊子戀故廬陽鳥歸飛雲蛟龍樂潛居人生一世間貴與願同俱身無四凶罪何為天一隅與其苦筋力必欲榮薄軀不如及清時策名於天衢同上鳳皇鳴高岡有翼不好飛安知鳳皇德貴其來見稀古文苑四作李陵録別詩類聚九十作漢李陵詩詩紀十紅塵蔽天地白日何冥冥古文苑四李陸録別詩文選五十五與大理書注引作李陸詩許由不洗耳後世有何徵文選五十五陸機演連珠注引李陵詩童童孤生柳寄根河水泥連翩遊客子干冬服涼衣去家千里餘一身常渴飢寒夜立清庭仰瞻天漢湄寒風吹我骨嚴霜切我肌憂心常慘戚晨風為我悲瑤光游何速行願支何遲仰視雲間星忽若割長帷低頭還自憐盛年行已衰依依戀明世愴愴難久懷古文苑四作蘇武答詩廣文選十作蘇武答別詩詩紀十又草堂詩箋十一獨酌詩注作蘇武答李陵引衰一韻雙鳧俱北飛一鳧獨南翔子當留斯館我當歸故鄉一別如秦胡會見何詎央愴悢切中懷不覺淚沾裳願子長努力言笑莫相忘古文苑四作蘇武別李陵類聚二十九作漢蘇武別李陵事文類聚別集二十五合璧事類續集四十六廣文選十詩紀十又初學記十八引翔鄉二韻白帖二十九作李陵詩引第一句御覽四百八十九及九百十九並作李陵贈蘇武詩引翔鄉二韻清涼伊夜沒微風動單幬書鈔百三十二作李陵贈蘇子卿詩招搖西北馳天漢東南流文選三十擬明月皎夜光詩注作李陵詩嚴父潛長夜慈母去中堂文選二十一三良詩注詠史詩注五十九齊故安陸昭王碑文注並引李陵詩行行且自割無令五內傷文選二十七王明君詞注又四十二與鍾大理書注並作李陵詩巖巖鍾山首赫赫炎天路高明曜雲門遠景灼寒素昂昂纍世士結根在所固呂望老匹夫苟為因世故管仲小囚臣獨能建功祚人生有何常但恐年歲暮幸託不肖軀且當猛虎步安能苦一身與世同舉厝由不慎小節庸夫笑我度呂望尚不希夷齊何足慕古文苑四廣文選十五詩紀三並作孔融雜詩又文選三十四七啓注四十三孫楚為石仲容與孫晧書注四十四為袁紹檄豫州注五十八辨亡論注均作李陵詩引步一韻遠送新行客戚暮乃來歸入門望愛子妻妾向人悲聞子不可見日已潛光輝孤墳在西北常念君來遲褰裳上墟丘但見蒿與薇白骨歸黃泉肌體乘塵飛生時不識父死後知我誰孤魂遊窮暮飄颻安所依人生圖嗣息爾死我念追俯仰內傷心不覺淚沾衣人生自有命但恨生日希古文苑四廣文選十五詩紀三並作孔融雜詩古詩二首採葵莫傷根傷根葵不生結交莫羞貧羞貧友不成類聚八十二鳴沙石室古籍叢殘類書殘卷草堂詩箋六示從姪詩注御覽四百六及九百七十九作古歌辭詩紀十甘瓜抱苦蒂美棗生荊棘利傍有倚刀貪人還自賊御覽九百六十五九百七十八事類賦瓜賦注詩紀十古絶句四首藁砧今何在山上復有山何當大刀頭破鏡飛上天玉臺十類聚五十六初學記一事文類聚前集二合璧事類續集五韻補二詩人玉屑一詩紀十又御覽七百六十二作古樂府引山一韻日暮秋雲陰江水清且深何用通音信連花玳瑁簪玉臺新詠十詩紀十菟絲從長風根莖無斷絶無情尚不離有情安可別同上南山一樹桂上有雙鴛鴦千年長交頸歡慶不相忘同上古詩一首青青陵中草傾葉晞朝日陽春布惠澤枝葉可纜結草木為恩感況人含氣血御覽九百九十四又韻補五引日結二韻古五雜俎詩五雜俎岡頭草往復還車馬道不獲已人將老藝文類聚五十六詩紀十古兩頭纖纖詩兩頭纖纖月初生半白半黑眼中睛腷腷膊膊雞初鳴磊磊落落向曙星藝文類聚五十六事類賦星賦注復古堂詩話詩紀十又草堂詩箋十七發秦詩注引生星二韻古詩啼呼哭泣如吹胡笳御覽四百八十七有客從南來贈我一抱筆書鈔一百四古詩誤作左傳泛泛江漢萍漂蕩水無根藝文類聚八十二離家千里客戚戚多思復文選二十五登海嶠詩注又二十七還都詩注作古歌日暮塗且遠遊子悲故鄉白帖十屢見流芳歇文選三十四七啓注石門通越井寰宇記百五十七古遊仙詩帶我瓊瑤佩飱我沆𩐁漿鳴沙石室古籍叢殘類書殘卷神仙門
