body:
  text: 郊廟歌辭安世房中歌大孝備矣休德昭清高張四縣樂充宮庭芬樹羽林雲景杳冥金支秀華庶旄翠旌七始華始肅倡和聲神來晏娭庶幾是聽漢書禮樂志樂府詩集八文選補遺三十四廣文選十一詩紀二粥粥音送細齊人情忽乘青玄熙事備成清思眑眑經緯冥冥同上我定曆數人告其心勑身齊戒施教申申乃立祖廟敬明尊親大矣孝熙四極爰轃同上王侯秉德其鄰翼翼顯明昭式清明鬯矣皇帝孝德竟全大功撫安四極同上海內有姦紛亂東北詔撫成師武臣承德行樂交逆簫勺群慝肅為濟哉蓋定燕國同上大海蕩蕩水所歸高賢愈愈民所懷大山崔百卉殖民何貴貴有德同上安其所樂終産樂終産世繼緒飛龍秋遊上天高賢愈樂民人同上豐草葽女羅施善何如誰能回大莫大成教德長莫長被無極同上雷震震電耀耀明德鄉治本約治本約澤弘大加被寵咸相保德施大世曼壽同上都荔遂芳窅窊桂華孝奏天儀若日月光乘玄四龍回馳北行羽旄殷盛芬哉芒芒孝道隨世我署文章同上馮馮翼翼承天之則吾易久遠燭明四極同上慈惠所愛美若休德杳杳冥冥克綽永福同上磑磑即即師象山則嗚呼孝哉案撫戎國蠻夷竭歡象來致福兼臨是愛終無兵革同上嘉薦芳矣告靈饗矣告靈既饗德音孔臧惟德之臧建侯之常承保天休令問不忘同上皇皇鴻明蕩侯休德嘉承天明伊樂厥福在樂不荒惟民之則浚則師德下民咸殖令問在舊孔容翼翼同上孔容之常承帝之明下民之樂子孫保光承順溫良受帝之光嘉薦令芳壽考不忘同上承帝明德師象山則雲施稱民永受厥福承容之常承帝之明下民安樂萬壽無疆漢書禮樂志樂府詩集八文選補遺三十四廣文選十一詩紀二練時日練時日侯有望焫膋蕭延四方九重開靈之斿垂惠恩鴻祜休靈之車結玄雲駕飛龍羽旄紛靈之下若風馬左倉龍右白虎靈之來神哉沛先以雨般裔裔雲之至慶陰陰相放𢘍震淡心靈已坐五音飭虞至旦承靈億牲繭栗粢盛香尊桂酒賓八鄉靈安留吟青黃遍觀此眺瑤堂衆嫭並綽奇麗顏如荼逃逐靡被華文側霧縠曳阿錫佩珠玉俠嘉夜茝蘭芳淡容與獻嘉觴漢書禮樂志樂府詩集一文選補遺三十四廣文選十一詩紀五帝臨帝臨中壇四方承宇繩繩意變備得其所清和六合制數以五海內安寧興文匽武后土富媼昭明三光穆穆優遊嘉服上黃同上青陽青陽開動根荄以遂膏潤并愛跂行畢逮霆聲發榮壧處頃聽枯稿復産乃成厥命衆庶熙熙施及夭胎群生啿啿惟春之祺同上朱明朱明盛長敷與萬物桐生茂豫靡有所詘敷華就實既阜既昌登成甫田百鬼迪嘗大廣建祀肅雍不忘神若宥之傳世無疆同上西皓西皓沆碭秋氣肅殺含秀垂穎續舊不廢姦偽不萌祅孽伏息隅辟越遠四貉咸服既畏茲威惟慕純德附而不驕正心翊翊同上玄冥玄冥陵陰蟄蟲蓋藏草木零落抵冬降霜易亂除邪革正異俗兆民反本抱素懷朴條理信義望禮五嶽籍斂之時掩收嘉穀同上惟泰元惟泰元尊媼神蕃釐經緯天地作成四時精建日月星辰度理陰陽五行周而復始雲風靁電降甘露雨百姓蕃滋咸循厥緒繼統共勤順皇之德鸞路龍鱗罔不肸飾嘉籩列陳庶幾宴享滅除凶災烈騰八荒鐘鼓竽笙雲舞翔翔招搖靈旗九夷賓將同上天地天地並況惟豫有慕爰熙紫壇思求厥路恭承禋祀縕豫為紛黼繡周張承神至尊千童羅舞成八溢合好效歡虞泰一九歌畢奏斐然殊鳴琴竽瑟會軒朱璆磬金鼓靈其有喜百官濟濟各敬厥事盛牲實俎進聞膏神奄留臨須搖長麗前掞光耀明寒暑不忒況皇章展詩應律鋗玉鳴函宮吐角激徵清發梁揚羽申以商造茲新音永久長聲氣遠條鳳鳥鴹神夕奄虞蓋孔享漢書禮樂志初學記十五樂府詩集一文選補遺三十四廣文選十一詩紀五日出入日出入安窮時世不與人同故春非我春夏非我夏秋非我秋冬非我冬泊如四海之池遍觀是耶謂何吾知所樂獨樂六龍六龍之調使我心若訾黃其何不徠下漢書禮樂志樂府詩集一文選補遺三十四廣文選十一詩紀五天馬太一況天馬下霑赤汗沫流赭志俶儻精權奇籋浮雲暗上馳體容與迣萬里今安匹龍為友漢書禮樂志類聚九十三御覽八百九十四樂府詩集一文選補遺三十四廣文選十一詩紀五又文選三十五七命注引第二句天馬徠從西極涉流沙九夷服天馬徠出泉水虎脊兩化若鬼天馬徠歷無草徑千里循東道天馬徠執徐時將搖舉誰與期天馬徠開遠門竦豫身逝昆侖天馬徠龍之媒遊閭闔觀玉臺漢書禮樂志樂府詩集一文選補遺三十四廣文選十一詩紀五又水經二河水注引草道二韻類聚九十三引極服草道門崙媒臺八韻文選十四赭白馬賦注引極一韻又二十三詠懷詩注引極服草道四韻白帖十八引極一韻御覽三十八引門崙二韻又八百九十四引極服草道門崙媒臺八韻事類賦馬賦引極服草道媒臺六韻天門天門開詄蕩蕩穆並騁以臨饗光夜燭德信著靈寖平而鴻長生豫太朱塗廣夷石為堂飾玉梢以舞歌體招搖若永望星留俞塞隕光照紫幄珠熉黃幡比翅回集二雙飛常羊月穆穆以金波日華耀以宣明假清風軋忽激長至重觴神裴回若留放殣冀親以肆章函蒙祉福常若期寂漻上天知厥時泛泛滇滇從高斿殷勤此路臚所求佻正嘉吉弘以昌休嘉砰隱溢四方栽專精厲意逝九閡紛云六幕浮大海漢書禮樂志樂府詩集一文選補遺三十四廣文選十一詩紀五景星景星顯見信星彪列象載昭庭日親以察參侔開闔爰推本紀汾脽出鼎皇祜元始五音六律依韋饗昭雜變並會雅聲遠姚空桑琴瑟結信成四興迭代八風生殷殷鐘石羽籥鳴河龍供鯉醇犧牲百末旨酒布蘭生泰尊柘漿析朝酲微感心攸通修名周流常羊思所并穰穰復正直往寧馮蠵切和疏寫平上天布施后土成穰穰豐年四時榮漢書禮樂志樂府詩集一文選補遺三十四廣文選十一詩紀五又御覽八百六十一引醒一韻九百七十四引生酲二韻齊房齊房産草九莖連葉宮童效異披圖案諜玄氣之精回復此都蔓蔓日茂芝成靈華漢書禮樂志樂府詩集一文選補遺三十四廣文選十一詩紀五后皇后皇嘉壇立玄黃服物發冀州兆蒙祉福沇沇四塞徦狄合處經營萬億咸遂厥宇同上華燁燁華燁燁固靈根神之斿過天門車千乘敦昆侖神之出排玉房周流雜拔蘭堂神之行旌容容騎沓沓舨縱縱神之徠泛翊翊甘露降慶雲集神之揄臨壇宇九疑賓夔龍舞神安坐鴹吉時共翊翊合所思神喜虞申二觴福滂洋邁延長沛施祐汾之阿揚金光橫泰河莽若雲增揚波遍臚歡騰天歌同上五神五神相包四鄰土地廣揚浮雲扢嘉壇椒蘭房璧玉精垂華光益億年美始興交於神若有承廣宣延咸畢觴靈輿位偃蹇驤卉汨臚析奚遺淫淥澤汪然歸同上朝隴首朝隴首覽西垠靁電尞獲白麟爰五止顯黃德圖胸虐熏鬻殛闢流離抑不詳賓百僚山河饗掩回轅鬗長馳勝雨師灑路陂流星隕感惟風籋歸雲撫懷心同上象載瑜象載瑜白集西食甘露飲榮泉赤雁集六紛員殊翁雜五采文神所見施祉福登蓬萊結無極同上赤蛟赤蛟綏黃華蓋露夜零晝暗濭百君禮六龍位勺椒漿靈已醉靈既享錫吉祥芒芒極降嘉觴靈殷殷爛揚光延壽命永未央杳冥冥塞六合澤汪濊輯萬國靈禗禗象輿轙票然逝旗逶蛇禮樂成靈將歸托玄德長無衰同上朱鷺朱鷺何食食茄下不食不吐將以問諫者宋書樂志樂府詩集十六詩紀五思悲翁思悲翁唐思奪我美人侵以遇悲翁但思蓬首狗逐狡兔食交君梟子五梟母六拉沓高飛莫安宿同上艾如張艾而張羅夷於何行成之四時和山出黃雀亦有羅雀以高飛奈雀何為此倚欲誰肯礞室同上上之回上之回所中益夏將至行將北以承甘泉宮寒暑德遊石關望諸國月支臣胸奴服令從百官疾驅馳千秋萬歲樂無極宋書樂志樂府詩集十六文選補遺三十四廣文選十二詩紀五翁離擁離趾中可築室何用葺之蕙用蘭擁離趾中宋書樂志樂府詩集十六詩紀五戰城南戰城南死郭北野死不葬烏可食為我謂烏且為客豪野死諒不葬腐肉安能去子逃水深激激蒲葦冥冥梟騎戰鬭死駑馬裴回鳴梁築室何南梁何北禾黍而穫君何食願為忠臣安可得思子良臣良臣誠可思朝行出攻莫不夜歸宋書樂志樂府詩集十六文選補遺三十四風雅翼選詩補遺下廣文選十二詩紀五巫山高巫山高高以大淮水深難以逝我欲東歸害梁不為我集無高曳水何梁湯湯回回臨水遠望泣下沾衣遠道之人心思歸謂之何宋書樂志樂府詩集十六廣文選十二詩紀五上陵上陵何美美下津風以寒問客從何來言從水中央桂樹為君船青絲為君笮木蘭為君棹黃金錯其間滄海之雀赤翅鴻白鴈隨山林乍開乍合曾不知日月明醴泉之水光澤何蔚蔚芝為車龍為馬覽遨遊四海外甘露初二年芝生銅池中仙人下來飲延壽千萬歲宋書樂志樂府詩集十六廣文選十二詩紀五又書鈔百三十八御覽七百七十一並引笮間二韻將進酒將進酒乘大白辨加哉詩審搏放故歌心所作同陰氣詩悉索使禹良工觀者苦宋書樂志樂府詩集十六詩紀五君馬黃君馬黃臣馬蒼二馬同逐臣馬良易之有騩蔡有赭美人歸以南駕車馳馬美人傷我心佳人歸以北駕車馳馬佳人安終極宋書樂志樂府詩集十六文選補遺三十四風雅翼選詩補遺下廣文選十二詩紀五芳樹芳樹日月君亂如於風芳樹不上無心溫而鵠三而為行臨蘭池心中懷悵心不可匡目不可顧妬人之子愁殺人君有它心樂不可禁王將何似如絲如魚乎悲矣宋書樂志樂府詩集十六詩紀五有所思有所思乃在大海南何用問遺君雙珠玳瑁簪用玉紹繚之聞君有它心拉雜摧燒之摧燒之當風揚其灰從今以往勿復相思相思與君絶雞鳴狗吠兄嫂當知之秋風肅肅晨風颸東方須臾高知之宋書樂志樂府詩集十六廣文選十二詩紀五又御覽六百八十八引南簪二韻雉子班雉子班如此之于雉梁無以吾翁孺雉子知得雉子高飛止黃鵠飛之以千里王可思雄來飛從雌視子趨一雉雉子車大駕馬滕被王送行所中堯羊飛從王孫行宋書樂志樂府詩集十六詩紀五聖人出聖人出陰陽和美人出遊九河佳人來騑離哉何駕六飛龍四時和君之臣明護不道美人哉宜天子免甘星筮樂甫始美人子含四海宋書樂志樂府詩集十六廣文選十二詩紀五上邪上邪我欲與君相知長命無絶衰山無陵江水為竭冬雷震震夏雨雪天地合乃敢與君絶宋書樂志樂府詩集十六廣文選十二詩紀五臨高臺臨高臺以軒下有清水清且寒江有香草目以蘭黃鵠高飛離哉翻關弓射鵠令我主壽萬年收中吾宋書樂志樂府詩集十六風雅翼選詩補遺下廣文選十二詩紀五遠如期遠如期益如壽處天左側大樂萬歲與天無極雅樂陳佳哉紛單于自歸動如驚心虞心大佳萬人還來謁者引鄉殿陳纍世未嘗聞之增壽萬年亦誠哉宋書樂志樂府詩集十六廣文選十二詩紀五石留石留涼陽涼石水流為沙錫以微河為香向始𥡙冷將風陽北逝肯無敢與于揚心邪懷蘭志金安薄北方開留離蘭宋書樂志樂府詩集十六詩紀五
