body:
  text: 歌辭漁陽民為張堪歌桑無附枝麥穗兩歧張君為政樂不可支後漢書張堪傳水經注沽水注書鈔七十六引華嶠後漢書類聚十九五十八十五引東觀漢記初學記二十七白帖二十一文選三十六策秀才文注鳴沙石室古籍叢殘御覽二百六十四百六十五八百三十八九百五十五引謝承後漢書樂府詩集八十五作張君歌文選補遺三十五作漁陽民歌詩紀八作張君歌臨淮吏人為宋暉歌彊直自遂南陽朱季吏畏其威民懷其惠後漢書朱暉傳御覽二百六十四百二十七四百六十五俱引東觀漢記樂府詩集八十五作朱暉歌文選補遺三十五作臨淮民歌詩紀八作朱暉歌涼州民為樊曄歌遊子常苦貧力子天所當寧見乳虎穴不入冀府寺大笑期必死忿怒或見置嗟我樊府君安可再遭值後漢書樊曄傳樂府八十五文選補遺三十五作涼州歌詩紀八又顏氏家訓書證篇引寺一韻書鈔七十引東觀漢記引府置植三韻御覽二百六十二引東觀漢記引富寺值三韻董少平歌枹鼓不鳴董少平後漢書董宣傳白帖十二樂府詩集八十五詩紀八作董宣歌郭喬卿歌厥德仁明郭喬卿中正朝廷上下平後漢書蔡茂傳渚宮舊事四類聚十九引謝承後漢書御覽二百十四百六十五樂府詩集八十五詩紀八蜀中為費貽歌節義至仁費奉君不仕亂世不避惡君華陽國志犍為士女贊鮑司隸歌鮑氏驄三人司隸再入公馬雖瘦行步工書鈔六十一引列異記御覽二百五十引列異傳八百九十七引列異記樂府詩集八十五詩紀八通博南歌漢德廣開不賓度博南越蘭津度蘭倉為他人後漢書西南夷傳華陽國志南中志水經注若水注御覽五十九七百八十六詩紀八蜀郡民為廉范歌廉叔度來何暮不禁火民安作平生無襦今五袴後漢書廉范傳書鈔百二十九類聚十九五十白帖四十二二十一御覽四百六十五六百九十五八百六十八樂府詩集八十五作廉叔度歌文選補遺三十五作蜀民歌詩紀八作廉范歌又華陽國志蜀志子類聚六十七引暮袴二韻白帖二十四引堵袴二韻白帖二十四引堵袴二韻韻補引暮作二韻蒼梧人為陳臨歌蒼梧陳君恩廣大令死罪囚有後代德參古賢天報施御覽四百六十五引謝承後漢書詩紀八作陳臨歌又蒼梧府君惠及死能令死人不絶嗣輿地紀勝一百八詩紀八鄉人為秦護歌冬無袴有秦護御覽六百九十五引謝承後漢書魏郡輿人歌我有枳棘岑君伐之我有蟊賊岑君遏之狗吠不驚足下生氂含脯鼓腹焉知凶災我喜我生獨于斯時美矣岑君於戲休茲後漢書岑彭傳類聚十九引謝承後漢書御覽二百六十引華嶠後漢書御覽四百六十五引謝承後漢書樂府詩集八十五作岑君歌文選補遺三十五詩紀八又書鈔七十六引之之釐三韻三十五引狗吠不驚獨於斯時二句范史雲歌甑中生塵范史雲釜中生魚范萊蕪後漢書本傳類聚三十五引續漢書初學記十八引續漢書白帖二十一御覽四百二十五引袁山松後漢書四百六十五引東觀漢記四百八十四引續漢書樂府詩集八十五詩紀八又御覽三十七引謝承後漢書引雲一韻順陽吏民為劉陶歌悒然不樂思我劉君何時復來安此下民後漢書本傳水經注淮水注作童謠歌類聚十九五十白帖十二四十御覽二百六十七四百六十五樂府詩集八十五及詩紀八作劉君歌文選補遺三十五作順陽民歌董逃歌承樂世董逃遊四郭董逃蒙天恩董逃帶金紫董逃行詩恩董逃整車騎董逃垂欲發董逃與中辭董逃出西門董逃瞻宮殿董逃望京城董逃日夜絶董逃心摧傷董逃後漢書五行志詩紀八交址兵民為賈琮歌賈父來晚使我先反今見清平吏不敢飯後漢書本傳類聚五十引謝承後漢書御覽二百五十六又四百六十五引司馬彪續漢書樂府詩集八十五及詩紀八作賈父歌文選補遺三十五作交址民歌皇甫嵩歌天下大亂兮市為墟母不保子兮妻失夫賴得皇甫兮復安居後漢書本傳類聚十九五十御覽二百五十四百六十五樂府詩集八十五文選補遺三十五作百姓歌詩紀八洛陽人為祝良歌天久不雨蒸民失所天王自出祝令特苦精符感應滂沱而下水經注洛水注書鈔九十御覽五百二十九樂府詩集八十五及詩紀八作洛陽令歌巴人歌陳紀山築室載直梁國人以貞真邪娛不揚目狂行不動身奸軌僻乎遠理義協乎民華陽國志巴志汲縣長老為崔瑗歌上天降神明錫我仁慈父臨民布德澤恩惠施以序穿溝廣溉灌決渠作甘雨御覽二百六十八引崔氏家傳四百六十五引崔鴻崔氏家傳詩紀八作崔瑗歌崔君歌䟆治小序兮稼穡分天賜我兮此崔君鳴沙石室古籍叢殘略出籯金縣令子男之篇第二十四小序條彭子陽歌時歲倉卒盜賊縱橫大戟強弩不可當賴遇賢令彭子陽書鈔三十九御覽三百五十二四百六十五王世容歌王世容治無雙省徭役盜賊空藝文類聚十九御覽四百六十五樂府詩集八十五詩紀二十巴郡人為吳資歌習習晨風動澍雨潤禾苗我后恤時務我人以優饒華陽國志巴志御覽二百六十二四百六十五詩紀八作吳資歌又歌望遠忽不見惆長當徘徊恩澤實難忘悠悠心永懷華陽國志巴志書鈔七十六御覽二百六十二詩紀八六縣吏人為爰珍歌我有田疇爰父殖置我有子弟爰父教誨後漢時蜀中童謠黃牛白腹五銖當復後漢書五行志又公孫述傳華陽國志公孫述劉二牧志御覽四百六十五八百三十五樂府詩集八十八文選補遺三十五作蜀童謠詩紀八會稽童謠棄我戟損我矛盜賊盡吏皆休後漢書張霸傳類聚十九御覽三百五十二又四百六十五引續漢書樂府詩集八十七詩紀八同前城上烏鳴哺父母府中諸吏皆孝友御覽二百六十二引益都耆舊傳四百十二引東觀漢記詩紀八河內謠王稚子世未有平徭役百姓喜華陽國志廣漢士女傳御覽四百六十五詩紀八順帝末京都童謠直如弦死道邊曲和鉤反封侯後漢書五行志意林四後漢書桓帝紀注文選三十一袁陽源詩注御覽四百二十八引李固別傳七百六十七引風俗通樂府詩集八十八文選補遺三十五詩紀八蜀郡童謠兩日出天兵戢書鈔七十六益都民為王忳謠信哉少林世為遇飛被走馬與鬼語還冤記御覽四百六十五恆農童謠君不我憂人何以休不行界署焉知人處廣博物志御覽四百六十五桓帝初天下童謠小麥青青大麥枯誰當穫者婦與姑丈夫何在西擊胡吏買馬君具車請為諸君鼓嚨胡後漢書五行志玉臺新詠九作桓帝時童謠歌樂府詩集八十八及詩紀八作桓帝初小麥童謠文選補遺三十五作小麥謠桓帝初城上烏童謠城上烏尾畢逋公為吏子為徒一徒死百乘車車班班入河間河間姹女工數錢以錢為室金為堂石上慊慊舂黃粱梁下有懸鼓我欲擊之丞卿怒後漢書五行志玉臺新詠九後漢書靈帝紀注類聚四十三作後漢桓帝時童謠御覽八百四十二樂府詩集八十八文選補遺三十五作城上烏謠詩紀八作城上烏童謠又初學記三十及御覽九百二十引烏逋雛徒車五韻白帖二十九引烏雛徒三韻桓帝時京都童謠游平賣印自有平不辟豪賢及大姓後漢書五行志後漢書竇武傳注樂府詩集八十八及詩紀八作桓帝初京都童謠文選補遺三十作賣印童謠桓帝末京都童謠白蓋小車何延延河間來合諧河間來合諧後漢書五行志樂府詩集八十八詩紀八茅田一頃中有井四方纖纖不可整嚼復嚼今年尚可後年鐃後漢書五行志注又竇武傳注文選補遺三十五作茅田童謠詩紀八鄉人謠天下規矩房伯武因師獲印周仲進後漢書黨錮傳序詩紀八二郡謠汝南太守范孟博南陽宗資主畫諾南陽太守岑公孝弘農成瑨但坐嘯後漢書黨錮傳序書鈔七十七御覽二百六十四樂府詩集八十七詩紀八又白帖十二引孝嘯博諾四韻三君天下忠誠竇游平天下義府陳仲舉天下德弘劉仲承八俊天下模楷李元禮天下英秀王叔茂天下良輔杜周甫天下冰凌朱季陵天下忠貞魏少英天下好交荀伯條天下稽古劉伯祖天下才英趙仲經八顧天下和雍郭林宗天下慕恃夏子治天下英藩尹伯元天下清苦羊嗣祖天下寶金劉叔林天下雅志蔡孟喜天下臥虎巴恭祖天下通儒宗孝初八及海內貴珍陳子鱗海內忠烈張元節海內謇諤范孟博海內通士檀文友海內彬彬范仲真海內珍好岑公孝海內所稱劉景升八廚海內賢智王伯義海內修整蕃嘉景海內貞良秦平王海內珍奇胡母季皮海內光光劉子相海內依怙王文祖海內嚴恪張孟卓海內清明度博平後漢書黨錮傳序詩紀八御覽四百六十五略引袁山松書六百九十三略引古今善言京兆為李燮謠我府君道教舉恩如春威如虎剛不吐柔不茹愛如母訓如父類聚十九御覽四百六十五並引續漢書樂府詩集八十七作京兆謠詩紀八御覽二百五十二引李燮傳引舉虎父三韻靈帝末京都童謠侯非侯王非王千乘萬騎上北芒後漢書五行志三國志董卓傳注後漢書靈帝紀注御覽四十二樂府詩集八十八詩紀八獻帝初京都童謠千里草何青青十日卜不得生後漢書五行志三國志董卓傳注意林四樂府詩集八十八文選補遺三十五作京都童謠詩紀八獻帝初童謠燕南垂趙北際中央不合大如礪唯有此中可避世後漢書公孫瓚傳三國志公孫瓚傳注御覽百六十二七百六十七樂府詩集八十八詩紀八初平中長安謠頭白皓然食不充糧裹衣蹇裳當還故鄉聖王愍念悉用補郎舍是布衣被彼玄黃後漢書獻帝紀注興平中吳中童謠黃金車班蘭耳開閶門出天子三國志吳書孫權傳詩紀八建安初荊州童謠八九年間始欲衰至十三年無孑遺後漢書五行志搜神記六渚宮舊事四詩紀八漢末洛中童謠雖有千黃金無如我斗粟斗粟自可飽千金何所直御覽八百四十漢末江淮間童謠大兵如市人死如林持金易粟粟貴於金御覽八百四十京師為光祿茂才謠欲得不能光祿茂才後漢書黃琬傳詩紀八作京都謠閻君謠閻君賦政既明且昶去苛去碎動以禮讓華陽國志十御覽四百六十五詩紀八東門奐謠東門奐取吳半吳不足濟陰續御覽四百九十二商子華謠石里之之勇商子華暴虎見之藏爪牙御覽四百三十六引殷氏家傳四百六十五引商氏家傳時人謠五侯之鬭血成江白帖十五擲洛謠剡者配姬以放賢山崩水潰納小人家伯罔主異哉震黃氏逸書考引古微書京師為唐約謠治身無嫌唐仲謙事文類聚新集四姚集謝承後漢書古謠諺十六蔣橫遘禍時童謠君用讒慝忠烈是殛鬼怨神怒妖氣充塞全唐文三百五十四古謠諺八十一錫山古謠有錫兵無錫寧常州圖經時人為三茅君謠茅山連金陵江湖據下流三神乘白鶴各在一山頭佳雨灌畦稻陸地亦復周妻子保堂室使我無百憂白鶴翔青天何時復來遊初學記三十御覽九百十六茅山志詩紀外集一光武述時人語關東觥觥郭子橫後漢書郭憲傳時人為郭況語洛陽多錢郭氏室月夜晝星富無匹拾遺記六時人為部況語洛陽多錢郭氏萬千太平廣記二百三十六光武引諺貴易交富易妻後漢書宋弘傳初學記十御覽百五十二八百五十四四百九十五又五百十七引謝承後漢書七百一引東觀漢記宋弘引語貧賤之知不可忘糟糖之妻不下堂後漢書宋弘傳御覽百五十二八百五十四四百九十五又五百十七引謝承後漢書七百一引東觀漢記南陽為杜師語前有召父後有杜母後漢書本傳御覽二百六十詩紀九作南陽諺時人為廉范語前有管鮑後有慶廉後漢書本傳御覽四百七四百九章帝引諺作舍道邊三年不成後漢書曹褒傳御覽五百二十三班固引論經方有病不治常得中醫漢書藝文志班昭女誡引鄙諺生男如狼猶恐其尫生女如鼠猶恐其虎後漢書曹世叔妻傳王逸引諺政如冰霜姦軌消亡威如雷霆寇賊不生意林四虞詡引諺關西出將關東出相後漢書虞詡傳王符引諺論得賢一犬吠形百犬吠聲潛夫論賢難篇京師為黃香號天下無雙江夏黃童後漢書本傳初學記十一十七白帖六御覽二百十五三百八十四四百九十五六百十六並引東觀漢記詩紀九作江夏黃童人為高慎語嶷然不語名高孝甫御覽二百六十五詩紀八作高孝甫歌潁川為荀爽語荀氏八龍慈明無雙後漢書荀淑傳御覽三百八十五引荀氏家傳四百九十五引續漢書詩紀九作荀氏八龍崔實引農家諺上火不落下火滴沰楊慎古今諺引四民月令康熙字典水部沰字下引崔實引里語一歲再赦奴兒喑噁群書治要四十五御覽四百九十六六百五十二李固引語善人在患飢不及餐後漢書王龔傳益州民為尹就諺虜來尚可尹來殺我後漢書南蠻傳華陽國志巴志天下為賈彪語賈氏三虎偉節最怒後漢書賈彪傳御覽四百九十六詩紀九作賈偉節應劭引俚語論正失狐欲渡河無奈尾何風俗通正失篇水經注沔水篇御覽八百九十一應劭引俚語論愆禮婦死腹悲唯身知之風俗通愆禮篇應劭引俚語論日蝕不救蝕者出行遇語御覽八百四十九應劭引俚語論主客越陌度阡更為客主文選二十七短歌行注應劭引俚語論讞獄縣官漫漫冤死者半御覽二百二十六四百九十六應劭引里語仕宦不止車生耳御覽四百九十六應劭引言論正失金不可作世不可度風俗通正失篇時人為龐氏語廬里諸龐鑿井得銅買奴得翁類聚三十五初學記十九白帖六御覽四百七十二五百八百三十六又御覽百八十九引銅翁二韻民為二殽語東殽西殽澠池所高風俗通山澤篇南陽衛修陳茂語衛修有事陳茂治之衛修無事陳茂殺之風俗通過譽篇公沙六龍公沙六龍天下無雙御覽四百九十五民為五門語苑中三公館下二卿五門嚄嚄但聞豚聲御覽四百九十六八百二十八九百三詩紀九作五門時人為作奏語作奏雖工宜去葛龔後漢書葛龔傳注御覽四百九十五詩紀九作作奏武陵人為黃氏兄弟諺天有冬夏人有二黃御覽二十二又四百九十二作武陵人歌時人為楊氏四子語三苗不止四珍復起華陽國漢中士安志古謠諺三十三羊元引諺孤犢觸乳驕子詈母後漢書仇香傳注御覽六百十古諺雖有神藥不如少年雖有珠玉不如金錢御覽九百八十四時人為郭典語郭君圍塹董將不許幾令狐狸化為豺虎賴我郭君不畏強禦轉機之間敵為窮虜猗猗惠君實完彊土御覽四百九十六詩紀九作郭君時人為周澤語居世不諧為太常妻一歲三百六十日三百五十九日齊一日不齊醉如泥既作事復低迷初學記十二御覽二百二十八詩紀九作太常妻又後漢書本傳類聚四十九御覽五百二十並引妻齊泥三韻又白帖二十一引妻泥二韻崔實引語小民髮如韭剪復生頭如雞割復鳴吏不必可畏從來必可輕奈何欲望平御覽九百七十六時人為桓典語行行且止避驄馬御史後漢書本傳書鈔六十二引續漢書類聚九十三引東觀漢記初學記十二御覽二百二十七四百二十七又八百九十四引東觀漢記詩紀九作避驄益州鄉里為柳宗語得黃金一笥不如為柳伯騫所識華陽國志蜀郡士女贊御覽二百六十三四百九十六詩紀九作柳白騫時人為貢舉語舉秀才不知書舉孝廉父別居寒素清白濁如泥高第良將怯如黽抱朴子審舉篇書鈔七十九御覽四百九十六又樂府詩集八十七詩紀八並作後漢桓靈時謠各引書居兩韻宣城為封使君語無作封使君生來治民死食民任昉述異記益都為任文公語任文公智無雙後漢書本傳御覽四百三十二引華陽國志馬皇后引俗語時無赭澆黃土御覽四百九十五崔實引里語州郡記如霹靂得詔書但掛壁初學記二十四御覽十三四百九十六五百九十三詩紀九崔實引農語二月昏參星夕杏花盛桑椹赤齊民要術二古謠諺三十七引齊民要術河射角堪夜作犂星沒水生骨古謠諺三十七引齊民要術京師為袁成諺事不諧詣文開三國志袁紹傳注後漢書袁紹傳注御覽三百八十六四百九十六詩紀九作袁文開天下為四侯語左回天具獨坐徐臥虎唐兩墮後漢書單超傳御覽四百九十三又二百引後漢書三百九十三四百九十六並引風俗通京師為張盤語聞清白張子石書鈔三十八人為徐聞縣諺欲拔貧詣徐聞輿地紀勝一百十八京師為鮑永鮑恢語貴戚斂手避二鮑御覽三百七十引漢書時人為折氏諺折氏客誰朱雲卿段節英中有佃子趙仲平但說天文論五經華陽國志廣漢土女讚王符引諺論守邊痛不著身言忍之錢不出家言與之潛夫論救邊篇御覽八百三十六三府為朱震語車如雞棲馬如狗疾惡如風朱伯厚後漢書陳蕃傳書鈔三十九七十三類聚九十三御覽二百六十五八百九十四詩紀九作朱伯厚時人為貢舉語古人欲達勤誦經今世圖官勉治生抱朴子審舉篇御覽四百九十六趙岐引南陽舊語前隊大夫范仲公鹽蒜果共一筒顏氏家訓書證篇御覽四百三十一八百五十五九百七十七考城為仇覽諺父母何在在我庭化我鳲梟哺所生後漢書仇香傳詩紀九作考城諺時人為孔氏兄弟語魯國孔氏好讀經兄弟講誦皆可聽學士來者有聲名不過孔氏那得成御覽三百八十五詩紀九作魯國孔氏華容女子獄中歌吟不意李立為貴人三國志劉表傳注闞駰引語仕宦不偶值冀部寰宇記六十三幽冀之人鈍如椎同上王符引諺論考績曲木惡直繩重罰惡明證潛夫論考績篇意林三時人為王符語徒見二千石不如一縫掖後漢書王符傳白帖二十六御覽四百七十四四百九十五五百二詩紀八作縫掖卿里為雷義陳重語膠漆自謂堅不如雷與陳後漢書雷義傳類聚二十一白帖十十四御覽四百七四百二十四七百六十六鄭玄引俗語隱疾難為醫禮記曲禮注時人為呂布語人中有呂布馬中有赤兔後漢書呂布傳注三國志呂布傳注類聚九十三白帖二十九御覽四百九十六八百九十七詩紀九作時人語關中為游殷諺生有知人之明死有貴神之靈魏志張既傳注御覽四百四十四四百九十六京師為戴憑語解經不窮戴侍中後漢書本傳書鈔五十八一百類聚五十五六十九御覽二百十九四百九十五六百十五詩紀九作戴侍中京師為井丹語五經紛綸井大春後漢書本傳世語新語品藻篇注書鈔九十六一百並引三輔決録白帖二十六御覽四百十引高士傳四百七十四四百九十五五百一並引逸民傳六百十五引東觀漢記詩紀九作井大春時人為王君公語避世牆東王君公後漢書逢萌傳詩紀九作王君公京師為楊政語說經鏗鏗楊子行後漢書本傳書鈔一百御覽四百九十五六百十五詩紀九作楊子行京師為祁聖元號論難僠僠祁聖元御覽六百十五壽春鄉里為召馴語德行恂恂召伯春後漢書本傳書鈔五十六白帖七十四時人為丁鴻語殿中無雙丁孝公後漢書本傳又注御覽六百十五京兆鄉里為馮豹語道德彬彬馮仲文後漢書馮衍傳附本傳御覽四百三四百九十六詩紀九作馮仲文諸儒為賈逵語問事不休賈長頭後漢書本傳意林四書鈔分九十七一百白帖二十六御覽三百七十七六百十二六百十五關中為魯丕語五經復興魯叔陵後漢書魯恭傳附本傳書鈔一百白帖二十六御覽六百十五諸儒為楊震語關西孔子楊伯起後漢書本傳御覽四百九十五六百十二詩紀九作楊伯起時人為許慎語五經無雙許叔重後漢書本傳御覽四百九十五引謝承後漢書又六百八詩紀九作許叔重京師為周舉語五經從橫周宣光後漢書本傳白帖二十六御覽六百十五引東觀漢記京師為胡廣語萬事不理問伯始天下中庸有胡公後漢書本傳渚宮舊事四初學記十一引東觀漢記御覽四百九十五詩紀九作胡伯始時人為任安語欲知仲桓問任安居今行古任定祖後漢書本傳詩紀八作任安二謠時人為陳嚚語關東說詩陳君期書鈔一百御覽六百十五諸儒為劉愷語難經伉伉劉太常類聚四十九白帖七十四御覽二百十八詩紀九作劉太常人為許晏諺殿上成群許偉君御覽四百九十六詩紀九作許偉君鄉里為茨充號一馬兩車茨子河後漢書衛颯傳注書鈔三十九時人為繆文雅語素車白馬繆文雅古詩類苑六十九詩紀九作繆文雅敦煌鄉人為曹全諺重親致歡曹景完金石字記
