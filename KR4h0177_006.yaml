body:
  text: 古諺語六韜引諺天下攘攘皆為利往天下熙熙皆為利來御覽四百九十六詩紀前集十管子引古言牆有耳伏寇在側管子君臣篇詩紀前集十論語南人言人而無恒不可以作巫醫論語子路篇孔子家語引里語相馬以輿相士以居家語子路初見篇御覽四百九十五詩紀前集十禮記引諺人莫知其子之惡莫知其苗之碩禮記大學篇詩紀前集十禮記引南人言人而無恒不可以為卜筮禮記緇衣篇孟子引夏諺吾王不遊吾何以休吾王不豫吾何以助一遊一豫為諸侯度孟子梁惠王篇晏子春秋內篇御覽五百三十七引越絕書詩紀前集十孟子引齊人言雖有智慧不如乘勢唯有鎡基不如待時孟子公孫丑篇詩紀前集十左傳引周諺山有木工則度之寡有禮主則擇之左傳隱公十一年傳御覽四百九十五詩紀前集十又白帖十引下一句匹夫無罪懷璧其罪左傳桓公十年傳類聚八十三八十四御覽三百四十二四百九十五詩紀前集十左傳引諺心苟無瑕何恤乎無家左傳閔公元年傳詩紀前集十輔車相倚唇亡齒寒左傳僖公五年傳類聚五十九白帖九御覽三百三三百六十七三百六十八四百五十一四百九十五詩紀前集十高下在心川澤納污山藪藏疾瑾瑜匿瑕國君含垢左傳宣公十五年傳御覽四百九十五詩紀前集十民之多幸國之不幸左傳宣公十六年傳詩紀前集十非宅是卜惟鄰是卜左傳昭公三年傳初學記二十四御覽一百五十七一百八十詩紀前集十狼子野心左傳宣公七年傳御覽七百二十九老將知而耄及之左傳昭公元年傳臣一主二左傳昭公十三年傳詩紀前集十無過亂門左傳昭公十九年傳詩紀前集十室於怒市於色左傳昭公十九年傳御覽一百七十四詩紀前集十唯食忘憂左傳昭公二十八年傳民保於信左傳定公十五年傳詩紀前集十左傳引古人言心則不競何憚於病左傳僖公七年傳詩紀前集十畏首畏尾身其餘幾左傳文公十七年傳詩紀前集十雖鞭之長不及馬腹左傳宣公十五年傳詩紀前集十殺老牛莫之敢尸左傳成公十七年傳詩紀前集十挈缾之知守不假器左傳昭公七年傳詩紀前集十鹿死不擇音左傳文公十七年傳詩紀前集十左傳引上國言不索何獲左傳昭公二十七年傳國語引諺獸惡其網民惡其上國語周語御覽八百三十四詩紀前集十眾心成城眾口鑠金國語周語御覽四百九十五五百七十五詩紀前集十從善如登從惡如崩國語周語詩紀前集十黍稷無成不能為榮黍不為黍不能蕃膴稷不為稷不能蕃殖所生不疑惟德之基國語晉語御覽四百九十五詩紀前集十狐埋之而狐搰之是以無成功國語吳語詩紀前集十觥飯不及壼飱國語越語詩紀前集十國語引人言兄弟讒鬩侮人百里國語周語詩紀前集十兵在其頸國語周語詩紀前集十佐雝者嘗焉佐鬭者傷焉國語周語詩紀前集十禍不好不能禍國語周語詩紀前集十墨子引古語唇亡則齒寒墨子非攻篇謀而不得則以往知來墨子非攻篇君子不鏡於水而鏡於人鏡於水見面之容鏡於人則知吉與凶墨子非攻篇類聚八白帖二御覽五十八莊子引野語聞道百以為莫己若莊子秋水篇詩紀前集十眾人重利廉士重名賢士尚志聖人貴精莊子刻意篇詩紀前集十荀子引古言衣與繆與不女聊荀子子道篇詩紀前集十荀子引民語欲富乎忍恥矣傾絕矣故舊矣與義分背矣荀子大略篇詩紀前集十荀子引語流丸止於甌臾流言止於知者荀子大略篇詩紀前集十淺不可與測深愚不足與謀知坎井之鼃不可與語東海之樂荀子正論篇晏子引諺言鼠社不可薰晏子春秋外篇晏子引語言發於爾不可止於遠行存於身不可掩於眾晏子春秋外篇列子引古語生相憐死相捐列子楊朱篇詩紀前集十人不婚宧情欲失半人不衣食君臣道息列子楊朱篇詩紀前集十列子引周諺田父可坐殺列子楊朱篇詩紀前集十慎子引諺不聰不明不能為王不瞽不聾不能為公御覽四百九十六困學紀聞十詩紀前集十韓非子引鄙諺長袖善舞多財善賈韓非子五蠹篇類聚四十三御覽五百七十四八百二十九莫眾而迷韓非子內儲說上傭自賣哀而不售士自譽辨而不信御覽八百二十八韓非子引古諺為政若沐也雖有棄髮之費而有長髮之利也意林一御覽三百九十五韓非子引先聖諺不躓於山而躓於垤韓非子六反篇規有摩而水有波我欲更之無柰之何韓非子八說篇韓非子引古語奔車之上無仲尼覆舟之下無伯夷韓非子安危篇御覽四百三十引殷康明慎四百五十九引淮南子詩紀前集十商子引諺蠹眾而木折隙大而牆壞商子修權篇意林四商子引語愚者暗於成事智者見於未萌商子更法篇御覽四百九十六引商君書鄒子引古語截趾適屨孰云其愚何與斯人追欲喪軀古今諺詩紀前集十呂氏春秋引鄙諺居者無載行者無埋呂氏春秋知接篇詩紀前集十黃金累千不如一賢初學記十七引呂氏春秋尉繚子引諺千金不死百金不刑尉繚子將理篇魯連子引諺百足之蟲三斷不蹶意林一文選五十二六代論注御覽九百四十四九百四十八詩紀前集十心誠憐白髮玄情不怡艷色媸風雅遺篇六詩紀前集十鬼谷子引古語女愛不蔽席男歡不盡輪古今諺詩紀前集十孔叢子引遺諺堯舜千鍾孔子百觚子路嗑嗑尚飲十榼孔叢子儒道篇書鈔百四十八類聚二十五七十二御覽四百六十六七百六十一八百四十五詩紀前集十又論衡語增篇引觚一韻白帖五引第一句戰國策引諺見君之乘下之見杖起之戰國策楚策詩紀前集十以書為御者不盡馬之情以古制今者不達事之變戰國策趙策詩紀前集十厚者不損人以自益仁者不危軀以要名戰國策燕策詩紀前集十戰國策引鄙語見兔而顧犬未為晚也亡羊而補牢未為遲也戰國策楚策新序雜事篇御覽四百九十五九百七詩紀前集十借車者馳之借衣者被之戰國策趙策詩紀前集十寧為雞口無為牛後戰國策韓策史記蘇秦列傳類聚二十五御覽四百六十四百九十五八百九十八詩紀前集十戰國策引語戰勝而國危者物不斷也功大而權輕者地不入也戰國策秦策詩紀前集十騏驥之衰也駑馬先之孟賁之倦也女子勝之戰國策齊策詩紀前集十厲疾憐王戰國策楚策詩紀前集十強者善弱者不能自守戰國策趙策仁不輕絕智不輕怨戰國策燕策新序雜事篇詩紀前集十史記引諺死者復生生者不愧史記趙世家詩紀前集十蓬生麻中不扶自直白沙在泥與之皆黑史記三王世家褚先生引書鈔百五十八引大戴禮類聚八十二引曾子詩紀前集十力則任鄙智則樗里史記樗里子傳引秦人諺詩紀前集十史記引語狡兔死良狗烹高鳥盡良弓藏敵國破謀臣亡史記淮陰侯傳韓信引人言新書引周諺君子重襲小人無由入正人十倍邪辟無由來新書容經篇詩紀前集十囊漏貯中新書春秋篇文心雕龍書記篇長短經大體篇詩紀前集十金樓子引殷紂時語車行酒騎行炙百二十日為一夜金樓子箴戒篇金樓子引古語寧得一把五加不用金玉滿車寧得一斤地榆不用明月寶珠金樓子志怪篇潛確類書九十八引東華真人煮石經妝臺記序引春秋時諺夏姬得道雞皮三少西溪業話下引宇文士及妝臺記序
