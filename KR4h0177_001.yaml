body:
  text: 歌彈歌斷竹續竹飛土逐𡧢吳越春秋九書鈔百二十四類聚六十白帖五御覽三百五十詩紀前集一擊壤歌日出而作日入而息鑿井而飲耕田而食帝力於我何有哉類聚十一御覽五百六引高士傳又五百七十二七百五十五引逸士傳樂府詩集八十三詩紀前集一賡歌股肱喜哉元首起哉百工熙哉尚書益稷篇史記夏本紀白帖十八御覽五百七十詩紀前集一元首明哉股肱良哉庶事康哉尚書益稷篇史記夏本紀類聚四十三作舜作歌文選一兩都賦注御覽九百五十一詩紀前集一元首叢脞哉股肱惰哉萬事墮哉尚書益稷篇史記夏本紀作舜又歌類聚四十三御覽五百七十五百九十詩紀前集一南風歌南風之薰兮可以解吾民之慍兮南風之時兮可以阜吾民之財兮家語辨樂篇類聚四十三白帖一御覽五百七十一五百九十二詩紀前集四作南風操又尸子綽子篇初學記一御覽九並引薰慍二韻大唐歌舟張辟雍鴿鴿相從八風回回鳳皇喈喈尚書大傳一路史後記十二詩紀前集九卿雲歌卿雲爛兮糾縵縵兮日月光華旦復旦兮尚書大傳一尚書考河命宋書二十七書鈔一百六類聚一四十三御覽五百七十一樂府詩集八十三詩紀前集一明明上天爛然星陳日月光華弘于一人尚書大傳尚書考河命宋書二十七類聚四十三御覽五百七十一樂府詩集八十三詩紀前集一日月有常星辰有行四時從經萬姓允誠於豫論樂配天之靈遷于賢聖莫不咸聽鼚乎鼓之軒乎舞之精華已竭褰裳去之尚書大傳尚書考河命宋書二十七御覽五百七十一樂府詩集八十三詩紀前集一又類聚四十三引常行經誠靈五韻塗山歌綏綏白狐九尾龐龐成于家室我都攸昌書鈔一百六類聚九十九御覽五百七十一並引呂氏春秋塗山女歌候人猗兮呂氏春秋音初篇文選四南都賦注文選五吳都賦注五子歌皇祖有訓民可近不可下民惟邦本本固邦寧豫視天下愚夫愚婦一能勝豫怨豈在明不見是圖豫臨兆民懍乎若朽索之馭六馬為人上者奈何不敬夏書五子之歌篇御覽八十二詩紀前集一訓有之內作色荒外作禽荒甘酒嗜音峻宇雕牆有一於此未或不亡夏書五子之歌篇御覽八十二詩紀前集一又御覽五百七十引荒牆亡三韻惟彼陶唐有此冀方今失厥道亂其紀綱乃底滅亡同上明明我祖萬邦之君有典有則貽厥子孫關石和鈞王府則有荒墜厥緒覆宗絶祀同上嗚呼曷歸豫懷之悲萬姓仇豫豫將疇依鬱陶乎豫心顏厚有忸怩弗慎厥德雖悔可追同上夏人歌江水沛兮舟楫敗兮我王廢兮趣歸於薄薄亦大兮韓詩外傳二新序六樂府詩集八十三又尚書大傳二及類聚十二皆引大一韻樂兮樂兮四牡蹻兮六轡沃兮去不善而從善何不樂兮韓詩外傳二新序六樂府詩集八十三詩紀前集一麥秀歌麥秀漸漸兮禾黍油油彼狡童兮不與我好兮史記宋世家尚書大傳文選十六思舊賦注引尚書大傳御覽五百七十引史記樂府詩集五七作傷殷操詩紀前集一採薇歌登彼西山兮採其薇矣以暴易暴兮不知其非矣神農虞夏忽焉沒兮我適安歸矣吁嗟徂兮命之衰矣史記伯夷列傳詩紀前集一又書鈔百六御覽五百七十並引薇非歸三韻夢歌濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懷乎左傳成公十七年傳御覽四百詩紀前集一去魯歌彼婦之口可以出走彼婦之謁可以死敗蓋優哉游哉維以卒歲史記孔子世家家語子路初見篇類聚十九御覽四百六十五樂府詩集八十三詩紀前集一蟪蛄歌違山十里蟪蛄之聲猶尚在耳古微書詩含神霧說苑政理篇作孔子謂弟子曰詩紀前集一曳杖歌泰山其頽乎梁木其壞乎哲人其萎乎禮記檀弓上家語終記解書鈔百六百三十三御覽四百五百七十七百十詩紀前集一原壤歌貍首之斑然執女手之卷然禮記檀弓下家語屈節篇白帖十八御覽五百十三五百五十二五百七十詩紀前集一南蒯歌我有圃生之杞乎從我者子乎去我者鄙乎倍其鄰者恥乎已乎已乎非吾黨之士乎左傳昭公十二年傳御覽五百七十詩紀前集一成人歌蠶則績而蟹有匡范則冠而蟬有綏兄則死而子皋為之衰禮記檀弓下詩紀前集一黃鵠歌悲夫黃鵠之早寡兮七年不雙宛頸獨宿兮不與衆同夜半悲鳴兮想其故雄天命早寡兮獨宿何傷寡婦念此兮泣下數行嗚呼哀哉兮死者不可忘鳥尚然兮況於貞良雖有賢雄兮終不重行列女傳四白帖六御覽四百四十一五百七十二樂府詩集四十五詩紀前集一宋城者謳睅其目皤其腹棄甲而復于思于思棄甲復來左傳宣公二年傳類聚十九御覽百九十二三百五十五三百六十六四百六十五詩紀前集一澤門之晳謳澤門之晳實興我役邑中之黔實慰我心左傳襄公十七年傳白帖三御覽百七十七四百六十五詩紀前集一野人歌既定爾婁豬盍歸吾艾豭左傳定公十四年傳白帖二十九詩紀前集一齊民歌公胡不復遺其冠乎韓非子難二篇金樓子雜記篇類聚十九御覽四百九十七六百八十四八百四十五詩紀前集一凍水歌凍水洗我若之何太上糜散我若之何晏子春秋內諫下書鈔百五十六類聚五詩紀前集一穗歌穗乎不得穫秋風至兮殫零落風雨之弗殺也太上之靡弊也晏子春秋內諫下御覽四百五十六詩紀前集一又御覽八百二十四引虞喜志林引穫落二韻歲莫歌歲已莫矣而禾不穫忽忽兮若之何歲已寒矣而役不罷惙惙兮如之何晏子春秋外篇詩紀前集一齊莊公歌已哉已哉寡人不能說也爾來為晏子春秋內篇雜上萊人歌景公死乎不與埋三軍之士不與謀師乎師乎何黨之乎左傳哀公五年傳史記齊世家御覽五百七十詩紀前集一齊人歌魯人之皋數年不覺使我高蹈唯其儒書以為二國憂左傳哀公二十一年傳御覽五百七十詩紀前集一采芑歌嫗乎采芑歸乎田成子史記田敬仲完世家詩紀前集一周秦民歌謳乎其已乎苞乎其往歸田成子乎韓非子外儲說右上彈鋏歌長鋏歸來乎食無魚戰國策齊策四史記孟嘗君列傳書鈔百六白帖五御覽三百四十六四百八十四五百七十一詩紀前集一長鋏歸來乎出無車戰國策齊策四史記孟嘗君列傳書鈔百六御覽三百四十六四百八十四五百七十一詩紀前集一長鋏歸來乎無以為家戰國策齊策四史記孟嘗君列傳御覽三百四十六四百八十四五百七十一詩紀前集一松柏歌松邪柏邪住建共者客邪戰國策齊策六風俗通王霸篇通鑑六詩紀前集一狐裘歌狐裘尨茸一國三公吾誰適從左傳僖公五年傳白帖十二詩紀前集二暇豫歌暇豫之吾吾不如鳥烏人皆集於菀己獨集於枯國語晉語二文選二十九曹攄感舊詩注御覽四百六十九詩紀前集二龍蛇歌有龍于飛周遍天下五蛇從之為之承輔龍返其鄉得其處所四蛇從之得其露雨一蛇羞之槁死於中野呂氏春秋介立篇類聚九十六御覽九百二十九詩紀前集二龍蛇歌附龍欲上天五蛇為輔龍已升雲四蛇各入其宇一蛇獨怨終不見處所史記晉世家樂府詩集五十七詩紀前集二有龍矯矯頃失其所五蛇從之周遍天下龍飢無食一蛇割股龍返其淵安甚壤土四蛇入穴皆有處所一蛇無穴號於中野說苑復恩篇書鈔百五十八樂府詩集五十七詩紀前集二有龍矯矯頃失其所一蛇從之周流天下龍反其淵安寧其處一蛇耆乾獨不得其所說苑復恩篇詩紀前集二作舟之僑歌又御覽百九十八引所下乾三韻河激歌升彼河兮而觀清水揚波兮冒冥冥禱求福兮醉不醒誅將加兮妾心驚罰既釋兮瀆乃清妾持楫兮操其維蛟龍助兮主將歸呼來櫂兮行勿疑列女傳辨通篇書鈔百六文選二十二車駕幸京口詩注詩紀前集二又御覽五百七十二引清冥醒驚歸疑六韻鼓琴歌美人熒熒兮顏若苕之榮命乎命乎逢天時而生曾無我嬴史記趙世家列女傳七御覽五百七十詩紀前集四段干木歌吾君好正段干木之敬吾君好忠段干木之隆呂氏春秋期賢篇新序雜事篇五詩紀前集二鄴民歌鄴有賢令兮為史公決漳水兮灌鄴旁終古舄鹵兮生稻粱呂氏春秋樂成篇史記河渠書漢書溝洫志書鈔三十九百五十六類聚十九御覽六十四四百六十五八百三十九詩紀前集二又白帖二十三凡三引旁粱二韻楚人誦子文歌子文之族犯國法程廷理釋之子文不聽恤顧怨萌方正公平說苑至公篇渚宮舊事一詩紀前集二楚人為諸御己歌薪乎菜乎無諸御己訖無子乎菜乎薪乎無諸御己訖無人乎說苑正諫篇御覽四百五十五詩紀前集二作楚人歌優孟歌山居耕田苦難以得食起而為吏身貪鄙者餘財不顧恥辱身死家室富又恐受賕枉法為姦觸大罪身死而家滅貪吏安可為也念為廉吏奉法守職竟死不敢為非廉吏安可為也史記滑稽列傳風雅遺篇六詩紀前集二慷慨歌貪吏而可為而不可為廉吏而可為而不可為貪吏而不可為者當時有污名而可為者子孫以家成廉吏而可為者當時有清名而不可為者子孫困窮被褐而負薪貪吏常苦富廉吏常苦貧獨不見楚相孫叔敖廉潔不受錢隸釋三風雅逸篇六詩紀前集二楚狂接輿歌鳳兮鳳兮何德之衰往者不可諫來者猶可追已而已而今之從政者殆而論語微子篇史記孔子世家御覽五百七十詩紀前集二作接輿歌同上鳳兮鳳兮何德之衰也來世不可待往事不可追也天下有道聖人成焉天下無道聖人生焉方今之時僅免刑焉福輕乎羽莫之知載禍重乎地莫之知避已乎已乎臨人以德殆乎殆乎畫地而趨迷陽迷陽無傷吾行吾行卻曲無傷吾足莊子人間世篇詩紀前集二孺子歌滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足孟子離婁篇楚辭漁父作漁父歌文選十五歸田賦注樂府詩集八十三俱作漁父歌白帖二御覽五十九三百七十二引楚辭又五百七引高士傳又五百七十二詩紀前集二被衣為齧缺歌形若槁骸心若死灰真其實知不以故自持媒媒晦晦無心而不可與謀彼何人哉莊子知北遊篇淮南子道應訓詩紀前集二作被衣歌子桑琴歌父邪母邪天乎人乎莊子大宗師篇詩紀前集四相和歌嗟來桑戶乎嗟來桑戶乎而已反其真而我猶為人猗莊子大宗師篇白帖十詩紀前集四楊朱歌天其弗識人胡能覺匪佑自天弗孽由人我乎汝乎其弗知乎醫乎巫乎其知之乎列子力命篇詩紀前集二申叔儀乞糧歌佩玉蕊兮余無所繫之旨酒一盛兮余與褐之父睨之左傳哀公十三年傳白帖十五御覽六百九十三詩紀前集二作庚癸歌徐人歌廷陵季子兮不忘故脫千金之劍帶丘墓新序節士篇類聚三十四御覽四百六十五詩紀前集二越人歌今夕何夕兮搴洲中流今日何日兮得與王子同舟蒙羞被好兮不訾詬恥心幾煩而不絶兮得知王子山有木兮木有枝心說君兮君不知說苑善說篇樂府詩集八十三詩紀前集二又書鈔百六引流舟二韻類聚七十一御覽五百七十二並引流舟枝知四韻御覽七百七十一引洲舟枝知四韻荊軻歌風蕭蕭兮易水寒壯士一去兮不復還戰國策燕策三史記刺客列傳燕丹子下文選二十八書鈔百六類聚四十三初學記一十五御覽六十四五百七十二詩紀前集二諷賦歌歲將暮兮日已寒中心亂兮勿多言內怵惕兮徂玉床橫自陳兮君之傍古文苑一宋玉諷賦楚聘歌大道隱兮禮為基賢人竄兮將待時天下如下一兮欲何之孔叢子記問篇書鈔百六御覽五百七十一詩紀前集一丘陵歌登彼丘陵峛崺其阪仁道在邇求之若遠遂迷不復自嬰屯蹇喟炙回慮題彼泰山鬱確其高粱甫回連枳棘充路陟之無緣將伐無柯患茲蔓延惟以永歎涕霣潺湲孔叢子記問篇詩紀前集一文選二十三臨終詩注引蹇一韻御覽五百七十一引阪遠蹇三韻獲麟歌唐虞世兮麟鳳遊今非其時來何求麟兮麟兮我心憂孔叢子記問篇古微書論語摘衰聖御覽五百七十一八百八十九詩紀前集一琴歌百里奚初娶我時五羊皮臨當相別時烹乳雞今適富貴忘我為御覽五百七十二樂府詩集六十詩紀前集四琴歌附百里奚百里奚母已死葬南溪墳以瓦覆以柴舂黃藜扼伏雞西入秦五羖皮今日富貴捐我為御覽五百七十六引典略樂府詩集六十詩紀前集四百里奚五羊皮憶別時烹伏雌炊扊扅今日富貴忘我為顏氏家訓書證篇作古樂府歌百里奚詞樂府詩集六十詩紀前集四漁父歌日月昭昭乎寖已馳與子期乎蘆之漪吳越春秋上越絶書一書鈔百六引越紀御覽六十九引與地志又五百七十一詩紀前集二日已夕兮豫心憂悲月已馳兮何不渡為事寖急兮將奈何吳越春秋三蘆中人蘆中人豈非窮士乎同上河上歌同病相憐同憂相救驚翔之鳥相隨而集瀨下之水因復俱流吳越春秋四詩紀前集二申包胥歌吳為無道封豕長蛇以食上國欲有天下政從楚起寡君出自草澤使來告急吳越春秋四詩紀前集二窮劫曲王耶王耶何乖劣不顧宗廟聽讒孽任用無忌多所殺誅夷白氏族幾滅二子東奔適吳越吳王哀痛助忉怛垂涕舉兵將西伐伍胥白喜孫武決三戰破郢王奔發留兵縱騎虜京闕楚荊骸骨遭掘發鞭辱腐尸恥難雪幾危宗廟社稷滅莊王何罪國幾絶卿士悽愴民惻悷吳軍雖去怖不歇願王更隱撫忠節勿為讒口能謗褻吳越春秋四詩紀前集四烏鵲歌仰飛鳥兮烏鳶凌玄虛兮號翩翩集洲渚兮優恣啄蝦矯翮兮雲間任厥性兮往還妾無罪兮負地有何辜兮譴天帆帆獨兮西往孰知返兮何年心惙惙兮若割淚泫泫兮雙懸吳越春秋七詩紀前集二作烏鳶歌彼飛鳥兮鳶烏已回翔兮翕蘇心在專兮素蝦何居食兮江湖徊復翔兮游揚去復返兮於乎始事君兮去家終我命兮君都終來遇兮何辜離我國兮去吳妻衣褐兮為婢夫去冕兮為奴歲遙遙兮難極冤悲痛兮心惻腸千結兮服膺於乎哀兮忘食願我身兮如鳥身翱翔兮矯翼去我國兮心搖情憤惋兮誰識吳越春秋七詩紀前集二又書鈔百六引烏蘇湖蝦呼五韻五句御覽五百七十一引烏湖蝦呼家都辜吳奴極側食十二韻十二句采葛婦歌葛不連漫棻台台我君心苦命更之嘗膽不苦甘如飴令我采葛以作絲女工織兮不敢遲弱於羅兮輕霏霏號絺素兮將獻之越王悅兮忘罪除吳王歡兮飛尺書增封益地賜羽奇機杖茵蓐諸侯儀群臣拜舞天顏舒我王何憂能不移吳越春秋八作苦之詩詩紀前集二又御覽五百七十一引飴絲三韻九百九十五引台飴絲三韻又事類賦十一作若何之歌引飴絲二韻飢不遑食四體疲文選二十曹植應召詩注引吳越記采葛婦人詩離別相去辭躒躁摧長恧兮擢戟馭殳所離不降兮以泄我王氣蘇三軍一飛降兮所向皆殂一士判死兮而當百夫道祐有德兮吳卒自屠雪我王宿恥兮威振八都軍伍難更兮劫如貔貙行行各努力兮於乎於乎吳越春秋十詩紀前集二河梁歌渡河梁兮渡河梁舉兵所伐攻秦王孟冬十月多雪霜隆寒道路誠難當陳兵未濟秦師降諸侯怖懼皆恐惶聲傳海內威遠邦稱霸穆桓齊楚莊天下安寧壽考長悲去歸兮河無梁吳越春秋十詩紀前集二豐歌鳳皇下豐詩經大雅文王篇疏御覽九百一十五秦始皇時民歌生男慎勿舉生女哺用脯不見長城下尸骸相支拄水經河水注三意林五詩紀前集二甘泉歌運石甘泉口渭水不敢流千人唱萬人謳金陵餘石大如塸博物志四關中記御覽五百五十九引流鉤二韻詩紀前集二琴女歌羅縠單衣可裂而絶三尺屏風可超而越鹿盧之劍可負而拔燕丹子下類聚八十五史記刺客列傳正義引燕太子篇意林二御覽三百四十四御覽五百七十七引史記詩紀前集四又書鈔百二十八引絶一韻又御覽七百一引三秦記引三尺羅衣何不掣四面屏風何不越二句與本辭異
