body:
  text: 謠康衢謠立我烝民莫匪爾極不識不知順帝之則列子仲尼篇類聚十九五十六御覽四百六十五五百八十六樂府詩集八十八詩紀前集三黃澤謠黃之池其馬歕沙皇人威儀黃之澤其馬歕玉皇人受穀穆天子傳五初學記二十九御覽八百九十六詩紀前集三又類聚四十三引沙玉二韻白雲謠白雲在天山自出道里悠遠山川間之將子無死尚能復來穆天子傳三類聚四十三文選四十拜中軍記室辭隋王牋注御覽八十五五百七十二樂府詩集八十七詩紀前集三又文選二十七早發定山詩注引出一韻御覽八引出之二韻穆天子謠予歸東土和治諸夏萬民平均吾顧見女比及三年將復而野穆天子傳三類聚四十三御覽五百七十二樂府詩集八十七詩紀前集三西王母吟徂彼西土爰居其野虎豹為群於鵲與處喜命不遷我惟帝女彼何世民又將去予吹笙鼓簧中心翱翔世民之子惟天之望穆天子傳三山海經西山經注詩紀前集三御覽九百二十一及事類賦十九並引土野處女四韻周宣王時童謠檿孤箕服實亡周國國語鄭語史記周本紀漢書五行志列女傳七金樓子箴戒篇書鈔四十二百二十六御覽百三十五三百四十七詩紀前集三鸜鵒謠鸜之鵒之公出辱之鸜鵒之羽公在外野往饋之馬鸜鵒跦跦公在乾侯徵褰與襦鸜鵒之巢遠哉遙謠裯父喪勞宋父以驕鸜鵒鸜鵒往歌來哭左傳昭公二十五年傳漢書五行志御覽九百二十三樂府詩集八十八詩紀前集三魯童謠天將大雨商羊鼓舞說苑辨物篇家語辨政篇類聚二初學記二白帖一二御覽十詩紀前集三晉童謠丙之晨龍尾伏辰均服振振取虢之旂鶉之賁賁天策焞焞火中成軍虢公其奔左傳僖公五年傳御覽三百二十八詩紀前集三作晉獻公時童謠晉兒謠恭太子更葬兮後十四年晉亦不昌昌乃在其兄史記晉世家漢書五行志詩紀前集三作晉惠公時童謠趙民謠趙為號秦為笑以為不信視地之生毛史記趙世家風俗通皇霸篇詩紀前集三作趙童謠楚童謠楚王渡江得萍實大如斗赤如日剖而食之甜如蜜家語致思篇引實蜜二韻說苑辨物篇類聚八十二初學記二十七白帖三十御覽六百十二一千詩紀前集三作楚昭王時童謠楚人謠楚雖三戶亡秦必楚史記項羽本紀風俗通王霸篇詩紀前集三攻狄謠大冠若箕脩劍拄頤攻狄不能下壘於梧丘戰國策齊策六說苑指武篇書鈔百五十七御覽三百十八詩紀前集三又御覽三百十一引起首二句有炎氏頌聽之不聞其聲視之不見其形充滿天地苞裹六極莊子天運篇詩紀前集三輿人誦佞之見佞果喪其田詐之見詐果喪其賂得國而狃終逢其咎喪田不懲禍亂其興國語晉語三詩紀前集三恭世子誦貞之無報也孰是人斯而有斯臭也貞為不聽信為不誠國斯無刑媮居幸生不更厥貞大命其傾威兮懷兮各聚爾有以待所歸兮猗兮違兮心之哀兮歲之二七其靡有徵兮若翟公子吾是之依兮鎮撫國家為王妃兮國語晉語三詩紀前集三輿人誦原田每每舍其舊而新是謀左傳僖公二十八年傳御覽五十七詩紀前集三朱儒誦臧之狐裘敗我於狐駘我君小子朱儒是使朱儒朱儒使我敗於邾左傳襄公四年傳詩紀前集三又白帖七引末尾二句子產誦取我衣冠而褚之取我田疇而伍之孰殺子產我其與之我有子弟子產誨之我有田疇子產殖之子產而死誰其嗣之左傳襄公三十年傳呂氏春秋樂成篇御覽六百二十二八百二十一詩紀前集三孔子誦麛裘而鞞投之無戾鞞之麛裘投之無郵呂氏春秋樂成篇孔叢子陳士義篇詩紀前集三袞衣章甫實獲我所章甫袞衣惠我無私孔叢子陳士義篇詩紀前集三齊人頌天口駢談天衍雕龍奭炙轂過髡史記孟荀列傳詩紀前集三又文選十六別賦注作諺引談天衍一句童謠吳王出遊觀震湖龍威丈人名隱居北上包山入靈壚乃造洞庭竊禹書天帝大文不可舒此文長傳六百初今強取出喪國廬古微書河圖絳象雲笈七籤三靈寶要略紀詩紀前集三包山謠禹得金簡玉字書藏洞庭包山湖楊慎古今風謠詩紀前集三長水童謠城門當有血城沒陷為湖搜神記十三水經注沔水注初學記十御覽六十六並引干寶搜神記泗上謠稱樂太早絕鼎系水經注泗水注詩紀前集三秦人謠天帝醉秦暴金誤隕石墜文選二西京賦注詩紀前集三秦世謠秦始皇何彊梁開吾戶據吾床飲吾酒唾吾漿飱吾飯以為糧張吾弓射東牆前至沙丘當滅亡異苑四童謠阿房阿房亡始皇述異記下
