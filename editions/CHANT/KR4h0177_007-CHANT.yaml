body:
  text: 漢高帝劉邦大風大風起兮雲飛揚威加海內兮歸故鄉安得猛士兮守四方漢書高帝紀史記高祖紀文選二十八史記樂書三侯之章下司馬貞索隱書鈔一百六類聚四十三白帖十八御覽八八十七二百四十一五百三十九五百九十一樂府詩集五十八詩紀一又魏志蔣濟傳作高祖歌引方一韻倭名類聚引揚一韻鴻鵠鴻鵠高飛一舉千里羽翼㠯就橫絕四海橫絕四海又可奈何雖有矰繳尚安所施漢書張良傳史記留侯世家書鈔一百六白帖二十九歷世真仙體道通鑑十樂府詩集八十三文選補遺三十五廣文選十四詩紀一歌力拔山兮氣蓋世時不利兮騅不逝騅不逝兮可奈何虞兮虞兮奈若何漢書項羽傳史記項羽本紀御覽八十七五百七十樂府詩集五十八作力拔山操文選補遺三十五作垓下帳中歌詩紀二作垓下歌和項王歌漢兵已略地四方楚歌聲大王意氣盡賤妾何樂生史記項羽本紀正義引楚漢春秋詩紀二歌莫莫高山深谷逶迤曄曄紫芝可㠯療飢唐虞世遠吾將何歸駟馬高蓋其憂甚大富貴之畏人兮不若貧賤之肆志御覽五百七十三引崔琦四皓頌樂府詩集五十八誤作崔鴻四皓歌御覽五百七引高士傳寰宇記一百四十引高士傳御覽一百六十八引皇甫謐帝王世紀文選補遺三十五作采芝歌事類賦歌賦苕溪漁隱叢話後集一文章正宗二十九作紫芝歌草堂詩箋八注十一注廣文選十四作采芝歌詩紀二作紫芝歌注一作四皓歌又書鈔一百六崔琦四皓頌引夷飢歸三韻採芝操皓天嗟嗟深谷逶迤樹木莫莫高山崔嵬巖居穴處以為幄茵曄曄紫芝可以療饑唐虞往矣吾當安歸樂府詩集五十八引琴集廣文選十四詩紀二舂歌子為王母為虜終日舂薄暮常與死為伍相離三千里當誰使告女漢書外戚傳御覽百三十六百四十四五百七十樂府詩集八十四詩紀二歌諸呂用事兮劉氏微迫脅王侯兮彊授我妃我妃既妬兮誣我以惡讒女亂國兮上曾不寤我無忠臣兮何故棄國自快中野兮蒼天與直于嗟不可悔兮寧早自賊為王餓死兮誰者憐之呂氏絕埋兮託天報仇漢書高五王傳趙王傳史記呂后本紀樂府詩集八十四詩紀一又御覽百五十一引危妃惡寤四韻耕田歌深耕穊種立苗欲疏非其種者鋤而去之史記齊悼惠王世家漢書齊悼惠王傳風俗通怪神篇御覽四百三十四七百六十四八百二十二文選補遺三十五事類賦劍篇注詩紀一瓠子歌瓠子決兮將奈何浩浩洋洋兮慮殫為河殫為河兮地不得寧功無已時兮吾山平吾山平兮鉅野溢魚弗鬱兮柏冬日正道弛兮離常流蛟龍騁兮放遠遊歸舊川神哉沛不封禪兮安知外皇謂河公兮何不仁泛濫不止兮愁吾人齧桑浮兮淮泗滿久不反兮水維緩漢書溝洫志史記河渠書水經注瓠子河注樂府詩集八十四文選補遺三十五廣文選十四詩紀一又類聚四十三引何河寧平溢日六韻寰宇記十三引溢日二韻韻補三引游一韻河湯湯兮激潺湲北渡回兮迅流難搴長筊兮湛美玉河公許兮薪不屬薪不屬兮衛人罪燒蕭條兮噫乎何以御水隤林竹兮揵石菑宣防塞兮萬福來漢書溝洫志史記河渠書水經二十四樂府詩集八十四文選補遺三十五廣文選十四詩紀一又書鈔八十九引一句秋風辭秋風起兮白雲飛草木黃落兮鴈南歸蘭有秀兮菊有芳懷佳人兮不能忘汎樓船兮濟汾河橫中流兮揚素波簫鼓鳴兮發櫂歌歡樂極兮哀情多少壯幾時兮奈老何文選四十五御覽五百七十五百九十一並引漢書樂府詩集八十四引漢武帝故事合璧事類外集五十八引正本漢書本紀詩紀一又書鈔百六引漢武故事錄河波歌多四韻後漢書馬融傳注引歌一韻文選十三雪賦注引忘一韻又十六別賦注引歌一韻御覽九引飛歸河波四韻又七百六十八作武帝汾歌引河波二韻天馬歌太一貢兮天馬下霑赤汗兮沫流赭騁容與兮跇萬里今安匹兮龍為友史記樂書詩紀一又韻補三引里友二韻天極天馬歌天馬徠從西極經萬里兮歸有德承靈威兮降外國涉流沙兮四夷服史記樂書白帖十六廣文選十四詩紀一李夫人歌是邪非邪立而望之偏何姍姍其來遲漢書外戚傳搜神記二類聚四十三文選五十八哀永逝文注御覽百四十四樂府詩集八十四詩紀一思奉車子侯歌嘉幽蘭兮延秀蕈妖婬兮中溏華斐斐兮麗景風徘徊朽流芳皇天兮無慧至人逝兮仙鄉天路遠兮無期不覺涕下兮霑裳雲笈七籤百十洞仙傳詩紀外集一又書鈔十九引漢書錄起首一句柏梁詩日月星辰和四時驂駕駟馬從梁來郡國士馬羽林材總領天下誠難治和撫四夷不易哉刀筆之吏臣執之撞鐘伐鼓聲中詩宗室廣大日益滋周衛交戟禁不時總領從官柏梁臺平理請讞決嫌疑脩飾輿馬待駕來郡國吏功差次之乘輿御物主治之陳粟萬石揚以箕徼道宮下隨討治三輔盜賊天下危盜阻南山為民災外家公主不可治椒房率更領其材蠻夷朝賀常會期柱枅欂櫨相枝持枇杷橘栗桃李梅走狗逐兔張罘罳齧妃女脣甘如飴迫窘詰屈幾窮哉類聚五十六古文苑四詩紀一又書鈔五十引大將軍鎮撫四夷者也一句五十三引台一韻五十四引來一韻持一韻匡謬正俗七引時來怠三韻初學記十二引來一韻御覽三百五十二引東方朔傳引時一韻九百六十六引梅一韻九百七十引梅一韻歌麥秀蔪兮雉朝飛向虛壑兮背枯槐依絕區兮臨廻溪文選三十四書鈔一百六八公操煌煌上天照下土兮知我好道公來下兮公將與予生毛羽兮超騰青雲蹈梁甫兮觀見瑤光過北斗兮馳乘風雲使玉女兮含精吐氣嚼芝草兮悠悠將將天相保兮樂府詩集五十八廣文選十四詩紀一又搜神記一作淮南操引海下羽鋪斗女六韻御覽五百七十三引海下羽甫斗女六韻歌獨處室兮廓無依思佳人兮情傷悲彼君子兮來何遲日既暮兮華色衰敢託身兮長自私書鈔一百六類聚十八初學記十九御覽五百七十三琴歌二首鳳兮鳳兮歸故鄉遨遊四海求其皇時未通遇無所將何悟今夕升斯堂有豔淑女在此方室邇人遐毒我腸何緣交頸為鴛鴦玉臺新詠九書鈔一百六御覽五百七十三樂府詩集六十黃氏集千家注杜工部詩補遺一琴臺詩注詩紀二又類聚四十三引鄉皇房鴦四韻黃氏集千家注杜工部詩六客居詩注引鄉皇二韻皇兮皇兮從我棲得託字尾永為妃交情通體心和諧中夜相從知者誰雙興俱起翻高飛無感我心使余悲玉臺新詠九樂府詩集六十黃氏集千家注杜工部詩補遺一琴臺詩注詩紀二又類聚四十三引棲妃諧誰四韻錦繡萬花谷十八引棲紀二韻歌陸沉於俗避世金馬門宮殿中可以避世全身何必深山之中蒿廬之下史記滑稽列傳書鈔一百六嗟伯夷窮隱處兮窟穴自藏與其隨佞而得志兮不若從孤竹於首陽書鈔百五十八唐類函十四七言折羽翼兮摩蒼天文選二十二芙蓉池作注六言合樽促席相娛文選四蜀都賦注計策棄捐不收文選二十一詠史詩注歌北方有佳人絕世而獨立一顧傾人城再顧傾人國寧不知傾城與傾國佳人難再得漢書外戚傳玉臺新詠一類聚十八四十三初學記十十九白帖七文選二十一秋胡詩注古籍叢殘石室本文選西京賦注御覽百三十六百四十四三百八十三百八十一五百十七五百七十四事類賦舞賦草堂詩箋十六佳人詩注文選補遺三十五作佳人歌詩紀二醉歌出居安能鬱鬱漢書景武昭宣元成功臣表
