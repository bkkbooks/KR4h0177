body:
  text: 逸詩支詩天之所支不可壞也其所壞亦不可支也國語周語下詩紀前集九貍首詩曾孫侯氏四正具舉大夫君子凡以庶士小大莫處御於君所以燕以射則燕則譽禮記射義大戴記投壼詩紀前集九同上質參既設執旌既載干侯既抗中獲既置弓既平張四侯且良決拾有常既順乃讓乃揖乃讓乃隮其堂乃節其行既志乃張射夫命射射者之聲御車之旌既獲卒莫大戴禮投壼篇詩紀前集九黃竹詩我徂黃竹員閟寒帝收九行嗟我公侯百辟冢卿皇我萬民旦夕勿忘我徂黃竹員閟寒帝收九行嗟我公侯百辟冢卿皇我萬民旦夕勿窮有皎者鵅翩翩其飛嗟我公侯勿則遷居樂甚寡不如遷土禮樂其民穆天子傳五御覽五百九十二詩紀前集九又初學記卷二引七字御覽十二引一二兩章又御覽九百二十五引飛一韻祈招詩祈招之愔愔式昭德音思我王度式如玉式如金形民之力而無醉飽之心左傳昭公十二年傳家語正論篇御覽六百九詩紀前集九招詩畜君何尤孟子二梁惠王篇詩紀前集九作徵招角招無射詩國誠寧矣遠人來觀脩義經矣好樂無荒周書太子晉解書鈔百六御覽五百七十六詩紀前集九嶠詩何自南極至于北極絕境越國弗愁道遠周書太子晉解詩紀前集九轡之柔矣詩馬之剛矣轡之柔矣馬亦不剛轡亦不柔志氣麃麃取與不疑周書太子晉解詩紀前集九驪駒詩驪駒在門僕夫具存驪駒在路僕夫整駕漢書王式傳注詩紀前集九詩大隊之中其樂也融融左傳隱公元年傳大隧之外其樂也洩洩同上白水詩浩浩白水儵儵之魚君來召我我將安居國家未立從我焉如列女傳六詩紀前集九同上浩浩者水育育者魚未有室家而召我安居管子小問篇類聚三十五御覽五百詩紀前集九左傳引逸詩翹翹車乘招我以弓豈不欲往畏我友朋左傳莊公二十二年傳陳仲敬引詩紀前集九我無所監夏后及商用亂之故民卒流亡左傳昭公二十六年傳晏子引晏子春秋外篇詩紀前集九俟河之清人壽幾何兆云詢多職競作羅左傳襄公八年傳子駟引周詩詩紀前集九雖有絲麻無棄管蒯雖有姬姜無棄蕉萃凡百君子莫不代匱左傳成公九年傳詩紀前集九周道挺挺我心扃扃講事不令集人來定左傳襄公于年傳詩紀前集九禮義不愆何恤於人言左傳昭公四年傳漢書東方朔傳又匡衡傳後漢書班超傳注詩紀前集九論語引逸詩巧笑倩兮美目盻兮素以為絢兮論語八佾篇詩紀前集九棠棣之華偏其反而豈不爾思室是遠而論語子罕篇詩紀前集九禮記引逸詩昔吾有先正其言明且清國家以寧都邑以成庶民以生誰能秉國成不自為政卒勞百姓禮記緇衣篇詩紀前集九又文選二十四答何劭詩注作子思子詩引正清寧成四韻相彼盍旦尚猶患之禮記坊記篇詩紀前集九家語引逸詩皇皇上天其命不忒天之以善必報其德家語六本篇說苑權謀篇詩紀前集九管子引逸詩鴻鵠將將管子形勢篇墨子引周詩王道蕩蕩不偏不黨王道平平不黨不偏墨子兼愛篇墨子引逸詩必擇所堪必謹所堪墨子所染篇詩紀前集九魚水不務陸將何及墨子非攻篇詩紀前集九荀子引逸詩如霜雪之將將如日月之光明荀子王霸篇詩紀前集九國有大命不可以告人妨其躬身荀子臣道篇詩紀前集九鳳凰秋秋其翼若干其聲若簫有鳳有凰樂帝之心荀子解蔽篇類聚九十九御覽四百六十八九百十五詩紀前集九長夜慢兮永思騫兮太古之不慢兮禮義之不愆兮何恤人之言兮荀子正名篇詩紀前集九涓涓源水不壅不塞轂既破碎乃大其輻事以敗矣乃重太息荀子法行篇詩紀前集九墨以為明狐狸而蒼荀子解蔽篇詩紀前集九列子引逸詩良弓之子必先為箕良冶之子必先為裘列子湯問篇御覽七百四十六作列子古語詩紀前集九莊子引逸詩青青之麥生於陵陂生不布施死何含珠為莊子外物篇類聚八十四八十五白帖十九御覽四百七十七五百四十九八百三八百二十八詩紀前集九呂氏春秋引逸詩將欲毀之必重累之將欲踣之必高舉之呂氏春秋行論篇詩紀前集九君君子則正以行其德君賤人則寬以盡其力呂氏春秋愛士篇詩紀前集九唯則定國呂氏春秋權動篇左傳僖公九年傳詩紀前集九戰國策引逸詩行百里者半於九十戰國策秦策五詩紀前集九大武遠宅不涉戰國策秦策四史記春申口傳新序善謀篇詩紀前集九木實繁者披其枝披其枝者傷其心大其都者危其君尊其臣者卑其主戰國策秦策三詩紀前集九樹德莫如滋除害莫如盡戰國策秦策三詩紀前集九史記引逸詩得人者興失人者崩史記商列傳漢書引逸詩四牡翼翼以征不服親省邊陲用事所極漢書武帝紀詩紀前集九引起首二句九變復貫知言之選漢書武帝紀詩紀前集九說苑引逸詩緜緜之葛在於曠野良工得之以為絺紵良工不得枯死於野說苑尊賢篇詩紀前集九周禮注引逸詩敕爾瞽率爾眾工奏爾悲誦肅肅雝雝無怠無凶周禮春官注詩紀前集九後漢書引逸詩皎皎練絲在所染之後漢書楊終傳詩紀前集九晉書引逸詩羽觴隨波晉書束晳傳初學記四御覽三十一百五十八六百十二詩紀前集九集韻引逸詩佞人如𧑷集韻六脂詩紀前集九
