body:
  text: 雜曲歌辭蝶蝶行蝶蝶之遨遊東園奈何卒逢三月養子燕接我苜蓿間持之我入紫深宮中行纏之傳欂櫨間雀來燕燕子見銜哺來搖頭鼓翼何軒奴軒樂府詩集六十一詩紀七又初學記三十萬花谷後四十俱引園燕間三韻梁甫吟步出齊城門遙望蕩陰里里中有三墳纍纍正相似問是誰家墓田疆古冶子力能排南山文能絶地紀一朝被讒言二桃殺三士誰能為此謀國相齊晏子類聚十九引蜀志作梁父吟古文苑四作梁父吟樂府詩集四十一草堂詩箋一同李詩注引三齊記略文選補遺三十四西溪叢話上廣文選十三詩紀四作諸葛亮梁甫吟又御覽百五十七寰字記十八並引郡國志録里似子三韻滄浪詩話作梁父吟引追望陰陽里田強固野子二句悲歌悲歌可以當泣遠望可以當歸思念故鄉鬱鬱纍纍欲歸家無人欲渡河無船心思不能言腸中車輪轉樂府詩集六十二文選補遺三十六廣文選十二詩紀七前緩聲歌水中之馬必有陸地之船但有意氣不能自前心非木石荊根株數得覆蓋天當復思東流之水必有西上之魚不在大小但有朝於復來長苖續短笛欲今皇帝陛下三千萬樂府詩集六十五廣文選十二詩紀七古詩為焦仲卿妻作漢末建安中廬江府小吏焦仲卿妻劉氏為仲卿母所遣自誓不嫁其家逼之乃投水而死仲卿聞之亦自縊於庭樹時人傷之為詩云爾孔雀東南飛五里一俳徊十三能織素十四學裁衣十五彈箜篌十六誦詩書十七為君婦心中常苦悲君既為府吏守節情不移賤妾留空房相見常日稀雞鳴入機織夜夜不得息三日斷五匹大人故嫌遲非為織作遲君家婦難為妾不堪驅使徒留無所施使可白公姥及時相遣歸府吏得聞之堂上啓阿母兒已薄祿相幸復得此婦結髮同枕席黃泉共為友共事三二年始爾未為久女行無偏斜何意致不厚阿母謂府吏何乃太區區此婦無禮節舉動自專由吾意久懷忿汝豈得自由東家有賢女自名秦羅敷可憐體無比阿母為汝求便可速遣之遣之慎莫留府吏長跪告伏惟啓阿母今若遣此婦終老不復取阿母得聞之槌床便大怒小子無所畏何敢助婦語吾已失恩義會不相從許府吏默無聲再拜還入戶舉言謂新婦哽咽不能語我自不驅卿逼迫有阿母卿但暫還家吾今且報府不久當歸還還必相迎取以此下心意慎勿違吾語新婦謂府吏勿復重紛紜往昔初陽歲謝家來貴門奉事循公姥進止敢自專晝夜勤作息伶縈苦辛謂言無罪過供養卒大恩仍更被驅遣何言復來還妾有繡腰襦葳蕤自生光紅羅復斗帳四角垂香囊箱簾六七十緑碧青絲繩物物各自異種種在其中人賤物亦鄙不足迎後人留待作遺施於今無會因時時為安慰久久莫相忘雞鳴外欲曙新婦起嚴妝著我繡夾裙事事四五通足下躡絲履頭上玳瑁光腰若流紈素耳著明月璫指如削蔥根口如含朱丹纖纖作細步精妙世無雙上堂拜阿母阿母怒不止昔作女兒時生小出野里本自無教訓兼愧貴家子受母錢帛多不堪母驅使今日還家去念母勞家裏卻與小姑別淚落連珠子新婦初來時小姑如我長勤心養公姥好自相扶將初七及下九嬉戲莫相忘出門登車去涕落百餘行府吏馬在前新婦車在後隱隱何甸甸俱會大道口下馬入車中低頭共耳語誓不相隔卿且暫還家去吾今且赴府不久當還歸誓天不相負新婦謂府吏感君區區懷君既若見録不久望君來君當作磐石妾當作蒲葦蒲葦紉如絲磐石無轉移我有親父兄性行暴如雷恐不任我意逆以煎我懷舉手長勞勞二情同依依入門上家堂進退無顏儀阿母大拊掌不圖子自歸十三教汝織十四能裁衣十五彈箜篌十六知禮儀十七遣汝嫁謂言無誓違汝今無罪過不迎而自歸蘭芝慚阿母兒實無罪過阿母大悲摧還家十餘日縣令遣媒來云有第三郎窈窕世無雙年始十八九便言多令才阿母謂阿女汝可去應之阿女含淚答蘭芝初還時府吏見丁寧結誓不別離今日違情義恐此事非奇自可斷來信徐徐更謂之阿母白媒人貧賤有此女始適還家門不堪吏人婦豈合令郎君幸可廣問訊不得便相許媒人去數日尋遣丞請還説有蘭家女承籍有宦官云有第五郎嬌逸未有婚遣丞為媒人主簿通語言直説太守家有此令郎君既欲結大義故遣來貴門阿母謝媒人女子先有誓老姥豈敢言阿兄得聞之悵然心中煩舉言謂阿妹作計何不量先嫁得府吏後嫁得郎君否泰如天地足以榮汝身不嫁義郎體其住欲何云蘭芝仰頭答理實如兄言謝家事夫壻中道還兄門處分適兄意那得自任專雖與府吏要渠會永無緣登即相許和便可作婚姻媒人下床去諾諾復爾爾還部白府君下官奉使命言談大有緣府君得聞之心中大歡喜視曆復開書便利此月內六合正相應良吉日三十日今已二十七卿可去成婚交語速裝束絡繹如浮雲青雀白鵠舫四角龍子幡婀娜隨風轉金車玉作輪躑躅青驄馬流蘇金縷鞍齎錢三百萬皆用青絲穿雜綵三百匹交用市鮭珍從人四五百鬱鬱登郡門阿母謂阿女適得府君書明日來迎汝何不作衣裳莫令事不舉阿女默無聲手巾掩口啼淚落便如瀉移我琉璃榻出置前窗下左手持刀尺右手執綾羅朝成繡夾裙晚成單羅衫暗暗日欲暝愁思出門啼府吏聞此變因求假暫歸未至二三里摧藏馬悲哀新婦識馬聲躡履相逢迎悵然遙相望知是故人來舉手拍馬鞍嗟歎使心傷自君別我後人事不可量果不如先願又非君所詳我有親父母逼迫兼弟兄以我應他人君還何所望府吏謂新婦賀卿得高遷磐石方且厚可以卒千年蒲葦一時紉便作旦夕間卿當日勝貴吾獨向黃泉新婦謂府吏何意出此言同是被逼迫君爾妾亦然黃泉下相見勿違今日言執手分道去各各還家門生人作死別恨恨那可論念與世間辭千萬不復全府吏還家去上堂拜阿母今日大風寒寒風摧樹木嚴霜結庭蘭兒今日冥冥令母在後單故作不良計勿復怨鬼神命如南山石四體康且直阿母得聞之零淚應聲落汝是大家子仕宦於臺閣慎勿為婦死貴賤情何薄東家有賢女窈窕豔城郭阿母為汝求便復在旦夕府吏再拜還長歎空房中作計乃爾立轉頭向戶裏漸見愁煎迫其日牛馬嘶新婦入青廬菴菴黃昏後寂寂人定初我命絶今日魂去尸長留攬裙脫絲履舉身赴清池府吏聞此事心知長別離徘徊顧樹下自挂東南枝兩家求合葬合葬華山傍東西植松柏左右種梧桐枝枝相覆蓋葉葉相交通中有雙飛鳥自名為鴛鴦仰頭相向鳴夜夜達五更行人駐足聽寡婦起倣徨多謝後世人戒之慎勿忘玉臺新詠一樂府詩集七十三古樂府十並作焦仲卿妻詩紀七又類聚三十二引徊衣詩移息遲為光囊繩十韻吳棫韻補九引區由二韻韻補一引專辛二韻及鞍穿二韻枯魚過河泣枯魚過河泣何時悔復及作書與魴鱮相教慎出入樂府詩集七十四文選補遺三十四廣文選十二詩紀七樂府行胡從何方列國持何來氍毹毾㲪五木香迷迭艾納及都梁樂府詩集七十七御覽九百八十二詩紀七又類聚八十一引香良二韻萬花谷三十二引香良二韻離歌晨行梓道中梓葉相切磨與君別交中繣如新縑羅裂之有餘絲吐之無還期樂府詩集八十四詩紀七箜篌謠結交在相知骨肉何必親甘言無忠實世薄多蘇秦從風暫靡草富貴上升天不見山巔樹摧扤下為薪豈甘井中泥上出作埃塵文苑英華二百十失名次梁劉孝威後樂府詩集八十七作無名氏又御覽四百六作古歌辭引親秦二韻猛虎行飢不從猛虎食暮不從野雀棲野雀安無巢遊子為誰驕樂府詩集三十一文選二十八猛虎行注文選三十雜詩注詩紀七同上少年惶且悕伶到他鄉文選十六寡婦賦注稟氣有豐約受形有短長文選五十謝靈運傳論注上留田行出是上獨西門三荊同一根生一荊斷絶不長兄弟有兩三人塊摧獨貧文選二十八豫章行注同上里中有啼兒似類親父子回車問啼兒慷慨不可止樂府詩集三十八上留田行注詩紀七古八變歌北風初秋至吹我章華臺浮雲多暮色似從崦嵫來枯桑鳴中林緯絡響空階翩翩飛蓬征愴愴遊子懷故鄉不可見長望始此回選詩拾遺古詩類苑四十五詩紀七又御覽二十五引臺來二韻古歌上金殿著玉樽延貴客入金門入金門上金堂東廚具肴膳椎牛烹豬羊主人前進酒彈瑟為清商投壼對彈棋博奕並復行朱火揚煙霧博山吐微香清樽發朱顏四坐樂且康今日樂相樂延年壽千霜選詩拾遺古詩類苑四十五詩紀七又類聚七十四引樽門堂羊商行六韻秋風蕭蕭愁殺人出亦愁入亦愁座中何人誰不懷憂令我白頭胡地多飆風樹木何修修離家日趨遠衣帶日趨緩心思不能言腸中車輪轉選詩拾遺古詩類苑四十五詩紀七又御覽二十五作古樂府歌所引缺憂頭二韻文選二十三七哀詩注作古詩引憂頭二韻豔歌今日樂上樂相從步雲衢天公出美酒河伯出鯉魚青龍前鋪席白虎持榼壼南斗工鼓瑟北斗吹笙竽姮娥垂明璫織女奉瑛琚蒼霞揚東謳清風流西歈垂露成帷偓奔星扶輪輿選詩拾遺古詩類苑三十三詩紀七又御覽五百三十九作古豔詩引從魚壼竿四韻古咄唶歌棗下何攢攢榮華各有時棗欲初赤時人從四邊來棗適今日賜誰當仰視之文選十八笙賦注詩紀七古胡無人行望胡地何嶮𡺢斷胡頭脯胡臆御覽八百古步出夏門行白骨不覆疫癘流行文選二十關中詩注市朝易人千載墓平文選二十八門有車馬客詩注三十和伏武昌詩注行行復行行白日薄西山文選二十七從軍詩注古新成安樂宮般鼓鍾聲盡為鏗鏘文選十七舞賦注視刀鐶歌常恨言語淺不如人意深今朝兩相視脈脈動人心文選補遺三十五廣文選十四古樂府罩辭罩初何得端來得鮒小者如手大者如履孝子持歸遺我公姬安得此魚適與罩忤從今以後但當求鮒御覽九百三十七雞鳴歌東方欲明星爛爛汝南晨雞登壇喚曲終漏盡嚴具陳月沒星稀天下旦千門萬戶遞魚鑰宮中城上飛烏鵲樂府詩集八十三古豔歌孔雀東飛苦寒無衣為加作妻中心惻悲夜夜織作不得下機三日載匹尚言吾遲御覽八百二十六同上行行隨道經歷山陂馬啖柏葉人啖柏脂不可常飽聊可遏飢藝文類聚八十八御覽四百八十六草堂詩箋十六空囊詩注詩紀十又御覽九百二十三木部松引脂飢二韻煢煢白兔東走西顧衣不如新人不如故御覽六百八十九九百七蘭草自生香生于大道傍十月鉤簾起并在束薪中匡謬正俗七升菴詩話蘭草條詩紀十作古樂府秋霜白露下桑葉鬱為黃御覽十四白鹽海東來美豉出魯門書鈔百四十六御覽八百五十五居窮衣單薄腸中常苦飢文選二十七善哉行注古樂府詩請説劍駿犀標首玉琢中央六一所善王者所杖帶以上車如燕飛揚書鈔百二十二同上鑿石見火能幾時文選二十六河陽詩注古樂府東家公字仲春柱一鳩杖脣玉燭寶典正月孟春第一同上布穀鳴農人驚玉燭寶典二月仲春第二啄木高飛乍低仰摶樹林藪著榆桑低足頭啄斸如斸飛鳴相驟聲如篁玉燭寶典五月仲夏第五豹則虎之弟鷹則鷂之兄御覽九百二十六天寒知被薄憂思知夜長御覽七百七琉璃琉珀象牙槃御覽七百五十八古妍歌妍歌展妙聲發曲吐令辭文選四十六曲水詩序注樂府歌集會高堂上長彈箜篌書鈔一百十春酒甘如醴秋醴清如華書鈔百四十八漢書歌上蓬萊咀瓊英文選五吳都賦劉淵林注古歌田中菟絲何嘗可絡道邊燕麥何嘗可穫御覽九百九十四同上長笛續短笛願陛下保壽無極書鈔百十一御覽五百八十事類賦笛賦注大憂摧人肺肝心文選二十一三良詩注流塵生玉匣御覽七百十三歌濯龍望如海河橋渡似雷文選三東京賦薜綜注引洛陽圖經茂陵中書歌都孋桂英美芳鼓行漢書禮樂志臣瓚注引有所思有所思思昔人曾閔二子善養親和顏色奉晨昏至誠蒸蒸通神明宋范晞文對床夜語三古博異辨遊衆星纍纍如連貝江河四海如衣帶文選二十四贈顧交址公真詩注古董逃行年命冉冉我遒零落下歸山丘漢魏詩乘補遺古樂府青天含翠彩素日揚清暉漢魏詩乘補遺古歌金荊持作枕紫荊持作床漢魏詩乘補遺高田種小麥終久不成穗男兒在他鄉焉得不憔悴齊民要術二注引泛勝之書詩紀十又爾雅翼一引泛勝之書引穗一韻
