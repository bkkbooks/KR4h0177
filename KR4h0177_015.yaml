body:
  text: 相和曲箜篌引公無渡河公竟渡河墮河而死當奈公何初學記十六白帖十八樂府古題要解下作公無渡河樂府詩集二十六文選補遺三十四廣文選十二詩紀六江南江南可採蓮蓮葉何田田魚戲蓮葉間魚戲蓮葉東魚戲蓮葉西魚戲蓮葉南魚戲蓮葉北宋書樂志樂府詩集二十六文選補遺三十四詩紀六又類聚八十二作古詩引蓮田間西四韻白帖三十作古詩引魚戲蓮下一句御覽九百九十九作古詩引蓮田二韻東光東光平倉梧何不平倉梧多腐粟無益諸軍糧諸軍遊蕩子早行多悲傷宋書樂志樂府詩集二十七古樂府四廣文選十二詩紀六薤露薤上露何易晞露晞明朝更復落人死一去何時歸古今注中後漢書周舉傳注文選二十八挽歌詩注初學記十四御覽十二又五百五十二作古辭樂府詩集二十七事類賦露賦注合璧事類六十八草堂詩箋二十四故祕詩注詩紀六又文選二十四贈白馬王彪詩注白帖一御覽九百七十七俱引首一句蒿里蒿里誰家地聚斂魂魄無賢愚鬼伯一何相催促人命不得少踟蹰古今注下文選二十八挽歌詩注初學記十四御覽五百五十二樂府詩集二十七樂府古題要解上草堂時箋二十四故祕詩注引古今注合璧事類六十八引干寶搜神記詩紀六雞鳴雞鳴高樹巔狗吠深宮中蕩子何所之天下方太平刑法非有貸柔協正亂名黃金為君門璧玉為軒闌堂上有雙樽酒作使邯鄲倡劉玉碧青甓後出郭門王舍後有方池池中雙鴛鴦鴛鴦七十二羅列自成行鳴聲何啾啾聞我殿東廂兄弟四五人皆為侍中郎五日一時來觀者滿路傍黃金絡馬頭熲熲何煌煌桃生露井上李樹生桃傍蟲來齧桃根李樹代桃殭樹木身相代兄弟還相忘宋書樂志樂府二十八通志樂略文選補遺三十四廣文選十二詩紀六類聚八十六作古歌辭引傍僵忘三韻御覽九百六十七作古歌辭引傍僵忘三韻事類賦井賦注作古詩引傍僵二韻烏生烏生八九子端坐秦氏桂樹間唶我秦氏家有遊遨蕩子工用雎陽彊蘇合彈左手持彊彈兩丸出入烏東西唶我一丸即發中烏身烏死魂魄飛揚上天阿母生烏子時乃在南山巖石間唶我人民安知烏子處蹊徑窈窕安從通白鹿乃在上林西苑中射工尚復得白鹿脯唶我黃鵠摩天極高飛後宮尚復得烹煮之鯉魚乃在洛水深淵中釣鉤尚得鯉魚口唶我人民生各各有壽命死生何須復道前後宋書樂志樂府詩集二十八文選補遺三十四詩紀六又文選二十七從軍詩注作古烏生八九子歌引黃鵠摩天極高飛一句初學記三十引間彈兩韻御覽三百五十引間丸二韻九百六引白鹿以下四句又九百十六作魏武樂府引黃鵠以下二句平陵東平陵東松柏桐不知何人劫義公劫義公在高堂下交錢百萬兩走馬兩走馬亦誠難顧見追吏心中惻心中惻血出漉歸告我家賣黃犢宋書樂志樂府詩集二十八詩紀六陌上桑日出東南隅照我秦氏樓秦氏有好女自名為羅敷羅敷善蠶桑採桑城南隅青絲為籠係桂枝為籠鉤頭上倭墮髻耳中明月珠緗綺為下裙紫綺為上襦行者見羅敷下擔捋髭鬚少年見羅敷脫帽著帩頭耕者忘其犂鋤者忘其鋤來歸相怨怒但坐觀羅敷使君從南來五馬立踟蹰使君遣吏往問此誰家姝秦氏有好女自名為羅敷羅敷年幾何二十尚不足十五頗有餘使君謝羅敷寧可共載不羅敷前致辭使君一何愚使君自有婦羅敷自有夫東方千餘騎夫壻居上頭何用識夫壻白馬從驪駒青絲繫馬尾黃金絡馬頭腰中鹿盧劍可值千萬餘十五府小史二十朝大夫三十侍中郎四十專城居為人潔白晳鬑鬑頗有鬚盈盈公府步冉冉府中趨坐中數千人皆言夫壻殊宋書樂志作豔歌羅敷行玉臺新詠一作日出東南隅行樂府詩集二十八廣文選十二詩紀六又書鈔二十九作古詩引襦一韻類聚四十一作古陌上桑羅敷行引樓敷隅鉤珠襦蹰姝餘不愚夫頭駒頭餘夫居鬚趨二十韻初學記十九作陌上桑行引樓敷隅鉤珠襦須頭鉏敷蹰十一韻又二十六作古樂府陌上採桑引敷襦二韻白帖二作古詩引襦一韻白帖二十三作古詩引隅鉤二韻御覽三百四十四作古詩引餘一韻三百八十一引樓敷隅鉤珠五韻六百八十八作古詩引隅頭頭二韻六百九十五作古詩引隅襦二韻六百九十六引敷襦二韻八百十四作古樂府歌詩引隅鉤駒頭四韻八百十六作古詩引襦一韻八百二十五作古豔歌引樓敷隅三韻又韻補一作古日出東南隅詩引隅鉤二韻草堂詩箋四麗入行注引珠一韻同前今有人山之阿被服薜荔帶女蘿既含睇又宜笑子戀慕豫善窈窕乘赤豹從文狸辛夷車駕結桂旗被石蘭帶杜衡折芳拔荃遺所思處幽室終不見天路險艱獨後來表獨立山之上雲何容容而在下杳冥冥羌晝晦東風飄颻神靈雨風瑟瑟木搜搜思念公子徒以憂宋書樂志樂府詩集二十八詩紀六王子喬王子喬參駕白鹿雲中遨參駕白鹿雲中遨下遊來王子喬參駕白鹿上至雲戲遊遨上建逋陰廣里踐近高結仙宮過謁三台東遊四海五嶽上過蓬萊紫雲臺三王五帝不足令令我聖朝應太平養民若子事父明當究天祿永康寧玉女羅坐吹笛簫嗟行聖人遊八極鳴吐銜福翔殿側聖主享萬年悲今皇帝延壽命樂府詩集二十九廣文選十二詩紀六長歌行青青園中葵朝露待日晞陽春布德澤萬物生光輝常恐秋節至焜黃華葉衰百川東到海何時復西歸少壯不努力老大徒傷悲文選二十七類聚四十二樂府詩集三十文章正宗二十九詩紀六又書鈔百五十四引輝一韻文選四十三與吳質書注引悲一韻文選四十五秋風辭注引傷一韻御覽二十引晞暉二韻事文類聚前集六引輝一韻同前仙人騎白鹿髮短耳何長導我上太華攬芝獲赤幢來到主人門奉藥一玉箱主人服此藥身體日康彊髮白復更黑延年壽命長岧岧山上亭皎皎雲間星遠望使心思遊子戀所生驅車出北門遙觀洛陽城凱風吹長棘夭夭枝葉傾黃鳥飛相追咬咬弄音聲佇立望西河泣下沾羅纓樂府詩集三十廣文選十二詩紀六類聚八十一作古詩引長箱強長四韻御覽九百八十四作樂府歌引長疆箱強長五韻文選二十四秀才入軍詩注作古詩引音一韻君子行君子防未然不處嫌疑間瓜田不納履李下不正冠嫂叔不親授長幼不比肩勞謙得其柄和光甚獨難周公下白屋吐哺不及餐一沐三握髮後世稱聖賢六臣本文選二十七樂府詩集三十二文章正宗二十九詩紀六類聚四十一作陳思王曹植君子行引間冠餐賢四韻白帖四二十八九十八各引間冠二韻御覽九百七十八引間冠二韻合璧事類別集四十二引間冠二韻又外集二十四引第四句豫章行白楊初生時乃在豫章山上葉摩青雲下根通黃泉涼秋八九月山客持斧斤我何皎皎梯落根株已斷絶顛倒巖石間大匠持斧繩鋸墨齊兩端一驅四五里枝葉自相捐會為舟船燔身在洛陽宮根在豫章山多謝枝與葉何時復相連吾生百年自俱何意萬人巧使我離根株樂府詩集三十四詩紀六類聚八十九作古詩引山泉二韻董逃行吾欲上謁從高山山頭危險道路難遙望五嶽端黃金為闕班璘但見芝草葉落紛紛百鳥集來如烟山獸紛綸麟辟邪其端鵾雞聲鳴但見山獸援戲相拘攀小復前行玉堂未心懷流還傳教出門來門外人何求所言欲從聖道求一得命延教敕凡吏受言採取神藥若木端玉兔長跪搗藥蝦蟆丸奉上陛下一玉柈服此藥可得神仙服爾神藥莫不歡喜陛下長生老壽四面肅肅稽首天神擁護左右陛下長與天相保守宋書樂志樂府詩集三十四廣文選十二詩紀六類聚九十五作古歌引端丸柈三韻御覽九百七作樂府歌詩引端丸柈三韻同前年命冉冉我遒文選二十二宿東園詩注引古董桃行相逢行相逢狹路間道隘不容車不知何年少夾轂問君家君家誠易知易知復難忘黃金為君門白玉為君堂堂上置樽酒作使邯鄲倡中庭生桂樹華鐙何煌煌兄弟兩三人中子為侍郎五日一來歸道上自生光黃金絡馬頭觀者盈道傍入門時左顧但見雙鴛鴦鴛鴦七十二羅列自成行音聲何噰噰鶴鳴東西廂大婦織綺羅中婦織流黃小婦無所為挾瑟上高堂丈人且安坐調絲方未央玉臺新詠一作相逢狹路間樂府詩集三十四廣文選十二詩紀六類聚四十一引車家忘堂煌郎光傍鴦黃堂央十二韻初學記十八作古樂府詩引忘堂倡煌郎光傍七韻文選十四舞鶴賦注作古樂府引堂倡二韻二十二古意酬到長史注引郎傍二韻御覽百七十六作古詩引堂煌二韻長安有狹斜行長安有狹斜狹斜不容車適逢兩少年夾轂問君家君家新市傍易知復難忘大子二千石中子孝廉郎小子無官職衣冠仕洛陽三子俱入室室中自生光大婦織綺紵中婦織流黃小婦無所為挾琴上高堂丈人且徐徐調弦詎未央樂府詩集三十五詩紀六御覽八百十六作古歌詩引黃堂二韻又八百二十六作古歌辭引黃堂史三韻善哉行來日大難口燥唇乾今日相樂皆當喜歡經歷名山芝草翻翻仙人王喬奉藥一丸自惜袖短內手知寒慚無靈轍以報趙宣月沒參橫北斗闌干親交在門飢不及餐歡日尚少戚日苦多何以忘憂彈箏酒歌淮南八公要道不煩參駕六龍遊戲雲端宋書樂志樂府詩集三十六廣文選十二詩紀六類聚四十一作魏陳思王曹植引乾歡翩丸寒宣干餐八韻初學記十八引干飱二韻御覽四百十引干餐二韻吳棫韻補二作曹植引宣干二韻又翩丸二韻隴西行邪徑過空廬好人常獨居卒得神仙道上與天相扶過謁王父母乃在太山隅離天四五里道逢赤松俱攬轡為我御將吾天上遊天上何所有歷歷種白榆桂樹夾道生青龍對伏趺鳳凰鳴啾啾一母將九雛顧視世間人為樂甚獨殊好婦出迎客顏色正敷愈伸腰再拜跪問客平安不請客北堂上坐客氈氍毹清白各異樽酒上玉華疏酌酒持與客客言主人持却略再拜跪然後持一杯談笑未及竟左顧勑中廚促令辦粗飯慎莫使稽留廢禮送客出盈盈府中趨送客亦不遠足不過門樞取婦得如此齊姜亦不如健婦持門戶亦勝一丈夫玉臺新詠一樂府詩集三十七文選補遺三十四廣文選十二詩紀六俱引天上何所有以下樂府詩集三十七廣文選十二詩紀六作步出夏門行引邪徑過空廬至青龍對伏趺等句又白帖二十九作古詩引鳳皇合啾啾二句文選十八笙賦注作步出夏門行引雛一韻草堂詩箋二十二水檻詩注作隴西行引夫一韻御覽二作古樂府引榆一韻七百八作古樂府引𣮵一韻苕溪漁隱叢話十二作隴西行引夫一韻韻補一作隴西行引疏持二韻同前行行重行行白日薄西山文選二十四贈徐幹詩注折楊柳行默默施行違厥罰隨事來末喜殺龍逢桀放於鳴條祖伊言不用紂頭懸白旄指鹿用為馬胡亥以喪軀夫差臨命絶乃云負子胥戎王納女樂以亡其由余璧馬禍及虢二國俱為墟三夫成市虎慈母投杼趨卞和之刖足接輿歸草廬宋書樂志作大曲樂府詩集三十七廣文選十二作折楊柳詩紀六西門行出西門步念之今日不作樂當待何時逮為樂逮為樂當及時何能愁怫鬱當復待來茲釀美酒炙肥牛請呼心所歡可用解憂愁人生不滿百常懷千歲憂晝短苦夜長何不秉燭遊遊行去去如雲除弊車羸馬為自儲樂府詩集三十七文選補遺三十四詩紀六又文選二十公宴詩注作古樂府歌引時一韻出西門步念之今日不作樂當待何時夫為樂為樂當及時何能坐愁怫鬱當復待來茲飲醇酒炙肥牛請呼心所歡可用解憂愁人生不滿百常懷千歲憂晝短而夜長何不秉燭遊自非仙人王子喬計會壽命難與期自非仙人王子喬計會壽命難與期人壽非金石年命安可期貪財愛惜費但為後世嗤宋書樂志樂府詩集三十七廣文選十二詩紀六東門行出東門不顧歸來入門悵欲悲盎中無斗米儲還視架上無懸衣拔劍東門去舍中兒母牽衣啼他家但願富貴賤妾與君共餔糜上用倉浪天故下當用此黃口兒今非咄行吾去為遲白髮時下難久居樂府詩集三十七詩紀六又文選二十一詠史詩注作古出東門行引衣一韻御覽七百六十五作古詩引衣一韻出東門不顧歸來入門悵欲悲盎中無斗儲還視桁上無懸衣拔劍出門去兒女牽衣啼他家但願富貴賤妾與君共餔糜上用倉浪天故下為黃口小兒今時清廉難犯教言君復自受莫為非今時清廉難犯教言君復自愛莫為非行吾去為遲平慎行望君歸宋書樂志樂府詩集三十七文選補遺三十四風雅翼補遺下廣文選十二詩紀六婦病行婦病連年纍歲傳呼丈人前一言當言未及得言不知淚下一何翩翩屬纍君兩三孤子莫我兒飢且寒有過慎莫笡笞行當折搖思復念之亂曰抱時無衣襦復無裏閉門寒牖舍孤兒到市道逢親交泣坐不能起從乞求與孤買餌對交啼泣淚不可止我欲不傷悲不能已探懷中錢持授交入門見孤兒啼索其母抱徘徊空舍中行復爾耳棄置勿復道樂府詩集三十八詩紀六孤兒行孤兒生孤子遇生命獨當苦父母在時乘堅車駕駟馬父母已去兄嫂令我行賈南到九江東到齊與魯臘月來歸不敢自言苦頭多蟣虱面目多塵大兄言辦飯大嫂言視馬上高堂行取殿下堂孤兒淚下如雨使我朝行汲暮得水來歸手為錯足下無菲愴愴履霜中多蒺藜拔斷蒺藜腸月中愴欲悲淚下泄泄清涕纍纍冬無復襦夏無單衣居生不樂不如早去下從地下黃泉春氣動草萌芽三月蠶桑六月收瓜將是瓜車來到還家瓜車反覆助我者少啖瓜者多願還我蒂兄與嫂嚴獨且急歸當興校計亂曰里中一何譊譊願欲寄尺書將與地下父母兄嫂難與久居樂府詩集三十八詩紀六雁門太守行孝和帝在時洛陽令王君本自益州廣漢蜀民少行宦學通五經論明知法令歷世衣冠從溫補洛陽令治行致賢擁護百姓子養萬民外行猛政內懷慈仁文武備具料民富貧移惡子姓篇著里端傷殺人比伍同罪對門禁鍪矛八尺捕輕薄少年加笞決罪詣馬市論無妄發賦念在理冤敕吏正獄不得苛煩財用錢三十買繩禮竿賢哉賢哉我縣王君臣吏衣冠奉事皇帝功曹主簿皆得其人臨部居職不敢行恩清身苦體夙夜勞勤治有能名遠近所聞天年不遂早就奄昏為君作祠安陽亭西欲令後世莫不稱傳宋書樂志樂府詩集三十九詩紀六又後漢書王渙傳作古樂府歌引君人論冠賢仁端寬勤聞昏西傳十三韻文選五十九故安陸王碑文注引仁貧端三韻草堂詩箋二十一送梓詩注引私聞二韻豔歌何嘗行飛來雙白鵠乃從西北來十十將五五羅列行不齊忽然卒被病不能飛相隨五里一反顧六里一俳徊吾欲銜汝去口噤不能開吾欲負汝去羽毛日摧頽樂哉新相知憂來生別離峙顧群侶淚落縱橫垂今日樂相樂延年萬歲期玉臺新詠一廣文選十二又草堂詩箋二十九暇日詩注引來徊開頽離垂六韻飛來隻白鵠乃從西北來十十五五羅列成行妻卒被病行不能相隨五里一返顧六里一徘徊吾欲銜汝去口噤不能開吾欲負汝去毛羽何摧頽樂哉新相知憂來生別離躇躊顧群侶淚下不自知念與君離別氣結不能言各各重自愛道遠歸還難妾當守空房間門下重關若生當相見亡者會重泉今日樂相樂延年萬歲期宋書樂志樂府詩集三十九風雅翼補遺下文選補遺三十四作飛鵠行詩紀六又類聚九十作古詩引來行隨徊開頽六韻鳴沙室修文館御覽及御覽九百十六俱作古歌辭引來行隨徊開頽六韻初學記十八作飛鵠行引言難二韻白帖二十九作飛來雙白鶴引徊一韻黃氏集千家注杜詩補遺十銅官詩注引來一韻事類賦鶴賦注作古歌辭引方行隨徊開頽六韻豔歌行翩翩堂前燕冬藏夏來見兄弟兩三人流宕在他縣故衣誰當補新衣誰當綻賴得賢主人覽取為我䋎夫壻從門來斜柯西北眄語卿且勿眄水清石自見石見何纍纍遠行不如歸玉臺新詠一樂府詩集三十九廣文選十二詩紀六又鳴沙石室古籍叢殘類書殘卷作古詩引見縣二韻韻補四作古豔歌引縣綻二韻白頭吟皚如山上雪皎若雲間月聞君有兩意故來相決絶今日斗酒會明旦溝水頭躞蹀御溝上溝水東西流淒淒復淒淒嫁娶不須啼願得一心人白頭不相離竹竿何嫋嫋魚尾何篩篩男兒重意氣何用錢刀為玉臺新詠一樂府詩集四十一詩紀二作卓文君白頭吟御覽七十五作古詩引頭流二韻皚如山上雪皎如雲間月聞君有兩意故來相決絶平生共城中何嘗斗酒會今日斗酒會明旦溝水頭蹀躞御溝上溝水東西流郭東亦有樵郭西亦有樵兩樵相推與無親為誰驕淒淒重淒淒嫁娶亦不啼願得一心人白頭不相離竹竿何嫋嫋魚尾合離篩男兒欲相知何用錢刀為𪗰如馬噉箕川上高士嬉今日相對樂延年萬歲期宋書樂志樂府詩集四十一風雅翼補遺下廣文選十二詩紀二作卓文君白頭吟又御覽十二作樂府歌引雪月絶三韻合璧事類二十八引月別頭流啼離六韻文選集注五十六白頭吟注引啼離二韻怨詩行天道悠且長人命一何促百年未幾時奄若風吹燭嘉賓難再遇人命不可續齊度遊四方各繫太山録人間樂未央忽然歸東嶽當須蕩中情遊心恣所欲樂府詩集四十一廣文選十二詩紀六滿歌行為樂未幾時遭時嶮巇逢此百罹零丁荼毒愁苦難為遙望極辰天曉月移憂來填心誰當我知戚戚多思慮耿耿殊不寧禍福無形惟念古人遜位躬耕遂我所願以茲自寧自鄙棲棲守此末榮暮秋烈風昔蹈滄海心不能安攬衣瞻夜北斗闌干星漢照我去自無他奉事二親勞心可言窮達天為智者不愁多為少憂安貧樂道師彼莊周遺名者貴子遐同遊往者二賢名垂千秋飲酒歌舞樂復何須照視日月日月馳驅轗軻人間何有何無貪財惜費此一何愚鑿石見火居代幾時為當歡樂心得所喜安神養性得保遐期樂府詩集四十三廣文選十二詩紀六淮南王淮南王自言尊百尺高樓與天連後園鑿井銀作床金瓶素綆汲寒漿汲寒漿飲少年少年窈宨何能賢揚聲悲歌音絶天我欲渡河河無梁願化雙黃鵠還故鄉還故鄉入故里徘徊故鄉苦身不已繁舞寄聲無不泰徘徊桑梓遊天外宋書樂志晉書樂志樂府詩集五十四文選補遺三十四廣文選十二詩紀六又南齊書樂志引尊連梁鄉四韻聖人制禮樂篇昔皇文武彌彌舍善誰時道銜治路萬赫赫黃運善道明金聖皇八音義同善草供國應節合用酒期下音足木上為鼓應衆樂延否已禮祥素女有絶其聖宋書樂志樂府詩集五十四詩紀六巾舞歌詩不見公莫當思明月之土轉起南去城上羊下食草汝三年針縮亦老平門涕下昔結馬客行度四州洛四海熇西馬頭香五丈渡汲水誰求兒母錢健步三針一發交還弩心復相頭巾復來推排車輪轉使君去時宋書樂志樂府詩集五十詩紀六俳歌辭俳不言不語呼俳吸所俳適一起狼率不止生拔牛角摩斷膚耳馬無懸蹄牛無上齒駱𧿶無角奮迅兩耳南齊書樂志樂府詩集五十六詩紀六
